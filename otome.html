<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ときめき★ルミナンス ～星屑の約束～</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600;700&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pk1:#fce4ec;--pk2:#f48fb1;--pk3:#c2185b;--rose:#880e4f;
  --cream:#fff8f0;--gold:#d4a843;--td:#3d1a2e;--tm:#6d3a5a;--tl:#9e6b8a;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Serif JP',serif;background:var(--pk1);}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;display:none;overflow:hidden;}
.screen.active{display:flex;flex-direction:column;}

/* TITLE */
#s-title{background:linear-gradient(160deg,#fff0f5 0%,#ffd6e7 40%,#ffb3d1 100%);justify-content:center;align-items:center;position:relative;}
.sakura-wrap{position:absolute;width:100%;height:100%;pointer-events:none;overflow:hidden;}
.petal{position:absolute;top:-20px;border-radius:50% 0;animation:fall linear infinite;}
@keyframes fall{0%{transform:translateY(0) rotate(0deg) translateX(0);opacity:1}50%{transform:translateY(50vh) rotate(180deg) translateX(30px);opacity:.8}100%{transform:translateY(110vh) rotate(360deg) translateX(-20px);opacity:0}}
.title-box{text-align:center;z-index:2;padding:2rem;}
.t-subtitle{font-size:clamp(.75rem,2vw,.95rem);color:var(--tm);font-weight:300;letter-spacing:.35em;margin-bottom:.6rem;}
.t-logo{font-family:'Cinzel',serif;font-size:clamp(1.8rem,6vw,3.2rem);color:var(--rose);text-shadow:0 2px 20px rgba(136,14,79,.35);letter-spacing:.08em;margin-bottom:.4rem;}
.t-logo span{color:#c2185b;}
.deco-row{display:flex;align-items:center;justify-content:center;gap:1rem;margin:1.2rem 0 2rem;}
.dl{width:60px;height:1px;background:linear-gradient(to right,transparent,var(--pk3));}
.dl.r{background:linear-gradient(to left,transparent,var(--pk3));}
.dd{width:8px;height:8px;background:var(--pk3);transform:rotate(45deg);}
.btns{display:flex;flex-direction:column;gap:.9rem;align-items:center;}
.btn{padding:.72rem 2.2rem;border:none;border-radius:50px;font-family:'Noto Serif JP',serif;font-size:.95rem;cursor:pointer;transition:all .25s;min-width:200px;}
.btn-p{background:linear-gradient(135deg,var(--pk3),var(--rose));color:#fff;box-shadow:0 4px 18px rgba(194,24,91,.4);}
.btn-p:hover,.btn-p:active{transform:translateY(-2px);box-shadow:0 6px 22px rgba(194,24,91,.55);}
.btn-s{background:#fff;color:var(--rose);border:2px solid var(--pk2);box-shadow:0 2px 10px rgba(244,143,177,.3);}
.btn-s:hover,.btn-s:active{background:var(--pk1);transform:translateY(-2px);}
.btn-g{background:transparent;color:var(--tm);border:1.5px solid var(--tl);}
.btn-g:hover{background:rgba(255,255,255,.5);}
.hbtn{position:absolute;top:1rem;left:1rem;background:rgba(255,255,255,.82);border:1.5px solid var(--pk2);border-radius:50px;padding:.38rem .9rem;color:var(--rose);font-size:.82rem;cursor:pointer;z-index:10;transition:all .2s;font-family:'Noto Serif JP',serif;}
.hbtn:hover{background:#fff;transform:translateY(-1px);}

/* NAME */
#s-name{background:linear-gradient(160deg,#fff0f5 0%,#ffd6e7 100%);align-items:center;justify-content:center;}
.name-card{background:rgba(255,255,255,.92);border-radius:20px;padding:2.5rem;max-width:400px;width:90%;text-align:center;box-shadow:0 10px 40px rgba(194,24,91,.18);border:1.5px solid var(--pk2);}
.name-card h2{font-size:1.4rem;color:var(--rose);margin-bottom:.4rem;}
.name-card p{color:var(--tm);font-size:.88rem;margin-bottom:1.2rem;}
.n-input{width:100%;padding:.75rem 1rem;border:2px solid var(--pk2);border-radius:50px;font-size:1.1rem;font-family:'Noto Serif JP',serif;text-align:center;color:var(--td);outline:none;margin-bottom:1.2rem;background:var(--cream);}
.n-input:focus{border-color:var(--rose);}

/* CHAR SELECT */
#s-csel{background:linear-gradient(160deg,#fff0f5 0%,#fce4ec 100%);flex-direction:column;}
.csel-hdr{text-align:center;padding:1.2rem 1rem .7rem;background:rgba(255,255,255,.75);backdrop-filter:blur(10px);flex-shrink:0;}
.csel-hdr h2{font-size:1.2rem;color:var(--rose);margin-bottom:.2rem;}
.csel-hdr p{color:var(--tm);font-size:.8rem;}
.hbtn-rel{display:inline-block;background:rgba(255,255,255,.82);border:1.5px solid var(--pk2);border-radius:50px;padding:.32rem .8rem;color:var(--rose);font-size:.78rem;cursor:pointer;transition:all .2s;font-family:'Noto Serif JP',serif;margin-bottom:.4rem;}
.hbtn-rel:hover{background:#fff;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.8rem;padding:.8rem;overflow-y:auto;flex:1;}
@media(min-width:700px){.cgrid{grid-template-columns:repeat(5,1fr);max-width:860px;margin:0 auto;width:100%;}}
.ccard{background:#fff;border-radius:16px;overflow:hidden;cursor:pointer;transition:all .3s;border:3px solid transparent;box-shadow:0 4px 15px rgba(0,0,0,.1);position:relative;}
.ccard:hover,.ccard:active{transform:translateY(-4px);box-shadow:0 8px 25px rgba(0,0,0,.16);}
.ccard.sel{border-color:var(--rose);}
.cpa{width:100%;aspect-ratio:3/4;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.cinfo{padding:.65rem;text-align:center;}
.cname{font-size:.88rem;font-weight:700;color:var(--td);margin-bottom:.1rem;}
.crole{font-size:.7rem;color:var(--tl);margin-bottom:.4rem;}
.aff-bar{background:#f0e0ea;border-radius:10px;height:5px;overflow:hidden;margin-bottom:.3rem;}
.aff-fill{height:100%;border-radius:10px;transition:width .5s;}
.ep-dots{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;}
.ep-dot{width:7px;height:7px;border-radius:50%;background:#e0c0d0;}
.ep-dot.done{background:var(--rose);}
.cbadge{position:absolute;top:.4rem;right:.4rem;background:var(--gold);color:#fff;font-size:.62rem;padding:.1rem .35rem;border-radius:10px;z-index:2;}

/* VN */
#s-vn{flex-direction:column;position:relative;}
.vn-bg{position:absolute;top:0;left:0;width:100%;height:100%;transition:background 1.2s;}
.vn-top{position:relative;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:.65rem 1rem;background:rgba(0,0,0,.18);}
.mbtn{background:rgba(255,255,255,.85);border:1.5px solid rgba(255,255,255,.5);border-radius:8px;padding:.36rem .65rem;cursor:pointer;font-size:1rem;color:var(--td);line-height:1;font-family:'Noto Serif JP',serif;}
.aff-chip{display:flex;align-items:center;gap:.3rem;background:rgba(255,255,255,.85);border-radius:20px;padding:.25rem .7rem;font-size:.88rem;color:var(--rose);font-weight:700;}
.ep-lbl{color:rgba(255,255,255,.9);font-size:.72rem;text-shadow:0 1px 4px rgba(0,0,0,.5);}
.vn-char{position:relative;z-index:5;flex:1;display:flex;align-items:flex-end;justify-content:center;min-height:0;overflow:hidden;}
.vn-char svg{max-height:55vh;width:auto;filter:drop-shadow(0 8px 24px rgba(0,0,0,.4));transition:all .4s;}
.vn-tbox-wrap{position:relative;z-index:10;padding:.5rem .5rem .65rem;flex-shrink:0;}
@media(min-width:700px){.vn-tbox-wrap{padding:.7rem 2rem .9rem;max-width:800px;margin:0 auto;width:100%;}}
.vn-tbox{background:rgba(15,4,14,.87);border-radius:16px;border:1px solid rgba(255,150,200,.28);padding:1rem 1.2rem 1.3rem;position:relative;cursor:pointer;min-height:100px;}
.vn-spk{display:inline-block;padding:.16rem .82rem;border-radius:20px;font-size:.86rem;font-weight:700;margin-bottom:.42rem;position:absolute;top:-14px;left:1.1rem;color:#fff;}
.vn-txt{color:#fff;font-size:clamp(.86rem,2.4vw,1rem);line-height:1.9;padding-top:.2rem;}
.vn-narr{color:#f0d0e8;font-style:italic;font-size:clamp(.8rem,2.2vw,.95rem);line-height:1.85;text-align:center;}
.vn-nxt{position:absolute;bottom:.65rem;right:.72rem;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:50%;width:27px;height:27px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.78rem;animation:pulse-a 1.4s ease-in-out infinite;}
@keyframes pulse-a{0%,100%{opacity:.6}50%{opacity:1}}
.choices{display:flex;flex-direction:column;gap:.42rem;margin-top:.6rem;}
.cbtn{background:rgba(255,255,255,.11);border:1px solid rgba(255,150,200,.45);border-radius:10px;padding:.6rem .9rem;color:#fff;font-family:'Noto Serif JP',serif;font-size:clamp(.76rem,2vw,.9rem);cursor:pointer;text-align:left;transition:all .2s;}
.cbtn:hover,.cbtn:active{background:rgba(255,100,170,.28);border-color:rgba(255,180,220,.9);transform:translateX(4px);}
.q-lbl{color:#f0c0e0;font-size:.8rem;margin-bottom:.48rem;text-align:center;}

/* MENU OVERLAY */
.m-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.62);z-index:100;align-items:center;justify-content:center;}
.m-overlay.on{display:flex;}
.m-panel{background:#fff;border-radius:20px;padding:1.8rem;min-width:268px;max-width:320px;text-align:center;max-height:90vh;overflow-y:auto;}
.m-panel h3{color:var(--rose);margin-bottom:1.1rem;font-size:1.1rem;}
.m-panel .btn{width:100%;margin-bottom:.6rem;font-size:.86rem;}
.slabel{font-size:.76rem;color:var(--tm);margin-bottom:.38rem;text-align:left;}
.sslot{border:1.5px solid var(--pk2);border-radius:10px;padding:.55rem .78rem;margin-bottom:.38rem;cursor:pointer;transition:all .2s;text-align:left;}
.sslot:hover{background:var(--pk1);}
.sslot-n{font-weight:700;color:var(--rose);font-size:.8rem;}
.sslot-i{color:var(--tm);font-size:.72rem;margin-top:.1rem;}

/* ENDING */
#s-end{align-items:center;justify-content:center;flex-direction:column;}
.end-bg{position:absolute;top:0;left:0;width:100%;height:100%;}
.end-box{position:relative;z-index:2;text-align:center;padding:2rem;max-width:480px;width:95%;overflow-y:auto;max-height:100vh;}
.end-type{font-size:1rem;letter-spacing:.32em;margin-bottom:.9rem;text-shadow:0 0 20px currentColor;}
.good-e{color:#ff6b9d;}.bad-e{color:#a0a0d0;}
.end-cname{font-size:clamp(1.5rem,5vw,2.4rem);font-weight:700;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.5);margin-bottom:.8rem;}
.end-txt{color:rgba(255,255,255,.92);font-size:clamp(.8rem,2.2vw,.96rem);line-height:1.95;text-shadow:0 1px 5px rgba(0,0,0,.5);background:rgba(0,0,0,.32);border-radius:12px;padding:1.2rem;margin-bottom:1.4rem;white-space:pre-line;}
.fheart{position:fixed;animation:fh 2.2s ease-out forwards;font-size:1.5rem;pointer-events:none;z-index:5;}
@keyframes fh{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(.3);opacity:0}}

/* LOAD */
#s-load{background:linear-gradient(160deg,#fff0f5 0%,#fce4ec 100%);align-items:center;justify-content:center;}
.lpanel{background:#fff;border-radius:20px;padding:2rem;width:90%;max-width:380px;box-shadow:0 10px 40px rgba(194,24,91,.18);}
.lpanel h2{color:var(--rose);text-align:center;margin-bottom:1.4rem;font-size:1.2rem;}

/* NOTIF */
.notif{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(233,30,99,.88);color:#fff;padding:.45rem 1.4rem;border-radius:20px;font-size:1rem;font-weight:700;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--pk2);border-radius:10px}
</style>
</head>
<body>

<!-- TITLE -->
<div id="s-title" class="screen active">
  <div class="sakura-wrap" id="sakura"></div>
  <div class="title-box">
    <p class="t-subtitle">♦ 恋する星屑の物語 ♦</p>
    <h1 class="t-logo">ときめき<span>★</span>ルミナンス</h1>
    <p style="font-size:.78rem;color:var(--tl);letter-spacing:.18em;margin-bottom:.5rem;">～星屑の約束～</p>
    <div class="deco-row"><div class="dl"></div><div class="dd"></div><div class="dl r"></div></div>
    <div class="btns">
      <button class="btn btn-p" onclick="startNew()">✦ はじめから</button>
      <button class="btn btn-s" onclick="openLoad()">◆ つづきから</button>
      <button class="btn btn-g" onclick="goHome()" style="min-width:160px;font-size:.82rem;">🏠 ホームに戻る</button>
    </div>
    <p style="font-size:.68rem;color:var(--tl);margin-top:1.5rem;opacity:.7;">攻略対象5人 / セーブ機能あり</p>
  </div>
</div>

<!-- NAME INPUT -->
<div id="s-name" class="screen">
  <button class="hbtn" onclick="show('s-title')">← タイトル</button>
  <div class="name-card">
    <h2>✦ 主人公の名前</h2>
    <p>あなたの名前を入力してください</p>
    <input type="text" class="n-input" id="pname" placeholder="例：花咲 詩織" maxlength="10">
    <p style="font-size:.76rem;color:var(--tl);margin-bottom:1.2rem;">未入力は「詩織」になります</p>
    <button class="btn btn-p" onclick="confirmName()">決定 ✦</button>
  </div>
</div>

<!-- CHAR SELECT -->
<div id="s-csel" class="screen">
  <div class="csel-hdr">
    <button class="hbtn-rel" onclick="show('s-title')">← タイトル</button>
    <h2 id="csel-title">誰と過ごしますか？</h2>
    <p id="csel-sub">気になる彼を選んでください</p>
  </div>
  <div class="cgrid" id="cgrid"></div>
</div>

<!-- VN SCREEN -->
<div id="s-vn" class="screen">
  <div class="vn-bg" id="vn-bg"></div>
  <div class="vn-top">
    <button class="mbtn" onclick="toggleMenu()">☰ メニュー</button>
    <div class="ep-lbl" id="ep-lbl"></div>
    <div class="aff-chip" id="aff-chip">❤ <span id="aff-num">0</span></div>
  </div>
  <div class="vn-char" id="vn-char"></div>
  <div class="vn-tbox-wrap">
    <div class="vn-tbox" id="vn-tbox" onclick="advance()">
      <div class="vn-spk" id="vn-spk" style="display:none;"></div>
      <div id="vn-body"></div>
      <div class="vn-nxt" id="vn-nxt">▶</div>
    </div>
  </div>
</div>

<!-- ENDING -->
<div id="s-end" class="screen">
  <div class="end-bg" id="end-bg"></div>
  <div class="end-box">
    <p class="end-type" id="end-type"></p>
    <p class="end-cname" id="end-cname"></p>
    <div class="end-txt" id="end-txt"></div>
    <button class="btn btn-p" onclick="show('s-csel');renderGrid()">キャラクター選択へ</button><br><br>
    <button class="btn btn-g" style="color:#fff;border-color:rgba(255,255,255,.4);" onclick="show('s-title')">タイトルへ</button>
  </div>
</div>

<!-- LOAD SCREEN -->
<div id="s-load" class="screen">
  <button class="hbtn" onclick="show('s-title')">← タイトル</button>
  <div class="lpanel">
    <h2>◆ セーブデータ</h2>
    <div id="lslots"></div>
    <button class="btn btn-g" style="width:100%;margin-top:.5rem;" onclick="show('s-title')">戻る</button>
  </div>
</div>

<!-- MENU OVERLAY -->
<div class="m-overlay" id="moverlay">
  <div class="m-panel">
    <h3>☰ メニュー</h3>
    <p class="slabel">💾 セーブスロット（タップで保存）</p>
    <div id="mslots"></div>
    <hr style="border:none;border-top:1px solid #f0d0e0;margin:.8rem 0;">
    <button class="btn btn-s" onclick="closeMenu();show('s-csel');renderGrid()">← キャラクター選択</button>
    <button class="btn btn-g" onclick="toTitle()">🏠 タイトルへ</button>
    <button class="btn btn-p" onclick="closeMenu()">✕ 閉じる</button>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// ════════════════════ DATA ════════════════════
const CHARS = {
  rin:{id:'rin',name:'蒼井 凜',short:'凜',age:18,role:'生徒会長',
    type:'クール王子様系',col:'#4a90d9',dark:'#1a3a70',
    bg:'linear-gradient(160deg,#060e1e 0%,#0d1e40 50%,#142d60 100%)',
    ebg:'linear-gradient(160deg,#04080f 0%,#0a1628 60%,#0f2248 100%)'},
  haruto:{id:'haruto',name:'桐嶋 陽斗',short:'陽斗',age:17,role:'サッカー部エース',
    type:'元気な太陽系',col:'#e89010',dark:'#8a5000',
    bg:'linear-gradient(160deg,#180d00 0%,#361a00 50%,#543000 100%)',
    ebg:'linear-gradient(160deg,#0f0800 0%,#271200 60%,#3c1c00 100%)'},
  yoru:{id:'yoru',name:'黒瀬 夜',short:'夜',age:18,role:'軽音楽部ギタリスト',
    type:'謎めいた孤高系',col:'#9b59b6',dark:'#4a1070',
    bg:'linear-gradient(160deg,#06000e 0%,#120022 50%,#1e0038 100%)',
    ebg:'linear-gradient(160deg,#03000a 0%,#0a0018 60%,#15002a 100%)'},
  haruki:{id:'haruki',name:'白鳥 春樹',short:'春樹',age:17,role:'文芸部副部長',
    type:'純粋ロマンチスト',col:'#27ae60',dark:'#0e5028',
    bg:'linear-gradient(160deg,#021008 0%,#072814 50%,#0f4020 100%)',
    ebg:'linear-gradient(160deg,#010a05 0%,#041a0c 60%,#09302a 100%)'},
  kyo:{id:'kyo',name:'紫藤 京一郎',short:'京一郎',age:19,role:'美術部部長',
    type:'謎の芸術家系',col:'#5568b0',dark:'#1c2870',
    bg:'linear-gradient(160deg,#04050e 0%,#0c1028 50%,#141a40 100%)',
    ebg:'linear-gradient(160deg,#020309 0%,#08100c 60%,#101828 100%)'}
};

// ════════════════════ SPRITES ════════════════════
function sprite(id, expr){
  const C = CHARS[id];
  const c = C.col, d = C.dark;
  const sprites = {
    rin:{
      d:`<svg viewBox="0 0 200 380" xmlns="http://www.w3.org/2000/svg">
        <defs><radialGradient id="sk${id}"><stop offset="0%" stop-color="#fde8d8"/><stop offset="100%" stop-color="#f5c9a8"/></radialGradient></defs>
        <!-- body/uniform -->
        <rect x="55" y="170" width="90" height="130" rx="8" fill="#1a2a4a"/>
        <rect x="70" y="170" width="60" height="20" fill="#fff" opacity=".9"/>
        <polygon points="100,170 88,195 112,195" fill="${c}" opacity=".8"/>
        <!-- tie -->
        <rect x="96" y="190" width="8" height="55" rx="3" fill="${c}"/>
        <!-- arms -->
        <rect x="25" y="175" width="32" height="80" rx="12" fill="#1a2a4a"/>
        <rect x="143" y="175" width="32" height="80" rx="12" fill="#1a2a4a"/>
        <!-- hands -->
        <ellipse cx="41" cy="258" rx="13" ry="10" fill="url(#sk${id})"/>
        <ellipse cx="159" cy="258" rx="13" ry="10" fill="url(#sk${id})"/>
        <!-- neck -->
        <rect x="88" y="148" width="24" height="28" rx="8" fill="url(#sk${id})"/>
        <!-- head -->
        <ellipse cx="100" cy="110" rx="46" ry="50" fill="url(#sk${id})"/>
        <!-- silver hair -->
        <ellipse cx="100" cy="74" rx="48" ry="30" fill="#c8d8f0"/>
        <rect x="52" y="74" width="22" height="55" rx="11" fill="#c0d0ee"/>
        <rect x="126" y="74" width="22" height="55" rx="11" fill="#c0d0ee"/>
        <rect x="70" y="60" width="60" height="20" rx="10" fill="#d0e0f8"/>
        <rect x="80" y="52" width="40" height="18" rx="9" fill="#c8d8f0"/>
        <!-- eyes -->
        <ellipse cx="82" cy="108" rx="9" ry="${expr==='bl'?4:9}" fill="#1a4a8a"/>
        <ellipse cx="118" cy="108" rx="9" ry="${expr==='bl'?4:9}" fill="#1a4a8a"/>
        <circle cx="84" cy="106" r="3" fill="#fff" opacity=".7"/>
        <circle cx="120" cy="106" r="3" fill="#fff" opacity=".7"/>
        ${expr==='bl'?'<line x1="73" y1="105" x2="91" y2="105" stroke="#c0d0ee" stroke-width="2"/><line x1="109" y1="105" x2="127" y2="105" stroke="#c0d0ee" stroke-width="2"/>':''}
        <!-- eyebrows -->
        <path d="M73,97 Q82,93 91,97" stroke="#8090b0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M109,97 Q118,93 127,97" stroke="#8090b0" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <!-- mouth -->
        <path d="${expr==='h'?'M92,130 Q100,136 108,130':'M94,130 Q100,133 106,130'}" stroke="#d08090" stroke-width="2" fill="none" stroke-linecap="round"/>

      txt:`「友達でいようぜ！」って言ってくれた陽斗の笑顔は、\n今日も太陽みたいだ。\n\n……少しだけ、眩しくて苦しい。`}
  },
  yoru:{
    good:{type:'PRECIOUS END',bg:'linear-gradient(160deg,#0a001a 0%,#1a0030 50%,#2a0050 100%)',
      txt:`「夜明け」を演奏し終えた夜は、\n袖に戻ってきて、静かに言った。\n\n「俺の隣にいてくれ。音楽と、お前だけがいれば十分だ」\n\n不器用な言葉だけど、\nこれが彼の全力の愛情だと分かる。\n\n暗い夜の向こうに、夜明けがある。\nそれを教えてくれたのは、私のほうだったかもしれない。` },
    bad:{type:'DISTANT END',bg:'linear-gradient(160deg,#050010 0%,#100020 100%)',
      txt:`夜はまた、音楽室に一人でいる。\nドアの向こうから聞こえるギターの音。\n\n──いつか、開けてもらえる日が来るといい。`}
  },
  haruki:{
    good:{type:'STORY END',bg:'linear-gradient(160deg,#021008 0%,#082a14 50%,#104528 100%)',
      txt:`「僕たちの物語を書きましょう」と春樹くんは言った。\n\n金木犀の香りの中庭で、\n彼は私の手を取って、ゆっくりと歩き出した。\n\n「この瞬間を、詩にしていいですか」\n\nもちろん。だってこれは、私たちの物語だから。\n\n──続きは、これから二人で。` },
    bad:{type:'READER END',bg:'linear-gradient(160deg,#04180c 0%,#082818 100%)',
      txt:`春樹くんとは、読書の友だ。\n図書室で並んで本を読む午後が続く。\n\n彼の書く詩は、今日も美しい。\nいつか、私のことを書いてくれる日が来るかな。`}
  },
  kyo:{
    good:{type:'MASTERPIECE END',bg:'linear-gradient(160deg,#080818 0%,#101828 50%,#1a2840 100%)',
      txt:`「君が俺の一番の傑作だ」\n\n展覧会の夜、アトリエに二人きり。\n油絵の香りの中で、京一郎さんは私の手を取った。\n\n「描き続けていいか。ずっと」\n\nその手は絵の具だらけで、少し不器用で、\n温かかった。\n\n──この人の隣で、永遠の絵の中に生きていたい。` },
    bad:{type:'CANVAS END',bg:'linear-gradient(160deg,#06080e 0%,#0e1020 100%)',
      txt:`京一郎さんは今日も絵を描いている。\n\nあの大きなキャンバスに、私の姿が残っている。\nそれだけで──十分かな。\n\n……本当は、もっと近くにいたかったけれど。`}
  }
};

// ════════════════════ STATE ════════════════════
let G = {name:'詩織',cid:null,ep:0,step:0,aff:{rin:0,haruto:0,yoru:0,haruki:0,kyo:0},cleared:{}};
let sceneQueue=[],inChoice=false;

function initG(){G={name:'詩織',cid:null,ep:0,step:0,aff:{rin:0,haruto:0,yoru:0,haruki:0,kyo:0},cleared:{}};}

// ════════════════════ SAVE ════════════════════
const SLOTS=3;
function saves(){try{return JSON.parse(localStorage.getItem('otome_saves')||'[]')||[];}catch{return [];}}
function writeSave(i,d){const s=saves();s[i]=d;localStorage.setItem('otome_saves',JSON.stringify(s));}
function saveState(i){
  const d={...G,ts:new Date().toLocaleString('ja-JP')};
  writeSave(i,d);
  notify('SAVE '+(i+1)+' に保存しました');
  renderMenuSlots();
}
function loadState(d){
  G={...d};
  closeMenu();
  if(G.cid)startEpisode(G.cid,G.ep);
  else{show('s-csel');renderGrid();}
}

function renderSlots(el,onSave){
  const sl=saves();el.innerHTML='';
  for(let i=0;i<SLOTS;i++){
    const s=sl[i];
    const d=document.createElement('div');
    d.className='sslot';
    d.innerHTML=`<div class="sslot-n">SLOT ${i+1}</div><div class="sslot-i">${s?`${s.ts}　${s.cid?CHARS[s.cid].name:'タイトル画面'} Ep.${(s.ep||0)+1}`:'── 空き ──'}</div>`;
    if(onSave){d.onclick=()=>saveState(i);}
    else if(s){d.onclick=()=>loadState(s);}
    el.appendChild(d);
  }
}
function renderMenuSlots(){renderSlots(document.getElementById('mslots'),true);}
function renderLoadSlots(){renderSlots(document.getElementById('lslots'),false);}
function openLoad(){renderLoadSlots();show('s-load');}

// ════════════════════ UI HELPERS ════════════════════
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function notify(msg){
  const n=document.getElementById('notif');
  n.textContent=msg;n.style.opacity='1';
  setTimeout(()=>n.style.opacity='0',1800);
}
function toggleMenu(){document.getElementById('moverlay').classList.toggle('on');renderMenuSlots();}
function closeMenu(){document.getElementById('moverlay').classList.remove('on');}
function toTitle(){closeMenu();show('s-title');}
function goHome(){
  const h=window.location.href.replace(/\/[^\/]*$/,'/');
  window.location.href=h+'index.html';
}

// ════════════════════ TITLE / NAME ════════════════════
function startNew(){initG();show('s-name');document.getElementById('pname').value='';}
function confirmName(){
  const v=document.getElementById('pname').value.trim();
  G.name=v||'詩織';
  // play prologue then char select
  G.cid=null;
  sceneQueue=SCENES.prologue;G.step=0;
  show('s-vn');
  document.getElementById('ep-lbl').textContent='プロローグ';
  document.getElementById('aff-chip').style.display='none';
  document.getElementById('vn-bg').style.background='linear-gradient(160deg,#0a0610 0%,#100820 50%,#180c30 100%)';
  document.getElementById('vn-char').innerHTML='';
  advanceScene();
}

// ════════════════════ CHAR SELECT ════════════════════
function renderGrid(){
  const g=document.getElementById('cgrid');
  g.innerHTML='';
  document.getElementById('csel-title').textContent=`${G.name}の恋物語`;
  document.getElementById('csel-sub').textContent='誰と過ごしますか？';
  Object.values(CHARS).forEach(C=>{
    const ep=G.cleared[C.id]||0;
    const aff=G.aff[C.id]||0;
    const pct=Math.min(100,Math.round(aff/60*100));
    const cleared=ep>=3;
    const div=document.createElement('div');
    div.className='ccard'+(cleared?' sel':'');
    div.innerHTML=`
      ${cleared?'<div class="cbadge">✦ 攻略済み</div>':''}
      <div class="cpa">${sprite(C.id,'d')}</div>
      <div class="cinfo">
        <div class="cname">${C.name}</div>
        <div class="crole">${C.role}</div>
        <div class="aff-bar"><div class="aff-fill" style="width:${pct}%;background:${C.col}"></div></div>
        <div class="ep-dots">${[0,1,2].map(i=>`<div class="ep-dot${i<ep?' done':''}"></div>`).join('')}</div>
      </div>`;
    div.onclick=()=>selectChar(C.id);
    g.appendChild(div);
  });
}

function selectChar(cid){
  G.cid=cid;
  const ep=G.cleared[cid]||0;
  if(ep>=3){showEnd(cid);return;}
  startEpisode(cid,ep);
}

// ════════════════════ EPISODE ════════════════════
function startEpisode(cid,ep){
  G.cid=cid;G.ep=ep;G.step=0;
  const C=CHARS[cid];
  const key=`${cid}_ep${ep+1}`;
  sceneQueue=SCENES[key]||[];
  show('s-vn');
  document.getElementById('vn-bg').style.background=C.bg;
  document.getElementById('ep-lbl').textContent=`${C.name} ／ Ep.${ep+1}`;
  document.getElementById('aff-chip').style.display='flex';
  document.getElementById('aff-num').textContent=G.aff[cid]||0;
  advanceScene();
}

// ════════════════════ SCENE ENGINE ════════════════════
function advance(){if(!inChoice)advanceScene();}

function advanceScene(){
  if(G.step>=sceneQueue.length){
    endEpisode();return;
  }
  const sc=sceneQueue[G.step++];
  renderScene(sc);
}

function renderScene(sc){
  const body=document.getElementById('vn-body');
  const spk=document.getElementById('vn-spk');
  const nxt=document.getElementById('vn-nxt');
  const charDiv=document.getElementById('vn-char');
  inChoice=false;
  nxt.style.display='flex';

  if(sc.t==='n'){
    spk.style.display='none';
    body.innerHTML=`<div class="vn-narr">${sc.v}</div>`;
    charDiv.innerHTML='';
  } else if(sc.t==='p'){
    spk.style.display='inline-block';
    spk.textContent=G.name;
    spk.style.background='linear-gradient(135deg,#c2185b,#880e4f)';
    body.innerHTML=`<div class="vn-txt">${sc.v}</div>`;
    charDiv.innerHTML='';
  } else if(sc.t==='c'){
    const C=CHARS[sc.c];
    spk.style.display='inline-block';
    spk.textContent=sc.sp||C.name;
    spk.style.background=`linear-gradient(135deg,${C.col},${C.dark})`;
    body.innerHTML=`<div class="vn-txt">${sc.v}</div>`;
    charDiv.innerHTML=sprite(sc.c,sc.e||'d');
  } else if(sc.t==='ch'){
    inChoice=true;
    nxt.style.display='none';
    spk.style.display='none';
    body.innerHTML=`<div class="q-lbl">${sc.q}</div><div class="choices">${sc.cs.map((c,i)=>`<button class="cbtn" onclick="choose(${i})">${c.v}</button>`).join('')}</div>`;
  }
}

function choose(i){
  const sc=sceneQueue[G.step-1];
  if(sc.t!=='ch')return;
  const chosen=sc.cs[i];
  G.aff[G.cid]=(G.aff[G.cid]||0)+(chosen.a||0);
  document.getElementById('aff-num').textContent=G.aff[G.cid];
  if(chosen.a>=10) spawnHeart();
  inChoice=false;
  advanceScene();
}

function endEpisode(){
  const ep=G.ep;
  G.cleared[G.cid]=(G.cleared[G.cid]||0)+1;
  G.ep++;
  if(G.ep>=3){showEnd(G.cid);}
  else{
    notify(`Ep.${ep+1} クリア！ ❤ +好感度獲得`);
    setTimeout(()=>{show('s-csel');renderGrid();},1200);
  }
}

function showEnd(cid){
  const C=CHARS[cid];
  const aff=G.aff[cid]||0;
  const isGood=aff>=35;
  const e=ENDS[cid][isGood?'good':'bad'];
  document.getElementById('end-bg').style.background=e.bg;
  document.getElementById('end-type').textContent=e.type;
  document.getElementById('end-type').className='end-type '+(isGood?'good-e':'bad-e');
  document.getElementById('end-cname').textContent=C.name;
  document.getElementById('end-txt').textContent=e.txt;
  show('s-end');
  if(isGood){for(let i=0;i<12;i++)setTimeout(()=>spawnHeart(true),i*200);}
}

function spawnHeart(big=false){
  const h=document.createElement('div');
  h.className='fheart';
  h.textContent=big?'💖':'❤';
  h.style.left=Math.random()*80+10+'vw';
  h.style.top=Math.random()*60+20+'vh';
  if(big)h.style.fontSize='2.5rem';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),2200);
}

// ════════════════════ SAKURA ════════════════════
function makeSakura(){
  const wrap=document.getElementById('sakura');
  const colors=['#ffb7c5','#ffd0db','#ff8fab','#ffc2d4','#ffafc7'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='petal';
    const sz=Math.random()*10+6;
    p.style.cssText=`width:${sz}px;height:${sz*.7}px;background:${colors[Math.floor(Math.random()*colors.length)]};opacity:${Math.random()*.6+.4};left:${Math.random()*110-5}%;animation-duration:${Math.random()*6+5}s;animation-delay:${Math.random()*5}s;`;
    wrap.appendChild(p);
  }
}

// ════════════════════ BOOT ════════════════════
window.onload=()=>{
  makeSakura();
  // load persistent affinity/progress
  try{
    const sv=localStorage.getItem('otome_G');
    if(sv){const d=JSON.parse(sv);G.aff=d.aff||G.aff;G.cleared=d.cleared||G.cleared;G.name=d.name||G.name;}
  }catch{}
};
// auto-persist on advance
setInterval(()=>{
  try{localStorage.setItem('otome_G',JSON.stringify({aff:G.aff,cleared:G.cleared,name:G.name}));}catch{}
},3000);
</script>
