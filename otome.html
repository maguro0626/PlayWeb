      </svg>
    );

    const CHAR_COMPONENTS = { rinto: CharRinto, souma: CharSouma, kaito: CharKaito, aoi: CharAoi, hayate: CharHayate };

    const Background = ({ bgId }) => {
      switch(bgId) {
        case 'school_entrance':
          return (
            <svg className="absolute inset-0 w-full h-full object-cover" viewBox="0 0 1920 1080" preserveAspectRatio="none">
              <rect width="1920" height="1080" fill="#e0f2fe" />
              <rect y="700" width="1920" height="380" fill="#d4d4d8" />
              <path d="M200,700 L200,300 L600,200 L1700,200 L1700,700 Z" fill="#fff" stroke="#cbd5e1" strokeWidth="4"/>
              <rect x="800" y="500" width="300" height="200" fill="#38bdf8" opacity="0.2"/>
              <circle cx="1600" cy="200" r="100" fill="#fde047" opacity="0.8"/>
            </svg>
          );
        case 'observatory_night':
          return (
            <svg className="absolute inset-0 w-full h-full object-cover" viewBox="0 0 1920 1080" preserveAspectRatio="none">
              <defs><linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#0f172a"/><stop offset="100%" stopColor="#1e1b4b"/></linearGradient></defs>
              <rect width="1920" height="1080" fill="url(#sky)" />
              <circle cx="1500" cy="300" r="120" fill="#f8fafc" opacity="0.9" />
              <path d="M400,1080 L1520,1080 L1300,500 L600,500 Z" fill="#0f172a" opacity="0.9" />
              <polygon points="960,300 1100,500 820,500" fill="#334155" />
              <circle cx="200" cy="150" r="2" fill="#fff" opacity="0.8"/><circle cx="500" cy="250" r="3" fill="#fff" opacity="0.6"/><circle cx="800" cy="100" r="2" fill="#fff" opacity="0.9"/><circle cx="1200" cy="200" r="1.5" fill="#fff" opacity="0.5"/>
            </svg>
          );
        case 'cg_rinto_1':
          return (
            <div className="absolute inset-0 w-full h-full bg-navy flex items-center justify-center text-white">
              <svg className="absolute inset-0 w-full h-full object-cover opacity-30" viewBox="0 0 1920 1080"><rect width="1920" height="1080" fill="#0f172a"/><circle cx="960" cy="540" r="400" fill="#fde047" opacity="0.1"/></svg>
              <div className="z-10 text-center">
                <div className="text-4xl font-serif text-gold mb-4 border-b border-gold pb-2">CG: 天文台の星図</div>
                <p className="text-lg opacity-80">凛斗が優しく微笑みかけるスチルイラスト</p>
              </div>
            </div>
          );
        default:
          return <div className="absolute inset-0 w-full h-full bg-surface2" />;
      }
    };

    // ==========================================
    // 4. MAIN COMPONENT & STATE
    // ==========================================
    const App = () => {
      const [screen, setScreen] = useState('title'); // title, main, vn, status
      const [gameState, setGameState] = useState(INIT_STATE);
      const [currentEvent, setCurrentEvent] = useState(null);
      const [showToast, setShowToast] = useState(null);

      const triggerToast = (msg) => {
        setShowToast(msg);
        setTimeout(() => setShowToast(null), 3000);
      };

      const checkEvents = (state) => {
        // イベント発生条件の判定
        if (!state.flags.prologue_cleared) return "prologue";
        
        // 凛斗の天文台イベント
        if (!state.flags.rinto_starmap_cleared && state.date.year === 1 && state.date.month >= 7 && state.stats.intelligence >= 200) {
          return "rinto_starmap";
        }

        // エンディング判定 (3年3月4週を越えたら)
        if (state.date.year === 4 || (state.date.year === 3 && state.date.month === 4)) {
           if (state.affection.rinto >= 80) return "ending_happy_rinto";
           return "ending_normal";
        }
        
        return null;
      };

      const advanceTime = (state) => {
        let { year, month, week } = state.date;
        week += 1;
        if (week > 4) {
          week = 1;
          let monthIdx = MONTHS.indexOf(month) + 1;
          if (monthIdx >= MONTHS.length) {
            monthIdx = 0;
            year += 1;
          }
          month = MONTHS[monthIdx];
        }
        return { year, month, week };
      };

      const executeCommand = (cmd) => {
        if (gameState.actionsLeft <= 0) return;
        if (gameState.stats.stamina + cmd.cost < 0) {
          triggerToast("体力が足りません！ 休息してください。");
          return;
        }

        let newState = { ...gameState };
        
        // パラメータ変動
        newState.stats.stamina += cmd.cost;
        if (newState.stats.stamina > newState.stats.maxStamina) newState.stats.stamina = newState.stats.maxStamina;
        
        let changes = [];
        if (cmd.effects) {
          for (let key in cmd.effects) {
            const [min, max] = cmd.effects[key];
            const val = randomRange(min, max);
            newState.stats[key] += val;
            if(newState.stats[key] > 999 && key !== 'maxStamina') newState.stats[key] = 999;
            changes.push(`${key === 'intelligence' ? '知性' : key === 'sports' ? '運動' : key === 'fashion' ? 'ファッション' : key === 'music' ? '音楽' : key === 'domestic' ? '家事' : '最大体力'} +${val}`);
          }
        }
        triggerToast(`${cmd.label}を実行: ${changes.join(', ')}`);

        // ランダム遭遇
        if (cmd.encounter && cmd.encounter.length > 0 && Math.random() < 0.4) {
          let charId = cmd.encounter[Math.floor(Math.random() * cmd.encounter.length)];
          if (charId === "all") charId = Object.keys(CHARACTERS)[Math.floor(Math.random() * 5)];
          if (charId && charId !== 'rival') {
            newState.affection[charId] += randomRange(3, 8);
            setTimeout(() => triggerToast(`${CHARACTERS[charId].name}を見かけた！好感度UP`), 1000);
          }
        }

        newState.actionsLeft -= 1;
        
        // ターン終了処理
        if (newState.actionsLeft <= 0) {
          newState.date = advanceTime(newState);
          newState.actionsLeft = 2; // 簡略化のため常に2回
          
          // ボム増加処理 (放置キャラの好感度が少し下がり、ライバルが上がる等)
          // 割愛
        }

        setGameState(newState);

        const evId = checkEvents(newState);
        if (evId) {
          setCurrentEvent(evId);
          setScreen('vn');
        }
      };

      // デバッグ用関数
      const debugAdvanceTime = () => {
        let newState = { ...gameState };
        newState.date = advanceTime(newState);
        setGameState(newState);
        const evId = checkEvents(newState);
        if (evId) { setCurrentEvent(evId); setScreen('vn'); }
      };
      
      const debugMaxParams = () => {
        setGameState(s => ({
          ...s,
          stats: { intelligence: 500, sports: 500, fashion: 500, music: 500, domestic: 500, stamina: 200, maxStamina: 200 },
          affection: { rinto: 80, souma: 80, kaito: 80, aoi: 80, hayate: 80, rival: 0 }
        }));
        triggerToast("パラメータMAX化しました");
      };

      return (
        <div className="game-container font-sans text-ink flex flex-col">
          {screen === 'title' && <TitleScreen setScreen={setScreen} setGameState={setGameState} INIT_STATE={INIT_STATE} setCurrentEvent={setCurrentEvent} checkEvents={checkEvents} />}
          {screen === 'main' && (
             <MainScreen 
               state={gameState} 
               setScreen={setScreen} 
               executeCommand={executeCommand} 
               debugAdvanceTime={debugAdvanceTime}
               debugMaxParams={debugMaxParams}
             />
          )}
          {screen === 'vn' && currentEvent && (
             <VNScreen 
               eventId={currentEvent} 
               eventsDef={EVENTS} 
               state={gameState} 
               setState={setGameState} 
               setScreen={setScreen} 
               setCurrentEvent={setCurrentEvent} 
             />
          )}
          {screen === 'status' && <StatusScreen state={gameState} setScreen={setScreen} />}

          {/* Toast Notification */}
          {showToast && (
            <div className="absolute top-4 left-1/2 transform -translate-x-1/2 bg-ink/80 text-white px-6 py-3 rounded-full text-sm font-bold z-50 animate-bounce">
              {showToast}
            </div>
          )}
        </div>
      );
    };

    // ==========================================
    // TITLE SCREEN
    // ==========================================
    const TitleScreen = ({ setScreen, setGameState, INIT_STATE, setCurrentEvent, checkEvents }) => {
      const handleStart = () => {
        setGameState(INIT_STATE);
        const evId = checkEvents(INIT_STATE);
        if(evId) {
          setCurrentEvent(evId);
          setScreen('vn');
        } else {
          setScreen('main');
        }
      };

      return (
        <div className="w-full h-full relative flex items-center justify-center bg-gradient-to-br from-navy via-rose-dark to-ink">
          <div className="absolute inset-0 overflow-hidden">
            <div className="absolute top-[20%] left-[80%] w-64 h-64 bg-gold rounded-full mix-blend-screen filter blur-3xl opacity-20 animate-pulse"></div>
            <div className="absolute top-[60%] left-[20%] w-96 h-96 bg-rose rounded-full mix-blend-screen filter blur-3xl opacity-20 animate-pulse" style={{animationDelay: '1s'}}></div>
          </div>
          
          <div className="z-10 text-center px-8 py-12 bg-surface/10 backdrop-blur-md rounded-2xl border border-surface/20 w-[90%] max-w-md">
            <p className="text-gold tracking-widest text-xs mb-4 font-serif uppercase">Serenade on the Starlit Hill</p>
            <h1 className="text-4xl md:text-5xl font-serif text-white font-bold mb-12 drop-shadow-lg">星降る丘のセレナーデ</h1>
            
            <div className="flex flex-col gap-4 w-64 mx-auto">
              <button onClick={handleStart} className="py-3 px-6 bg-rose text-white rounded-full font-bold shadow-lg hover:bg-rose-dark transition-all transform hover:scale-105">
                はじめから
              </button>
              <button className="py-3 px-6 bg-surface/20 text-white rounded-full font-bold hover:bg-surface/30 transition-all border border-surface/30">
                つづきから (未実装)
              </button>
<a href="index.html" className="py-3 px-6 bg-surface/20 text-white rounded-full font-bold hover:bg-surface/30 transition-all border border-surface/30 block text-center">
    ホームに戻る
  </a>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // MAIN SCREEN (Command Selection)
    // ==========================================
    const MainScreen = ({ state, setScreen, executeCommand, debugAdvanceTime, debugMaxParams }) => {
      const { year, month, week } = state.date;
      
      return (
        <div className="w-full h-full bg-surface2 flex flex-col">
          {/* Header */}
          <div className="bg-surface border-b border-border p-4 flex justify-between items-center shadow-sm z-10">
            <div>
              <h2 className="text-xl font-serif font-bold text-rose-dark">
                {year}年 {month}月 第{week}週
              </h2>
              <p className="text-xs text-muted">残り行動回数: {state.actionsLeft}</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setScreen('status')} className="p-2 bg-rose-light text-rose-dark rounded-full hover:bg-petal transition">
                <i className="ph ph-user text-xl"></i>
              </button>
              {/* Debug Menu */}
              <div className="group relative">
                <button className="p-2 bg-gray-200 text-gray-600 rounded-full hover:bg-gray-300 transition">
                  <i className="ph ph-bug text-xl"></i>
                </button>
                <div className="absolute right-0 top-12 bg-white border border-gray-200 p-2 rounded shadow-lg hidden group-hover:block w-32 z-50">
                  <button onClick={debugAdvanceTime} className="block w-full text-left text-xs p-2 hover:bg-gray-100">1週進める</button>
                  <button onClick={debugMaxParams} className="block w-full text-left text-xs p-2 hover:bg-gray-100">パラMAX化</button>
                </div>
              </div>
            </div>
          </div>

          {/* Status Bar Quick View */}
          <div className="bg-ink text-white p-2 flex items-center justify-center gap-4 text-xs font-bold shadow-inner">
            <div className="flex items-center gap-1">❤️ 体力 <div className="w-24 h-2 bg-gray-700 rounded-full overflow-hidden"><div className="h-full bg-rose" style={{width: `${(state.stats.stamina/state.stats.maxStamina)*100}%`}}></div></div></div>
          </div>

          {/* Affection Quick View */}
          <div className="flex justify-center gap-4 py-3 bg-surface border-b border-border">
            {['rinto','souma','kaito','aoi','hayate'].map(c => (
               <div key={c} className="flex flex-col items-center">
                 <div className={`w-8 h-8 rounded-full ${CHARACTERS[c].color} flex items-center justify-center text-white font-serif text-xs border-2 border-white shadow-sm`}>
                   {CHARACTERS[c].name.split(' ')[1][0]}
                 </div>
                 <div className="text-[10px] text-muted mt-1 font-bold">♥ {state.affection[c]}</div>
               </div>
            ))}
          </div>

          {/* Commands Grid */}
          <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-surface2">
            <h3 className="text-sm font-bold text-muted mb-4 uppercase tracking-wider">行動コマンド選択</h3>
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
              {COMMANDS.map(cmd => (
                <button 
                  key={cmd.id}
                  onClick={() => executeCommand(cmd)}
                  disabled={state.actionsLeft <= 0}
                  className={`relative p-4 rounded-xl border ${state.actionsLeft > 0 ? 'bg-surface border-border hover:border-rose hover:shadow-md cursor-pointer' : 'bg-gray-100 border-gray-200 opacity-60 cursor-not-allowed'} transition-all flex flex-col items-center justify-center gap-2 group`}
                >
                  <div className="text-3xl bg-surface2 p-3 rounded-full group-hover:bg-rose-light transition-colors">{cmd.icon}</div>
                  <div className="font-bold text-sm text-ink">{cmd.label}</div>
                  <div className="text-[10px] text-muted">体力 {cmd.cost > 0 ? `-${cmd.cost}` : `+${-cmd.cost}`}</div>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // STATUS SCREEN
    // ==========================================
    const StatusScreen = ({ state, setScreen }) => {
      const STATS_MAP = {
        intelligence: { label: "知性", icon: "📚", color: "bg-blue-400" },
        sports: { label: "運動", icon: "⚽", color: "bg-orange-400" },
        fashion: { label: "ファッション", icon: "👗", color: "bg-pink-400" },
        music: { label: "音楽", icon: "🎵", color: "bg-green-400" },
        domestic: { label: "家事", icon: "🍳", color: "bg-yellow-400" },
      };

      return (
        <div className="w-full h-full bg-surface2 flex flex-col z-20">
          <div className="bg-surface p-4 flex items-center border-b border-border shadow-sm">
            <button onClick={() => setScreen('main')} className="p-2 bg-surface2 rounded-full hover:bg-border transition mr-4">
              <i className="ph ph-arrow-left text-xl"></i>
            </button>
            <h2 className="text-xl font-serif font-bold text-ink">ステータス</h2>
          </div>
          
          <div className="flex-1 overflow-y-auto p-6 max-w-2xl mx-auto w-full">
            <div className="bg-surface rounded-xl border border-border p-6 shadow-sm mb-6">
              <h3 className="text-sm font-bold text-rose-dark mb-4 border-b border-rose-light pb-2">主人公パラメータ</h3>
              <div className="space-y-4">
                {Object.entries(STATS_MAP).map(([key, info]) => (
                  <div key={key} className="flex items-center gap-3 text-sm">
                    <span className="w-6 text-center">{info.icon}</span>
                    <span className="w-24 text-muted font-bold">{info.label}</span>
                    <div className="flex-1 h-3 bg-surface2 rounded-full overflow-hidden border border-border">
                      <div className={`h-full ${info.color}`} style={{width: `${Math.min(100, (state.stats[key]/999)*100)}%`}}></div>
                    </div>
                    <span className="w-10 text-right font-mono text-ink">{state.stats[key]}</span>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-surface rounded-xl border border-border p-6 shadow-sm">
              <h3 className="text-sm font-bold text-rose-dark mb-4 border-b border-rose-light pb-2">好感度</h3>
              <div className="grid grid-cols-2 gap-4">
                {Object.entries(CHARACTERS).filter(([k]) => k!=='rival').map(([key, info]) => (
                  <div key={key} className="flex items-center gap-3 p-3 bg-surface2 rounded-lg border border-border">
                    <div className={`w-10 h-10 rounded-full ${info.color} flex items-center justify-center text-white font-serif shadow-sm`}>
                      {info.name.split(' ')[1][0]}
                    </div>
                    <div>
                      <div className="text-xs font-bold text-ink">{info.name}</div>
                      <div className="text-lg font-mono text-rose flex items-center gap-1">
                        <i className="ph-fill ph-heart"></i> {state.affection[key]}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // VISUAL NOVEL SCREEN
    // ==========================================
    const VNScreen = ({ eventId, eventsDef, state, setState, setScreen, setCurrentEvent }) => {
      const [currentBlock, setCurrentBlock] = useState(eventId);
      const [lineIdx, setLineIdx] = useState(0);
      const [animating, setAnimating] = useState(false);
      
      const ev = eventsDef[currentBlock];
      
      useEffect(() => {
        setAnimating(true);
        const timer = setTimeout(() => setAnimating(false), 500); // text animation time
        return () => clearTimeout(timer);
      }, [lineIdx, currentBlock]);

      if (!ev) {
        setScreen('main');
        return null;
      }

      const line = ev.lines[lineIdx];

      const handleNext = () => {
        if (animating) {
          setAnimating(false); // skip animation
          return;
        }
        if (line.type === 'choice') return; // wait for choice

        if (lineIdx + 1 < ev.lines.length) {
          setLineIdx(lineIdx + 1);
        } else {
          // Event end
          if (ev.onEnd) {
            const nextState = ev.onEnd(state);
            setState(nextState);
            // onEnd might have changed screen
            if (nextState.screen === 'title') return; 
          }
          setCurrentEvent(null);
          setScreen('main');
        }
      };

      const handleChoice = (opt) => {
        if (opt.affection) {
          let nextState = {...state};
          for(let char in opt.affection) {
            nextState.affection[char] += opt.affection[char];
          }
          setState(nextState);
        }
        setCurrentBlock(opt.next);
        setLineIdx(0);
      };

      // Extract character to show
      let charToShow = null;
      if (line && line.char && CHAR_COMPONENTS[line.char]) {
         const CharComp = CHAR_COMPONENTS[line.char];
         charToShow = <CharComp />;
      }

      return (
        <div className="w-full h-full relative flex flex-col bg-black overflow-hidden" onClick={handleNext}>
          {/* Background */}
          <Background bgId={ev.bg} />

          {/* Character */}
          <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 w-[90%] max-w-[400px] h-[80%] pointer-events-none transition-opacity duration-500">
             {charToShow}
          </div>

          {/* Choice Overlay */}
          {line && line.type === 'choice' && (
            <div className="absolute inset-0 flex flex-col items-center justify-center gap-4 bg-black/40 z-20 backdrop-blur-sm">
              {line.options.map((opt, i) => (
                <button 
                  key={i} 
                  onClick={(e) => { e.stopPropagation(); handleChoice(opt); }}
                  className="w-4/5 max-w-md py-4 px-6 bg-surface/90 border-2 border-rose rounded-xl text-rose-dark font-bold text-lg hover:bg-rose hover:text-white transition-all shadow-lg transform hover:-translate-y-1"
                >
                  {opt.label}
                </button>
              ))}
            </div>
          )}

          {/* Text Window */}
          {line && line.type !== 'choice' && (
            <div className="absolute bottom-4 left-4 right-4 md:left-1/2 md:-translate-x-1/2 md:w-full md:max-w-3xl z-30">
              <div className="bg-surface/90 backdrop-blur-md border border-white/40 rounded-xl shadow-2xl p-4 md:p-6 min-h-[140px] relative">
                {/* Speaker Name */}
                {line.speaker && (
                  <div className={`absolute -top-4 left-4 px-4 py-1 rounded-md font-bold text-sm text-white shadow-md ${CHARACTERS[line.speaker] ? CHARACTERS[line.speaker].color : 'bg-gray-600'}`}>
                    {CHARACTERS[line.speaker] ? CHARACTERS[line.speaker].name : line.speaker}
                  </div>
                )}
                {/* Text */}
                <div className="text-ink text-base md:text-lg leading-relaxed pt-2 font-serif">
                  {animating ? (
                     <span className="vn-text-reveal">{line.text}</span>
                  ) : (
                     <span>{line.text}</span>
                  )}
                </div>
                {/* Next Indicator */}
                {!animating && (
                  <div className="absolute bottom-4 right-4 text-rose animate-bounce">
                    <i className="ph-fill ph-caret-down text-xl"></i>
                  </div>
                )}
              </div>
            </div>
          )}
          
          {/* Debug skip */}
          <div className="absolute top-4 right-4 z-40">
            <button onClick={(e) => { e.stopPropagation(); handleNext(); }} className="bg-black/50 text-white text-xs px-2 py-1 rounded">Skip</button>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
