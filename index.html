<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayWeb</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .glass-header {
            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#f5f5f7] text-zinc-900 selection:bg-zinc-200 min-h-screen flex flex-col">

    <div id="app" class="flex-1 flex flex-col w-full"></div>

    <script>
        /**
         * アップデート情報
         */
        const UPDATE_INFO = {
            date: '2026/04/10 19:00',
            logs: [
                '修正：乙女ゲーム(大幅パワーアップ)'
            ]
        };

        /**
         * ゲームカタログのデータ定義
         */
        const GAME_CATALOG = [
            {
                id: 'reversi',
                title: 'オセロ',
                icon: 'circle-dot',
                gradient: 'from-zinc-200 to-zinc-400',
                iconColor: 'text-zinc-700',
                path: 'reversi.html',
                isPlayable: true
            },
            {
                id: 'shogi',
                title: '将棋',
                icon: 'hexagon',
                gradient: 'from-amber-100 to-orange-200',
                iconColor: 'text-amber-800',
                path: 'shogi.html',
                isPlayable: true
            },
            {
                id: 'minesweeper',
                title: 'マインスイーパー',
                icon: 'bomb',
                gradient: 'from-red-100 to-rose-300',
                iconColor: 'text-rose-800',
                path: 'minesweeper.html',
                isPlayable: true
            },
            {
                id: 'majan',
                title: '麻雀',
                icon: 'layout-grid',
                gradient: 'from-emerald-800 to-green-950',
                iconColor: 'text-yellow-300',
                path: 'majan.html',
                isPlayable: true
            },
            { 
                id: 'daihugou', 
                title: '大富豪', 
                icon: 'crown', 
                iconColor: 'text-amber-800', 
                gradient: 'from-yellow-300 to-amber-500', 
                path: 'daihugou.html',
		isPlayable: true
            },
            {
                id: 'hanahuda',
                title: '花札',
                icon: 'flower-2',
                gradient: 'from-red-900 to-rose-950',
                iconColor: 'text-rose-200',
                path: 'hanahuda.html',
                isPlayable: true
            },
            {
                id: 'tetris',
                title: 'テトリス',
                icon: 'blocks',
                gradient: 'from-cyan-400 to-blue-600',
                iconColor: 'text-white',
                path: 'tetris.html',
                isPlayable: true
            },
            {
                id: 'breakout',
                title: 'ブロック崩し',
                icon: 'square-stack',
                gradient: 'from-indigo-500 to-purple-700',
                iconColor: 'text-white',
                path: 'blockzushi.html',
                isPlayable: true
            },
            {
                id: 'suica',
                title: 'スイカゲーム',
  		icon: 'apple', 
  		gradient: 'from-green-400 to-red-500', 
  		iconColor: 'text-white',
                path: 'suica.html',
                isPlayable: true
            },
            {
                id: 'jump',
                title: 'ジャンプラン',
  		icon: 'sportShoe', 
  		gradient: 'from-blue-400 to-green-500', 
  		iconColor: 'text-white',
                path: 'jump.html',
                isPlayable: true
            },
            {
                id: 'caring',
                title: '育成ゲーム',
  		icon: 'egg', 
  		gradient: 'from-pink-400 to-pink-500', 
  		iconColor: 'text-white',
                path: 'caring.html',
                isPlayable: true
            },
            {
                id: 'uno',
                title: 'UNO',
  		icon: 'iteration-ccw', 
  		gradient: 'from-yellow-500 via-black-400 to-red-500', 
  		iconColor: 'text-white',
                path: 'uno.html',
                isPlayable: true
            },
            {
                id: 'rpg',
                title: 'RPG',
  		icon: 'sword', 
  		gradient: 'from-red-500 to-red-500', 
  		iconColor: 'text-white',
                path: 'rpg.html',
                isPlayable: true
            },
            {
                id: 'otome',
                title: '乙女ゲーム',
  		icon: 'heart', 
  		gradient: 'from-pink-500 to-pink-500', 
  		iconColor: 'text-white',
                path: 'otome.html',
                isPlayable: true
            }
        ];


        const appContainer = document.getElementById('app');

        /**
         * ゲーム選択時の処理
         */
        function handleGameClick(gameId) {
            const game = GAME_CATALOG.find(g => g.id === gameId);
            if (!game) return;

            if (game.isPlayable) {
                window.location.href = game.path;
            } else {
                renderComingSoon(game);
            }
        }

        /**
         * トップページの描画
         */
        function renderCatalog() {
            const cardsHtml = GAME_CATALOG.map(game => `
                <div onclick="handleGameClick('${game.id}')" class="group cursor-pointer flex flex-col gap-4">
                    <div class="relative aspect-square rounded-[2rem] overflow-hidden bg-gradient-to-br ${game.gradient} p-6 flex items-center justify-center shadow-sm transition-all duration-500 ease-out group-hover:shadow-xl group-hover:-translate-y-1.5">
                        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors duration-500"></div>
                        
                        <i data-lucide="${game.icon}" class="w-20 h-20 md:w-28 md:h-28 ${game.iconColor} transition-transform duration-500 ease-out group-hover:scale-110 drop-shadow-sm" stroke-width="1.5"></i>
                        
                        ${!game.isPlayable ? `
                        <div class="absolute top-4 right-4 bg-white/80 backdrop-blur-md px-3 py-1 rounded-full text-[11px] font-bold text-zinc-500 shadow-sm">
                            Coming Soon
                        </div>
                        ` : ''}
                    </div>
                    <div class="text-center px-2">
                        <h3 class="text-lg md:text-xl font-semibold tracking-tight">${game.title}</h3>
                    </div>
                </div>
            `).join('');

            appContainer.innerHTML = `
                <header class="sticky top-0 z-50 glass-header border-b border-black/5 h-14 flex items-center px-6">
                    <div class="flex items-center gap-2 font-bold text-lg tracking-tight">
                        <i data-lucide="gamepad-2" class="w-5 h-5"></i>
                        <span>PlayWeb</span>
                    </div>
                </header>

                <main class="pb-32 flex-1 fade-in">
                    <section class="mt-8 px-6 max-w-4xl mx-auto">
                        <div class="bg-white/60 border border-black/[0.03] rounded-3xl p-5 md:p-6 shadow-sm">
                            <div class="flex items-center gap-2 mb-3 text-zinc-500">
                                <i data-lucide="megaphone" class="w-4 h-4"></i>
                                <span class="text-xs font-bold uppercase tracking-wider">Recent Update</span>
                            </div>
                            <ul class="space-y-1.5 text-sm md:text-base text-zinc-700 font-medium">
                                ${UPDATE_INFO.logs.map(log => `
                                    <li class="flex items-start gap-2">
                                        <span class="text-zinc-400 text-xs mt-1.5">●</span>
                                        <span>${log}</span>
                                    </li>
                                `).join('')}
                            </ul>
                            <p class="text-[10px] md:text-xs text-zinc-400 mt-4 text-right font-medium">
                                (${UPDATE_INFO.date})
                            </p>
                        </div>
                    </section>

                    <section class="py-16 md:py-24 flex flex-col items-center justify-center text-center px-6">
                        <h1 class="text-6xl md:text-8xl font-bold tracking-tighter text-zinc-900">
                            Arcade.
                        </h1>
                    </section>

                    <section class="px-6 md:px-10 max-w-4xl mx-auto">
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-x-6 gap-y-10 md:gap-x-12 md:gap-y-16">
                            ${cardsHtml}
                        </div>
                    </section>
                </main>
            `;
            
            lucide.createIcons();
        }

        /**
         * 未実装ゲームの画面（Coming Soon）
         */
        function renderComingSoon(game) {
            appContainer.innerHTML = `
                <div class="min-h-screen flex flex-col fade-in bg-white">
                    <header class="sticky top-0 z-50 glass-header border-b border-black/5 h-14 flex items-center px-4">
                        <button onclick="renderCatalog()" class="flex items-center gap-1 text-zinc-500 hover:text-zinc-900 transition-colors font-medium text-sm">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                            <span>Catalog</span>
                        </button>
                    </header>
                    
                    <main class="flex-1 flex flex-col items-center justify-center p-6 pb-32">
                        <div class="max-w-xs w-full text-center">
                            <div class="w-32 h-32 md:w-40 md:h-40 mx-auto rounded-[2.5rem] bg-gradient-to-br ${game.gradient} flex items-center justify-center shadow-lg mb-8">
                                <i data-lucide="${game.icon}" class="w-16 h-16 md:w-20 md:h-20 ${game.iconColor}" stroke-width="1.5"></i>
                            </div>
                            
                            <h2 class="text-3xl md:text-4xl font-bold tracking-tight mb-12">${game.title}</h2>
                            
                            <div class="bg-[#f5f5f7] rounded-[2rem] p-6 text-center">
                                <h3 class="text-lg font-bold text-zinc-900 mb-6">Coming Soon</h3>
                                <button onclick="renderCatalog()" class="w-full bg-black text-white rounded-full py-3.5 font-semibold text-base hover:bg-zinc-800 transition-colors active:scale-[0.98] duration-200">
                                    Return
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            `;
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCatalog();
        });
    </script>
<!-- ここに追加パッチのみ記述（既存HTMLは一切変更しない） -->

<script>
    // 日付ごとにログをまとめる
    const PAST_LOGS = [
        {
            date: "2026/04/09 18:00",
            logs: [
                "修正：乙女ゲーム(ときメモ風のシステムに変更、調整の余地大あり)"
            ]
        },
        {
            date: "2026/04/08 14:45",
            logs: [
                "追加：乙女ゲーム(調整の余地大あり)",
                "削除：RPG2(元2を残し、元1を削除)"
            ]
        },

            date: "2026/04/07 18:10",
            logs: [
                "修正：RPG(クオリティの向上)"
            ]
        },
        {
            date: "2026/04/07 11:00",
            logs: [
                "追加：RPG2",
                "追加：お問い合わせフォーム"
            ]
        },
        {
            date: "2026/04/06 16:30",
            logs: [
                "追加：RPG(調整の余地大あり)",
                "修正：テトリス(消したらGAME OVERになる不具合を修正)",
                "修正：育成ゲーム(リセットしても図鑑は情報を保持するよう修正)"
            ]
        }
    ];

    function renderPastLogs() {
        const section = document.querySelector('section.mt-8');
        if (!section) return;

        const wrapper = document.createElement('div');
        wrapper.className = "bg-white/60 border border-black/[0.03] rounded-3xl p-5 md:p-6 shadow-sm mt-4";

        wrapper.innerHTML = `
            <details class="group">
                <summary class="cursor-pointer flex items-center gap-2 text-zinc-600 text-sm font-bold select-none">
                    <i data-lucide="archive" class="w-4 h-4"></i>
                    過去ログ
                </summary>

                <div class="mt-3 max-h-56 overflow-y-auto pr-2 text-sm text-zinc-700 space-y-4">
                    ${PAST_LOGS.map(entry => `
                        <div class="border-b border-zinc-200 pb-2">
                            <p class="text-xs text-zinc-400 font-semibold mb-1">${entry.date}</p>
                            ${entry.logs.map(log => `
                                <div class="flex items-start gap-2">
                                    <span class="text-zinc-400 text-xs mt-1.5">●</span>
                                    <span>${log}</span>
                                </div>
                            `).join('')}
                        </div>
                    `).join('')}
                </div>
            </details>
        `;

        section.appendChild(wrapper);
        lucide.createIcons();
    }
</script>


<!-- DOM構築後に追加 -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            renderPastLogs();
            renderInquiryForm();
        }, 100);
    });
</script>
<!-- Googleフォームお問い合わせ埋め込みパッチ -->
<script>
    // Googleフォームの「埋め込み用 iframe URL」をここに貼る
    const GOOGLE_FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfKSJ1_do0LiUdYxLgQQ2uWdm5YTHCad5tA82uHeV4HbkhH7w/viewform?usp=header=true";

    function renderGoogleFormSection() {
        const main = document.querySelector('main');
        if (!main) return;

        const section = document.createElement('section');
        section.className = "px-6 md:px-10 max-w-3xl mx-auto mt-20 mb-24";

        section.innerHTML = `
            <div class="bg-white/70 border border-black/5 rounded-3xl p-6 shadow-sm">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="mail" class="w-5 h-5"></i>
                    お問い合わせ
                </h2>

                <iframe 
                    src="${GOOGLE_FORM_URL}"
                    width="100%" 
                    height="700" 
                    frameborder="0" 
                    marginheight="0" 
                    marginwidth="0"
                    class="rounded-2xl border border-zinc-200"
                >
                    読み込んでいます…
                </iframe>
            </div>
        `;

        main.appendChild(section);
        lucide.createIcons();
    }

    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            renderGoogleFormSection();
        }, 120);
    });
</script>
</body>
</html>
