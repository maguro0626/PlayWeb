<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Monster Raising</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{--app-height:100%}
html,body{height:100%;margin:0;padding:0;overflow:hidden;background-color:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif}
.glass-header{background-color:rgba(255,255,255,0.7);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px)}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes floatup{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-14px) rotate(2deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes wobble{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
@keyframes dance{0%{transform:rotate(-6deg) translateY(0)}25%{transform:rotate(0) translateY(-8px)}50%{transform:rotate(6deg) translateY(0)}75%{transform:rotate(0) translateY(-8px)}100%{transform:rotate(-6deg) translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.anim-bounce{animation:bounce 1.1s ease-in-out infinite}
.anim-float{animation:floatup 2s ease-in-out infinite}
.anim-pulse{animation:pulse 1.5s ease-in-out infinite}
.anim-wobble{animation:wobble 0.9s ease-in-out infinite}
.anim-dance{animation:dance 0.75s ease-in-out infinite}
@keyframes score-pop{0%{transform:scale(1)}50%{transform:scale(1.6);color:#3b82f6}100%{transform:scale(1)}}
.score-pop{animation:score-pop 0.45s cubic-bezier(0.175,0.885,0.32,1.6) both}
@keyframes toast-anim{0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}15%{transform:translate(-50%,-50%) scale(1.05);opacity:1}80%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-50%) scale(0.8);opacity:0}}
.toast-pop{animation:toast-anim 1.8s cubic-bezier(0.175,0.885,0.32,1.2) forwards}
@keyframes v-flash{0%{background:rgba(255,255,255,0.6)}100%{background:rgba(255,255,255,0)}}
.victory-flash{position:fixed;inset:0;pointer-events:none;z-index:90;animation:v-flash 0.7s ease-out forwards}
@keyframes confetti-fall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}85%{opacity:1}100%{transform:translateY(115vh) rotate(var(--rot,720deg)) scale(0.7);opacity:0}}
.confetti{position:fixed;top:-30px;z-index:100;pointer-events:none;animation:confetti-fall linear forwards}
@keyframes evo-in{0%{transform:scale(0) rotate(-20deg);opacity:0}60%{transform:scale(1.15) rotate(5deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes glow-pulse{0%,100%{filter:drop-shadow(0 0 20px gold) drop-shadow(0 0 40px white)}50%{filter:drop-shadow(0 0 60px gold) drop-shadow(0 0 100px rgba(255,220,80,0.8))}}
@keyframes ring-pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}}
@keyframes sick-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}60%{transform:translateX(5px)}}
@keyframes particle-up{0%{transform:translate(var(--px),0) scale(1);opacity:1}100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0}}
.particle{position:absolute;border-radius:50%;pointer-events:none;animation:particle-up linear forwards}
.action-btn{touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
.action-btn:active{transform:scale(0.88);transition:transform 0.07s}
.sl{font-size:8px;font-weight:900;letter-spacing:0.15em;text-transform:uppercase;color:#aaa}
#evo-overlay{z-index:200}
#dead-overlay{z-index:190}
#reset-dialog{z-index:180}
#book-overlay{z-index:170}
#mg-overlay{z-index:160}
.brow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;margin-bottom:6px;background:#f8f8f8}
.brow.found{background:white;border:1px solid rgba(0,0,0,0.07);box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.brow.current{border:2px solid #3b82f6;background:white;box-shadow:0 4px 16px rgba(59,130,246,0.2)}
</style>
</head>
<body class="flex flex-col">

<header class="w-full shrink-0 z-50 glass-header border-b border-black/5 h-14 flex items-center justify-between px-4">
  <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-zinc-600 hover:text-zinc-900 transition-colors p-2 rounded-xl hover:bg-black/5">
    <i data-lucide="home" class="w-5 h-5"></i>
    <span class="text-sm font-bold">ホーム</span>
  </button>
  <div id="status-text" class="text-[10px] font-black tracking-widest uppercase text-zinc-400">RAISING</div>
  <button onclick="showBook()" class="p-2 rounded-xl hover:bg-black/5 text-zinc-600 transition-colors">
    <i data-lucide="book-open" class="w-5 h-5"></i>
  </button>
</header>

<main class="flex-grow flex flex-col overflow-hidden max-w-md mx-auto w-full px-3 pt-2 pb-2 gap-2">
  <div class="flex items-center justify-between px-5 py-2.5 bg-white/80 backdrop-blur-md rounded-2xl border border-black/5 shadow-sm shrink-0">
    <div class="text-center">
      <div class="sl">AGE</div>
      <div id="age-display" class="text-sm font-black text-zinc-900">0日</div>
    </div>
    <div class="text-center">
      <div id="mon-name-disp" class="text-[11px] font-black text-zinc-600 tracking-wider">たまご</div>
      <div id="stage-disp" class="sl mt-0.5">STAGE: EGG</div>
    </div>
    <div class="text-center">
      <div class="sl">WEIGHT</div>
      <div id="weight-display" class="text-sm font-black text-zinc-900">5g</div>
    </div>
  </div>

  <div class="grid grid-cols-2 gap-2 shrink-0">
    <div class="flex items-center gap-3 px-4 py-3 bg-white/80 backdrop-blur-md rounded-2xl border border-black/5 shadow-sm">
      <span class="text-base">🍖</span>
      <div><div class="sl mb-1">HUNGER</div><div id="hunger-hearts" class="flex gap-0.5 text-sm"></div></div>
    </div>
    <div class="flex items-center gap-3 px-4 py-3 bg-white/80 backdrop-blur-md rounded-2xl border border-black/5 shadow-sm">
      <span class="text-base">😊</span>
      <div><div class="sl mb-1">HAPPY</div><div id="happy-hearts" class="flex gap-0.5 text-sm"></div></div>
    </div>
  </div>

  <div id="monster-stage" class="flex-1 flex items-center justify-center relative bg-white/80 backdrop-blur-md rounded-3xl border border-black/5 shadow-sm overflow-hidden" style="min-height:170px">
    <div id="stage-bg" class="absolute inset-0 rounded-3xl transition-all duration-1000"></div>
    <div id="mon-container" class="relative z-10 flex items-center justify-center">
      <svg id="monster-svg" width="160" height="160" viewBox="0 0 200 200" style="transform-origin:center center"></svg>
    </div>
    <div id="poop-ind" class="absolute bottom-3 right-5 text-2xl hidden select-none">💩</div>
    <div id="sick-ind" class="absolute top-3 right-3 hidden">
      <div class="bg-amber-400 text-white text-[7px] font-black px-2 py-0.5 rounded-full uppercase tracking-widest">SICK</div>
    </div>
    <div id="sleep-overlay" class="absolute inset-0 bg-indigo-950/88 flex items-center justify-center hidden z-20 rounded-3xl">
      <div class="text-white text-center"><div class="text-5xl mb-3" style="animation:floatup 2s ease-in-out infinite">💤</div><div class="sl opacity-50">おやすみ...</div></div>
    </div>
    <div id="call-ind" class="absolute top-3 left-3 hidden">
      <span class="flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span></span>
    </div>
  </div>

  <div class="text-center shrink-0 h-5">
    <span id="msg-text" class="text-[11px] font-black uppercase tracking-widest text-zinc-400"></span>
  </div>

  <div class="grid grid-cols-6 gap-1.5 shrink-0">
    <button onclick="doFeed()"     class="action-btn flex flex-col items-center justify-center py-3 bg-white/80 backdrop-blur-md rounded-2xl border border-black/5 shadow-sm hover:bg-white transition-all"><span class="text-xl mb-0.5">🍖</span><span class="sl">FEED</span></button>
    <button onclick="doPlay()"     class="action-btn flex flex-col items-center justify-center py-3 bg-white/80 backdrop-blur-md rounded-2xl border border-black/5 shadow-sm hover:bg-white transition-all"><span class="text-xl mb-0.5">🎮</span><span class="sl">PLAY</span></button>
    <button onclick="doClean()"    class="action-btn flex flex-col items-center justify-center py-3 bg-white/80 backdrop-blur-md rounded-2xl border border-black/5 shadow-sm hover:bg-white transition-all"><span class="text-xl mb-0.5">🧹</span><span class="sl">CLEAN</span></button>
    <button onclick="doMedicine()" class="action-btn flex flex-col items-center justify-center py-3 bg-white/80 backdrop-blur-md rounded-2xl border border-black/5 shadow-sm hover:bg-white transition-all"><span class="text-xl mb-0.5">💊</span><span class="sl">MED</span></button>
    <button onclick="doScold()"    class="action-btn flex flex-col items-center justify-center py-3 bg-white/80 backdrop-blur-md rounded-2xl border border-black/5 shadow-sm hover:bg-white transition-all"><span class="text-xl mb-0.5">⚡</span><span class="sl">SCOLD</span></button>
    <button onclick="toggleLight()" class="action-btn flex flex-col items-center justify-center py-3 bg-white/80 backdrop-blur-md rounded-2xl border border-black/5 shadow-sm hover:bg-white transition-all"><span id="light-icon" class="text-xl mb-0.5">💡</span><span class="sl">LIGHT</span></button>
  </div>

  <div class="bg-white/80 backdrop-blur-md p-3 rounded-[2rem] border border-black/5 shadow-sm shrink-0">
    <button onclick="confirmReset()" class="w-full py-3.5 bg-zinc-900 text-white rounded-2xl font-bold text-sm flex items-center justify-center gap-2 active:scale-95 transition-all">
      <i data-lucide="refresh-cw" class="w-4 h-4"></i>リセット
    </button>
  </div>
</main>

<!-- MINIGAME -->
<div id="mg-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-end justify-center pb-6 px-4">
  <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
    <h2 class="text-center font-black text-lg uppercase tracking-wider mb-1">あそぶ！</h2>
    <p class="text-center text-xs text-zinc-400 mb-5">🔵が光ったらすぐタップ！5回チャレンジ</p>
    <div id="mg-light" class="w-24 h-24 rounded-full mx-auto mb-4 bg-zinc-200 shadow-inner select-none transition-all duration-75 cursor-pointer" onclick="pressGameBtn()"></div>
    <div id="mg-result" class="text-center font-black text-xl h-8 mb-1"></div>
    <div id="mg-score-text" class="text-center text-xs text-zinc-400 mb-4">0 / 5 ヒット</div>
    <button onclick="closeMinigame()" class="w-full py-3 bg-zinc-100 rounded-2xl font-bold text-sm hover:bg-zinc-200 transition-all">やめる</button>
  </div>
</div>

<!-- BOOK -->
<div id="book-overlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center px-4">
  <div class="bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden flex flex-col" style="max-height:85vh">
    <div class="p-5 border-b border-zinc-100 shrink-0">
      <h2 class="text-center font-black text-lg uppercase tracking-wider">進化図鑑</h2>
      <p class="text-center sl mt-1">育て方によって進化が分岐する</p>
    </div>
    <div id="book-content" class="overflow-y-auto p-4 flex-grow"></div>
    <div class="p-4 border-t border-zinc-100 shrink-0">
      <button onclick="document.getElementById('book-overlay').classList.add('hidden')" class="w-full py-3 bg-zinc-900 text-white rounded-2xl font-bold text-sm">とじる</button>
    </div>
  </div>
</div>

<!-- EVOLUTION -->
<div id="evo-overlay" class="fixed inset-0 bg-black hidden flex items-center justify-center flex-col">
  <div id="evo-stars-bg" class="absolute inset-0 overflow-hidden pointer-events-none"></div>
  <div class="relative z-10 text-center px-8">
    <div id="evo-label" class="text-xs font-black uppercase tracking-widest text-yellow-400 mb-4" style="opacity:0">EVOLUTION!</div>
    <div id="evo-svg-wrap" class="mb-6"><svg id="evo-svg" width="200" height="200" viewBox="0 0 200 200" style="opacity:0"></svg></div>
    <div id="evo-title" class="text-white font-black text-3xl uppercase tracking-widest mb-2" style="opacity:0"></div>
    <div id="evo-sub"   class="text-zinc-400 text-sm font-bold mb-10" style="opacity:0"></div>
    <button onclick="closeEvolution()" id="evo-btn" class="px-10 py-3 bg-white/20 text-white rounded-2xl font-bold text-sm hover:bg-white/30 transition-all" style="opacity:0">つぎへ</button>
  </div>
</div>

<!-- DEAD -->
<div id="dead-overlay" class="fixed inset-0 bg-black/92 hidden flex items-center justify-center px-8">
  <div class="text-center text-white w-full max-w-xs">
    <div class="text-6xl mb-5">👻</div>
    <div class="text-2xl font-black mb-2">さようなら...</div>
    <div id="dead-msg" class="text-zinc-400 text-sm mb-6">もっとお世話してあげてね</div>
    <div class="bg-white/10 rounded-2xl p-4 mb-6 text-sm space-y-2">
      <div class="flex justify-between"><span class="text-zinc-400">生きた日数</span><span id="dead-age" class="font-bold"></span></div>
      <div class="flex justify-between"><span class="text-zinc-400">最終形態</span><span id="dead-stage" class="font-bold"></span></div>
    </div>
    <button onclick="resetGame()" class="w-full py-4 bg-white text-black rounded-2xl font-bold text-sm">あたらしく始める</button>
  </div>
</div>

<!-- RESET CONFIRM -->
<div id="reset-dialog" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center px-8">
  <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl text-center">
    <div class="text-4xl mb-4">⚠️</div>
    <div class="font-black text-lg mb-2">本当にリセット？</div>
    <div class="text-sm text-zinc-500 mb-6">データが全て消えます</div>
    <div class="flex gap-3">
      <button onclick="document.getElementById('reset-dialog').classList.add('hidden')" class="flex-1 py-3 bg-zinc-100 rounded-2xl font-bold text-sm hover:bg-zinc-200 transition-all">キャンセル</button>
      <button onclick="resetGame()" class="flex-1 py-3 bg-red-500 text-white rounded-2xl font-bold text-sm hover:bg-red-600 transition-all">リセット</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════
//  MONSTER DEFINITIONS  (40 total)
// ════════════════════════════════════
const M = {

// ─ FORM 2 ─
AA:{name:'フラッフィア',desc:'天使型 ふわふわ',bg:'linear-gradient(135deg,#FFF5F8,#FFE5EE)',anim:'anim-bounce',draw:()=>`
<defs><radialGradient id="gAA" cx="36%" cy="30%"><stop offset="0%" stop-color="#FFF"/><stop offset="60%" stop-color="#FFE0EE"/><stop offset="100%" stop-color="#FFC0D8"/></radialGradient><filter id="gAAf"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>

<path d="M50 116 Q28 108 22 95 Q38 93 52 105Z" fill="rgba(255,220,240,0.7)"/>

<ellipse cx="100" cy="128" rx="30" ry="26" fill="rgba(255,255,255,0.8)"/>
<path d="M70 75 Q60 50 74 46 Q82 55 78 72Z" fill="#FFD0E8" stroke="#FFB8D8" stroke-width="1"/>

// ════════════════════════════════════
//  EVOLUTION TREE
// ════════════════════════════════════
const EVO_TREE = {
  egg:  {next:['A','B','C'],   cond:(g)=>g.age>=1},
  A:    {next:['AA','AB','AC'], cond:(g)=>g.age>=3},
  B:    {next:['BA','BB','BC'], cond:(g)=>g.age>=3},
  C:    {next:['CA','CB','CC'], cond:(g)=>g.age>=3},
  AA:   {next:['AAA','AAB','AAC'],cond:(g)=>g.age>=6},
  AB:   {next:['ABA','ABB','ABC'],cond:(g)=>g.age>=6},
  AC:   {next:['ACA','ACB','ACC'],cond:(g)=>g.age>=6},
  BA:   {next:['BAA','BAB','BAC'],cond:(g)=>g.age>=6},
  BB:   {next:['BBA','BBB','BBC'],cond:(g)=>g.age>=6},
  BC:   {next:['BCA','BCB','BCC'],cond:(g)=>g.age>=6},
  CA:   {next:['CAA','CAB','CAC'],cond:(g)=>g.age>=6},
  CB:   {next:['CBA','CBB','CBC'],cond:(g)=>g.age>=6},
  CC:   {next:['CCA','CCB','CCC'],cond:(g)=>g.age>=6},
};

// Evolution condition: which of 3 paths?
// Based on care stats: happy-favored=A, balanced=B, scold-favored/hungry=C
function chooseEvolution(g, nextList) {
  // Stat score: happy/fed well → A path, dragon/active → B path, ghost/neglect → C path
  const h = g.totalHappy;   // happiness actions taken
  const f = g.totalFed;     // feed actions
  const s = g.totalScold;   // scold actions
  const c = g.totalClean;   // clean actions
  const miss = g.missedCare; // missed care moments
  
  // Score for each path
  let scores = [0,0,0];
  scores[0] += h * 2 + f;           // A: happy & fed
  scores[1] += (f + c) * 1.5;      // B: fed & clean (dragon)
  scores[2] += s * 2 + miss * 3;   // C: scold & neglect (ghost)
  
  // Add some randomness
  scores[0] += Math.random() * 5;
  scores[1] += Math.random() * 5;
  scores[2] += Math.random() * 5;
  
  // Find index of highest score
  let idx = scores.indexOf(Math.max(...scores));
  return nextList[idx] || nextList[0];
}

// ════════════════════════════════════
//  GAME STATE
// ════════════════════════════════════
const SAVE_KEY = 'monster_caring_v2';

let G = {
  stage: 'egg',
  age: 0,          // in days
  ageMs: 0,        // age in milliseconds accumulated
  weight: 5,
  hunger: 4,       // 0-4
  happy: 4,        // 0-4
  isSick: false,
  isSleeping: false,
  poop: false,
  isAlive: true,
  lightOn: true,
  totalHappy: 0,
  totalFed: 0,
  totalScold: 0,
  totalClean: 0,
  missedCare: 0,
  lastSave: Date.now(),
  lastTick: Date.now(),
  discovered: ['egg'],
  evoPath: '',     // accumulated evolution path e.g. "AB"
};

let tickTimer = null;
let callTimer = null;
let callActive = false;
let mgActive = false;
let mgLit = false;
let mgScore = 0;
let mgRound = 0;
let mgTimer = null;
let evoQueue = [];

// ════════════════════════════════════
//  SAVE / LOAD
// ════════════════════════════════════
function saveGame() {
  G.lastSave = Date.now();
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(G)); } catch(e){}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const saved = JSON.parse(raw);
    // Merge to handle missing keys
    G = Object.assign({}, G, saved);
    // Apply offline time
    const elapsed = Date.now() - (G.lastSave || Date.now());
    const elapsedSec = Math.min(elapsed / 1000, 3600); // cap 1hr
    applyOfflineTime(elapsedSec);
    return true;
  } catch(e){ return false; }
}

function applyOfflineTime(sec) {
  // Each 300 real seconds = ~1 in-game hour
  const hours = sec / 300;
  if (!G.isAlive) return;
  // Hunger/happy decay during offline
  const decayH = Math.floor(hours * 0.5);
  const decayHp = Math.floor(hours * 0.4);
  G.hunger = Math.max(0, G.hunger - decayH);
  G.happy  = Math.max(0, G.happy  - decayHp);
  G.ageMs  = (G.ageMs||0) + sec * 1000;
  G.age    = Math.floor(G.ageMs / (86400000/24)); // accelerated: 1 day per hour realtime
  if (G.hunger===0 && !G.isSick) { G.isSick = true; G.missedCare += decayH; }
  if (G.isSick && hours > 2) { G.isAlive = false; }
}

// ════════════════════════════════════
//  TICK (called every 5 seconds)
// ════════════════════════════════════
const TICK_MS = 5000;
// Each tick = 5s real → in-game: hunger drops 1 every 120 ticks (10 min), happy every 100 ticks (8.3 min)
// Accelerated for playability: hunger every 36 ticks (3 min), happy every 30 ticks (2.5 min)
let tickCount = 0;

function startTick() {
  if (tickTimer) clearInterval(tickTimer);
  tickTimer = setInterval(gameTick, TICK_MS);
}

function gameTick() {
  if (!G.isAlive) return;
  tickCount++;
  G.ageMs += TICK_MS;
  G.age = Math.floor(G.ageMs / 360000); // 1 day per 360s (6 min real)

  if (!G.isSleeping && G.lightOn) {
    // Hunger decay: every 36 ticks (~3 min)
    if (tickCount % 36 === 0) {
      G.hunger = Math.max(0, G.hunger - 1);
      if (G.hunger === 0) {
        G.missedCare++;
        if (!G.isSick) triggerSick();
        scheduleCall();
      }
    }
    // Happy decay: every 30 ticks (~2.5 min)
    if (tickCount % 30 === 0) {
      G.happy = Math.max(0, G.happy - 1);
      if (G.happy === 0) {
        G.missedCare++;
        scheduleCall();
      }
    }
    // Poop: every 90 ticks (~7.5 min)
    if (tickCount % 90 === 0 && !G.poop) {
      G.poop = true;
      scheduleCall();
      if (!G.isSick && Math.random() < 0.3) triggerSick();
    }
    // Weight gain: every 60 ticks if fed
    if (tickCount % 60 === 0) {
      if (G.totalFed > 0 && G.stage !== 'egg') G.weight = Math.min(99, G.weight + 1);
    }
    // Sick gets worse over time
    if (G.isSick && tickCount % 60 === 0) {
      G.missedCare++;
      if (G.missedCare > 20 || (G.hunger === 0 && G.happy === 0)) {
        killMonster();
        return;
      }
    }
    // Auto sleep: between tick 720-864 of the day cycle (simulate night)
    const dayTick = tickCount % 720;
    if (dayTick === 480 && !G.isSleeping) autoSleep();
    if (dayTick === 0   &&  G.isSleeping) wakeUp();
  }

  // Check evolution
  checkEvo();
  updateUI();
  saveGame();
}

function triggerSick() {
  if (G.stage === 'egg') return;
  G.isSick = true;
  showCallInd(true);
  showMsg('😷 びょうきだよ！くすりを！');
}

function killMonster() {
  G.isAlive = false;
  saveGame();
  showDead();
}

function scheduleCall() {
  showCallInd(true);
}

function showCallInd(on) {
  callActive = on;
  document.getElementById('call-ind').classList.toggle('hidden', !on);
}

// ════════════════════════════════════
//  EVOLUTION CHECK
// ════════════════════════════════════
function checkEvo() {
  const node = EVO_TREE[G.stage];
  if (!node) return;
  if (!node.cond(G)) return;
  // Choose which branch
  const nextStage = chooseEvolution(G, node.next);
  evolve(nextStage);
}

function evolve(newStage) {
  if (!M[newStage]) return;
  G.stage = newStage;
  if (!G.discovered.includes(newStage)) G.discovered.push(newStage);
  G.totalHappy = 0; G.totalFed = 0; G.totalScold = 0; G.totalClean = 0; G.missedCare = 0;
  G.hunger = 4; G.happy = 4; G.isSick = false; G.poop = false;
  saveGame();
  showEvolution(newStage);
}

// ════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════
function doFeed() {
  if (!G.isAlive || G.isSleeping) { showMsg('ねてるよ💤'); return; }
  if (G.hunger >= 4) { showMsg('おなかいっぱい！'); return; }
  G.hunger = Math.min(4, G.hunger + 1);
  G.weight = Math.min(99, G.weight + 1);
  G.totalFed++;
  spawnParticles('🍖');
  showMsg('もぐもぐ🍖');
  showCallInd(G.isSick || G.hungry === 0);
  updateUI(); saveGame();
}

function doPlay() {
  if (!G.isAlive || G.isSleeping) { showMsg('ねてるよ💤'); return; }
  if (G.stage === 'egg') { showMsg('まだたまごだよ🥚'); return; }
  openMinigame();
}

function doClean() {
  if (!G.isAlive) return;
  if (!G.poop) { showMsg('きれいだよ✨'); return; }
  G.poop = false;
  G.totalClean++;
  spawnParticles('✨');
  showMsg('きれいになった✨');
  if (!G.isSick && !G.hunger===0 && !G.happy===0) showCallInd(false);
  updateUI(); saveGame();
}

function doMedicine() {
  if (!G.isAlive) return;
  if (!G.isSick) { showMsg('げんきだよ！'); return; }
  G.isSick = false;
  G.hunger = Math.min(4, G.hunger + 1);
  spawnParticles('💊');
  showMsg('なおった！💊');
  showCallInd(G.poop || G.hunger===0);
  updateUI(); saveGame();
}

function doScold() {
  if (!G.isAlive) return;
  if (G.stage === 'egg') { showMsg('まだたまごだよ🥚'); return; }
  G.happy = Math.max(0, G.happy - 1);
  G.totalScold++;
  showMsg('⚡おこった！');
  spawnParticles('⚡');
  updateUI(); saveGame();
}

function toggleLight() {
  G.lightOn = !G.lightOn;
  document.getElementById('light-icon').textContent = G.lightOn ? '💡' : '🌙';
  if (!G.lightOn) {
    G.isSleeping = true;
    document.getElementById('sleep-overlay').classList.remove('hidden');
    showMsg('おやすみ💤');
  } else {
    G.isSleeping = false;
    document.getElementById('sleep-overlay').classList.add('hidden');
    showMsg('おはよう！☀️');
  }
  updateUI(); saveGame();
}

function autoSleep() {
  G.isSleeping = true;
  document.getElementById('sleep-overlay').classList.remove('hidden');
  document.getElementById('light-icon').textContent = '🌙';
}

function wakeUp() {
  G.isSleeping = false;
  document.getElementById('sleep-overlay').classList.add('hidden');
  document.getElementById('light-icon').textContent = '💡';
  G.lightOn = true;
}

// ════════════════════════════════════
//  MINIGAME
// ════════════════════════════════════
let mgLitTimer = null;
let mgWaitTimer = null;

function openMinigame() {
  if (G.isSleeping) { showMsg('ねてるよ💤'); return; }
  mgActive = true; mgScore = 0; mgRound = 0; mgLit = false;
  document.getElementById('mg-overlay').classList.remove('hidden');
  document.getElementById('mg-result').textContent = '';
  document.getElementById('mg-score-text').textContent = '0 / 5 ヒット';
  document.getElementById('mg-light').className = 'w-24 h-24 rounded-full mx-auto mb-4 bg-zinc-200 shadow-inner select-none transition-all duration-75 cursor-pointer';
  setTimeout(nextMgRound, 600);
}

function nextMgRound() {
  if (!mgActive || mgRound >= 5) { endMinigame(); return; }
  const delay = 600 + Math.random() * 1400;
  mgWaitTimer = setTimeout(() => {
    if (!mgActive) return;
    mgLit = true;
    document.getElementById('mg-light').className = 'w-24 h-24 rounded-full mx-auto mb-4 shadow-inner select-none transition-all duration-75 cursor-pointer bg-blue-500 shadow-blue-300 shadow-lg';
    document.getElementById('mg-result').textContent = '';
    mgLitTimer = setTimeout(() => {
      if (!mgActive) return;
      if (mgLit) {
        mgLit = false;
        mgRound++;
        document.getElementById('mg-light').className = 'w-24 h-24 rounded-full mx-auto mb-4 bg-zinc-200 shadow-inner select-none transition-all duration-75 cursor-pointer';
        document.getElementById('mg-result').textContent = 'ミス！😢';
        setTimeout(nextMgRound, 600);
      }
    }, 800);
  }, delay);
}

function pressGameBtn() {
  if (!mgActive || !mgLit) {
    if (mgActive) {
      document.getElementById('mg-result').textContent = '早すぎ！⚡';
    }
    return;
  }
  clearTimeout(mgLitTimer);
  mgLit = false; mgScore++; mgRound++;
  document.getElementById('mg-light').className = 'w-24 h-24 rounded-full mx-auto mb-4 shadow-inner select-none transition-all duration-75 cursor-pointer bg-green-400 shadow-green-300 shadow-lg';
  document.getElementById('mg-result').textContent = 'ナイス！🎉';
  document.getElementById('mg-score-text').textContent = `${mgScore} / 5 ヒット`;
  setTimeout(()=>{
    document.getElementById('mg-light').className = 'w-24 h-24 rounded-full mx-auto mb-4 bg-zinc-200 shadow-inner select-none transition-all duration-75 cursor-pointer';
    nextMgRound();
  }, 300);
}

function endMinigame() {
  mgActive = false;
  clearTimeout(mgLitTimer); clearTimeout(mgWaitTimer);
  // Apply result
  const gained = Math.ceil(mgScore * 0.75);
  G.happy = Math.min(4, G.happy + gained);
  G.totalHappy += gained;
  document.getElementById('mg-result').textContent = mgScore >= 4 ? '最高！🏆' : mgScore >= 2 ? 'よくできた！😄' : 'がんばれ！';
  document.getElementById('mg-score-text').textContent = `結果: +${gained}ハッピー`;
  spawnParticles('⭐');
  showCallInd(G.isSick || G.hunger===0 || G.poop);
  updateUI(); saveGame();
}

function closeMinigame() {
  mgActive = false;
  clearTimeout(mgLitTimer); clearTimeout(mgWaitTimer);
  document.getElementById('mg-overlay').classList.add('hidden');
}

// ════════════════════════════════════
//  EVOLUTION CUTSCENE
// ════════════════════════════════════
function showEvolution(stage) {
  const mon = M[stage];
  const ov = document.getElementById('evo-overlay');
  ov.classList.remove('hidden');
  
  // Stars background
  const bg = document.getElementById('evo-stars-bg');
  bg.innerHTML = '';
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.style.cssText = `position:absolute;border-radius:50%;background:white;opacity:${0.3+Math.random()*0.7};
      width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      animation:spin ${3+Math.random()*4}s ease-in-out infinite alternate;animation-delay:${Math.random()*2}s`;
    bg.appendChild(s);
  }

  // Animate elements
  const svg = document.getElementById('evo-svg');
  svg.innerHTML = mon.draw();
  
  let delay = 300;
  setTimeout(()=>{ 
    document.getElementById('evo-label').style.cssText='opacity:1;transition:opacity 0.5s;';
  }, delay);
  delay += 500;
  setTimeout(()=>{ 
    svg.style.cssText='opacity:1;animation:evo-in 0.8s cubic-bezier(0.175,0.885,0.32,1.25) both, glow-pulse 2s ease-in-out infinite;';
  }, delay);
  delay += 900;
  setTimeout(()=>{ 
    document.getElementById('evo-title').style.cssText='opacity:1;transition:opacity 0.5s;';
    document.getElementById('evo-title').textContent = mon.name;
  }, delay);
  delay += 300;
  setTimeout(()=>{ 
    document.getElementById('evo-sub').style.cssText='opacity:1;transition:opacity 0.5s;';
    document.getElementById('evo-sub').textContent = mon.desc;
  }, delay);
  delay += 400;
  setTimeout(()=>{ 
    document.getElementById('evo-btn').style.cssText='opacity:1;transition:opacity 0.5s;';
  }, delay);
}

function closeEvolution() {
  document.getElementById('evo-overlay').classList.add('hidden');
  // Reset evo svg styling
  const svg = document.getElementById('evo-svg');
  svg.style.cssText = 'opacity:0';
  ['evo-label','evo-title','evo-sub','evo-btn'].forEach(id=>{
    document.getElementById(id).style.opacity='0';
  });
  updateUI();
}

// ════════════════════════════════════
//  BOOK
// ════════════════════════════════════
const STAGE_LABELS = {
  egg:'たまご', A:'第一形態',B:'第一形態',C:'第一形態',
  AA:'第二形態',AB:'第二形態',AC:'第二形態',
  BA:'第二形態',BB:'第二形態',BC:'第二形態',
  CA:'第二形態',CB:'第二形態',CC:'第二形態',
};
['AAA','AAB','AAC','ABA','ABB','ABC','ACA','ACB','ACC',
 'BAA','BAB','BAC','BBA','BBB','BBC','BCA','BCB','BCC',
 'CAA','CAB','CAC','CBA','CBB','CBC','CCA','CCB','CCC'].forEach(k=>STAGE_LABELS[k]='最終形態');

const STAGE_ORDER = ['egg','A','B','C',
  'AA','AB','AC','BA','BB','BC','CA','CB','CC',
  'AAA','AAB','AAC','ABA','ABB','ABC','ACA','ACB','ACC',
  'BAA','BAB','BAC','BBA','BBB','BBC','BCA','BCB','BCC',
  'CAA','CAB','CAC','CBA','CBB','CBC','CCA','CCB','CCC'];

function showBook() {
  const content = document.getElementById('book-content');
  const sections = {'たまご':['egg'],'第一形態':['A','B','C'],
    '第二形態':['AA','AB','AC','BA','BB','BC','CA','CB','CC'],
    '最終形態':STAGE_ORDER.slice(13)};
  
  let html = `<div class="text-xs text-zinc-400 mb-3 font-bold">${G.discovered.length}/40 ひっさつ！</div>`;
  
  for (const [label, keys] of Object.entries(sections)) {
    html += `<div class="text-[9px] font-black uppercase tracking-widest text-zinc-400 mb-2 mt-3">${label}</div>`;
    for (const k of keys) {
      const mon = M[k];
      const found = G.discovered.includes(k);
      const isCurrent = G.stage === k;
      let cls = 'brow';
      if (isCurrent) cls += ' current';
      else if (found) cls += ' found';
      
      const svgMini = found ? `<svg width="44" height="44" viewBox="0 0 200 200">${mon.draw()}</svg>` : `<div style="width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border-radius:8px;font-size:20px">?</div>`;
      
      html += `<div class="${cls}">
        ${svgMini}
        <div>
          <div style="font-size:11px;font-weight:900;color:${found?'#111':'#aaa'}">${found?mon.name:'???'}</div>
          <div style="font-size:9px;color:#aaa;font-weight:600">${found?mon.desc:'未発見'}</div>
        </div>
        ${isCurrent?'<div style="margin-left:auto;font-size:8px;font-weight:900;color:#3b82f6;letter-spacing:0.1em">NOW</div>':''}
      </div>`;
    }
  }
  content.innerHTML = html;
  document.getElementById('book-overlay').classList.remove('hidden');
}

// ════════════════════════════════════
//  DEAD SCREEN
// ════════════════════════════════════
function showDead() {
  const mon = M[G.stage] || M['egg'];
  document.getElementById('dead-age').textContent = `${G.age}日`;
  document.getElementById('dead-stage').textContent = mon.name;
  document.getElementById('dead-overlay').classList.remove('hidden');
  spawnConfetti();
}

// ════════════════════════════════════
//  RESET
// ════════════════════════════════════
function confirmReset() {
  document.getElementById('reset-dialog').classList.remove('hidden');
}

function resetGame() {
  ['reset-dialog','dead-overlay','evo-overlay'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  clearInterval(tickTimer);
  tickCount = 0;
  G = {
    stage:'egg', age:0, ageMs:0, weight:5, hunger:4, happy:4,
    isSick:false, isSleeping:false, poop:false, isAlive:true, lightOn:true,
    totalHappy:0, totalFed:0, totalScold:0, totalClean:0, missedCare:0,
    lastSave:Date.now(), lastTick:Date.now(), discovered:['egg'], evoPath:''
  };
  saveGame();
  startTick();
  updateUI();
  showMsg('あたらしいたまごが うまれた！🥚');
  spawnConfetti();
}

// ════════════════════════════════════
//  UI UPDATE
// ════════════════════════════════════
function renderHearts(id, val, max=4) {
  const el = document.getElementById(id);
  let h = '';
  for (let i = 0; i < max; i++) {
    h += `<span style="color:${i<val?'#FF4478':'#DDD'};font-size:14px">${i<val?'♥':'♡'}</span>`;
  }
  el.innerHTML = h;
}

let prevAge = -1, prevWeight = -1;

function updateUI() {
  const mon = M[G.stage] || M['egg'];
  
  // Stage bg
  document.getElementById('stage-bg').style.background = G.isAlive ? mon.bg : '#eee';
  
  // Monster SVG
  const svg = document.getElementById('monster-svg');
  svg.innerHTML = mon.draw();
  const mc = document.getElementById('mon-container');
  mc.className = 'relative z-10 flex items-center justify-center';
  if (G.isAlive) mc.classList.add(mon.anim);
  if (G.isSick) mc.style.animation = 'sick-shake 0.4s ease-in-out infinite';
  else mc.style.animation = '';
  
  // Name & stage
  document.getElementById('mon-name-disp').textContent = G.isAlive ? mon.name : '👻';
  
  let stageLabel = 'STAGE: EGG';
  if (['A','B','C'].includes(G.stage)) stageLabel = 'STAGE: 1';
  else if (G.stage.length === 2 && G.stage !== 'egg') stageLabel = 'STAGE: 2';
  else if (G.stage.length === 3) stageLabel = 'STAGE: FINAL';
  document.getElementById('stage-disp').textContent = stageLabel;
  
  // Age & weight
  const ageEl = document.getElementById('age-display');
  if (G.age !== prevAge) { 
    ageEl.textContent = `${G.age}日`;
    ageEl.classList.remove('score-pop');
    void ageEl.offsetWidth;
    if (prevAge >= 0) ageEl.classList.add('score-pop');
    prevAge = G.age;
  }
  const wEl = document.getElementById('weight-display');
  if (G.weight !== prevWeight) {
    wEl.textContent = `${G.weight}g`;
    wEl.classList.remove('score-pop');
    void wEl.offsetWidth;
    if (prevWeight >= 0) wEl.classList.add('score-pop');
    prevWeight = G.weight;
  }
  
  // Hearts
  renderHearts('hunger-hearts', G.hunger);
  renderHearts('happy-hearts', G.happy);
  
  // Indicators
  document.getElementById('poop-ind').classList.toggle('hidden', !G.poop);
  document.getElementById('sick-ind').classList.toggle('hidden', !G.isSick);
  
  // Status text
  let st = 'RAISING';
  if (!G.isAlive) st = 'GOODBYE...';
  else if (G.isSleeping) st = 'SLEEPING';
  else if (G.isSick) st = 'SICK!';
  else if (G.hunger === 0 || G.happy === 0) st = 'CALL!';
  document.getElementById('status-text').textContent = st;
  
  // Call indicator
  showCallInd(callActive || (!G.isAlive?false: G.isSick || G.hunger === 0 || G.happy === 0 || G.poop));
}

// ════════════════════════════════════
//  PARTICLES
// ════════════════════════════════════
function spawnParticles(emoji) {
  const stage = document.getElementById('monster-stage');
  const rect = stage.getBoundingClientRect();
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:fixed;font-size:${14+Math.random()*10}px;pointer-events:none;z-index:50;
      left:${rect.left + rect.width/2 + (Math.random()-0.5)*60}px;
      top:${rect.top + rect.height/2}px;
      --px:${(Math.random()-0.5)*80}px;
      --py:${-40-Math.random()*60}px;
      animation:particle-up ${0.6+Math.random()*0.5}s ease-out forwards`;
    p.textContent = emoji;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 1200);
  }
}

function spawnConfetti() {
  const colors = ['#3b82f6','#ef4444','#22c55e','#f59e0b','#a855f7','#ec4899','#06b6d4'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.style.left = (Math.random()*105)+'vw';
    el.style.top = (-10-Math.random()*50)+'px';
    el.style.backgroundColor = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2+Math.random()*2.8)+'s';
    el.style.animationDelay = (Math.random()*0.9)+'s';
    el.style.setProperty('--rot',(Math.random()*1440-720)+'deg');
    const d = 6+Math.random()*8; el.style.width=d+'px'; el.style.height=d+'px'; el.style.borderRadius='2px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),5000);
  }
}

// ════════════════════════════════════
//  MESSAGE
// ════════════════════════════════════
let msgTimer = null;
function showMsg(text) {
  const el = document.getElementById('msg-text');
  el.textContent = text;
  if (msgTimer) clearTimeout(msgTimer);
  msgTimer = setTimeout(()=>el.textContent='', 2500);
}

function showToast(text) {
  const t = document.createElement('div');
  t.className = 'toast-pop fixed top-1/2 left-1/2 bg-black/90 text-white px-8 py-4 rounded-3xl font-black z-50 text-lg';
  t.textContent = text;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 1900);
}

// ════════════════════════════════════
//  INIT
// ════════════════════════════════════
window.onload = function() {
  lucide.createIcons();
  const loaded = loadGame();
  startTick();
  updateUI();
  if (!loaded) {
    showMsg('あたらしいたまごが うまれた！🥚');
  } else {
    showMsg(`おかえり！${M[G.stage]?.name || 'たまご'}だよ！`);
  }
};
</script>
