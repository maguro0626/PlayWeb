<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monster RPG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --app-height: 100%; }
        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            touch-action: none;
            user-select: none;
        }
        .glass-header {
            background-color: rgba(255,255,255,0.7);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }
        
        .game-screen-wrapper {
            background: linear-gradient(135deg, #081e09 0%, #133314 60%, #1a4a1c 100%);
            border: 6px solid #0a0a0a;
            border-radius: 12px;
            box-shadow:
                0 40px 80px rgba(0,0,0,0.5),
                inset 0 0 30px rgba(0,0,0,0.9),
                0 0 60px rgba(0,80,0,0.2);
            overflow: hidden;
            position: relative;
            aspect-ratio: 1/1;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        canvas {
            image-rendering: pixelated;
            width: 100%;
            height: 100%;
            display: block;
        }

        @keyframes floatup{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
        @keyframes wobble{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
        
        .anim-float { animation: floatup 2s ease-in-out infinite; }
        .anim-pulse { animation: pulse 1.5s ease-in-out infinite; }
        .anim-wobble { animation: wobble 1s ease-in-out infinite; }
        .anim-bounce { animation: bounce 1.1s ease-in-out infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .battle-blink { animation: blink 0.2s 3; }
        
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .battle-shake { animation: shake 0.3s; filter: brightness(2) sepia(1) hue-rotate(-50deg) saturate(5); }

        @keyframes attack-move-up { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .attack-up { animation: attack-move-up 0.3s; }
        @keyframes attack-move-down { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(20px); } }
        .attack-down { animation: attack-move-down 0.3s; }

        @keyframes flash { 0%, 50%, 100% { background: white; opacity: 0; } 25%, 75% { background: black; opacity: 1; } }
        .enc-flash { position: absolute; inset: 0; pointer-events: none; z-index: 50; animation: flash 1s forwards; }

        .btn-press:active { transform: scale(0.92); transition: transform 0.05s; }

        .hp-bar-bg { background-color: #4b5563; height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid #1f2937; }
        .hp-bar-fill { height: 100%; background-color: #22c55e; transition: width 0.3s ease, background-color 0.3s ease; }
        .hp-bar-fill.low { background-color: #ef4444; }
        .hp-bar-fill.mid { background-color: #eab308; }

        .back-sprite svg { transform: scaleX(-1); filter: brightness(0.9); }
    </style>
</head>
<body class="flex flex-col text-zinc-900">

    <header class="w-full shrink-0 z-50 glass-header border-b border-black/5 h-14 flex items-center justify-between px-4">
        <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-zinc-600 hover:text-zinc-900 transition-colors p-2 rounded-xl hover:bg-black/5">
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-sm font-bold">ホーム</span>
        </button>
        <div id="status-text" class="text-[10px] font-black tracking-widest uppercase text-zinc-400">Match Ready</div>
        <div class="w-20"></div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-4 max-w-lg mx-auto w-full gap-4">
        
        <div class="game-screen-wrapper">
            <canvas id="gameCanvas" width="160" height="160" class="absolute inset-0 z-0"></canvas>
            
            <div id="view-title" class="absolute inset-0 z-40 bg-zinc-900 text-white flex flex-col items-center justify-center p-6">
                <div class="text-4xl font-black mb-2 tracking-widest text-transparent bg-clip-text bg-gradient-to-br from-green-400 to-blue-500 text-center leading-tight">MONSTER<br>QUEST</div>
                <p class="text-xs text-zinc-400 mb-8">Tap START to begin your journey</p>
                <div class="w-24 h-24 mb-8 bg-zinc-800 rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(34,197,94,0.3)]">
                    <svg width="80" height="80" viewBox="0 0 200 200">
                        <defs><radialGradient id="g0" cx="38%" cy="30%"><stop offset="0%" stop-color="#FFF"/><stop offset="70%" stop-color="#FFF5E8"/><stop offset="100%" stop-color="#EDE0C4"/></radialGradient><filter id="g0f"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
                        <ellipse cx="100" cy="110" rx="52" ry="63" fill="rgba(255,240,200,0.3)" filter="url(#g0f)"/>
                        <ellipse cx="100" cy="110" rx="46" ry="56" fill="url(#g0)" stroke="#DDD0AA" stroke-width="1.5"/>
                        <circle cx="82" cy="88" r="5.5" fill="#CCAAE0" opacity="0.55"/><circle cx="115" cy="98" r="4" fill="#CCAAE0" opacity="0.5"/>
                    </svg>
                </div>
                <button onclick="startGame()" class="px-8 py-3 bg-white text-black font-black rounded-2xl active:scale-95 transition-transform">GAME START</button>
            </div>

            <div id="view-battle" class="absolute inset-0 z-20 bg-white hidden flex-col">
                <div class="flex-1 relative flex justify-between items-start p-4" style="background: linear-gradient(180deg, #e0f2fe 0%, #ffffff 100%);">
                    <div class="bg-white/80 backdrop-blur rounded-xl p-2 border border-black/10 shadow-sm min-w-[120px]">
                        <div class="text-[10px] font-black text-zinc-800 flex justify-between"><span id="enemy-name">モンスタ</span><span>Lv <span id="enemy-lvl">5</span></span></div>
                        <div class="hp-bar-bg mt-1"><div id="enemy-hp-bar" class="hp-bar-fill" style="width: 100%;"></div></div>
                    </div>
                    <div id="enemy-sprite" class="w-24 h-24 mt-4 drop-shadow-xl transform origin-bottom"></div>
                </div>
                <div class="flex-1 relative flex justify-between items-end p-4 pb-2" style="background: linear-gradient(0deg, #dcfce7 0%, #ffffff 100%);">
                    <div id="player-sprite" class="w-24 h-24 mb-4 drop-shadow-xl back-sprite transform origin-bottom"></div>
                    <div class="bg-white/90 backdrop-blur rounded-xl p-2 border border-black/10 shadow-sm min-w-[120px] relative top-[-10px]">
                        <div class="text-[10px] font-black text-zinc-800 flex justify-between"><span id="player-name">たまご</span><span>Lv <span id="player-lvl">5</span></span></div>
                        <div class="hp-bar-bg mt-1"><div id="player-hp-bar" class="hp-bar-fill" style="width: 100%;"></div></div>
                        <div class="text-right text-[9px] font-bold mt-0.5 text-zinc-500"><span id="player-hp-val">20</span> / <span id="player-hp-max">20</span></div>
                    </div>
                </div>
                <div class="h-[35%] bg-zinc-900 border-t-4 border-zinc-700 p-3 flex flex-col">
                    <div id="battle-msg" class="text-white text-xs font-bold leading-relaxed mb-2 h-8">あ！ やせいの モンスタ が とびだしてきた！</div>
                    <div id="battle-cmds" class="grid grid-cols-2 gap-2 flex-1">
                        <button onclick="battleCmd('attack')" class="btn-press bg-zinc-100 text-zinc-900 rounded-xl font-black text-sm">たたかう</button>
                        <button onclick="battleCmd('catch')" class="btn-press bg-zinc-800 border-2 border-zinc-600 text-white rounded-xl font-black text-sm">つかまえる</button>
                        <button onclick="battleCmd('party')" class="btn-press bg-zinc-800 border-2 border-zinc-600 text-white rounded-xl font-black text-sm">モンス</button>
                        <button onclick="battleCmd('run')" class="btn-press bg-zinc-800 border-2 border-zinc-600 text-white rounded-xl font-black text-sm">にげる</button>
                    </div>
                </div>
            </div>

            <div id="view-menu" class="absolute inset-0 z-30 bg-black/90 backdrop-blur-sm hidden text-white p-4 flex flex-col">
                <div class="text-sm font-black uppercase tracking-widest text-center border-b border-white/20 pb-2 mb-3">PARTY - <span class="text-xs text-zinc-400">タップで先頭に変更</span></div>
                <div id="party-list" class="flex-1 overflow-y-auto space-y-2">
                    <!-- Party items injected here -->
                </div>
                <div class="mt-4 grid grid-cols-2 gap-3">
                    <button onclick="saveGame(true)" class="py-3 bg-blue-600 text-white rounded-xl font-bold btn-press flex items-center justify-center gap-2"><i data-lucide="save" class="w-4 h-4"></i>セーブ</button>
                    <button onclick="closeMenu()" class="py-3 bg-zinc-700 text-white rounded-xl font-bold btn-press flex items-center justify-center gap-2"><i data-lucide="x" class="w-4 h-4"></i>とじる</button>
                </div>
            </div>

            <div id="view-dialog" class="absolute inset-0 z-50 bg-black/80 hidden flex items-center justify-center p-4">
                <div class="bg-white text-black p-6 rounded-3xl w-full max-w-[280px] text-center shadow-2xl">
                    <div id="dialog-img" class="w-24 h-24 mx-auto mb-4"></div>
                    <div id="dialog-title" class="font-black text-lg mb-2">レベルアップ！</div>
                    <div id="dialog-desc" class="text-sm font-bold text-zinc-600 mb-6">たまご は Lv 6 になった！</div>
                    <button onclick="closeDialog()" class="w-full py-3 bg-zinc-900 text-white rounded-xl font-bold btn-press">OK</button>
                </div>
            </div>

        </div>

        <div class="w-full bg-white/80 backdrop-blur-md p-4 rounded-[2rem] border border-black/5 shadow-sm shrink-0 flex justify-between items-center px-6">
            <div class="relative w-28 h-28">
                <div class="absolute inset-0 bg-zinc-200 rounded-full opacity-50"></div>
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-9 h-full bg-zinc-800 rounded-xl"></div>
                <div class="absolute top-1/2 left-0 -translate-y-1/2 w-full h-9 bg-zinc-800 rounded-xl"></div>
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-zinc-900 rounded-full shadow-inner"></div>
                
                <button onmousedown="inputDir('up', true)" onmouseup="inputDir('up', false)" onmouseleave="inputDir('up', false)" ontouchstart="inputDir('up', true)" ontouchend="inputDir('up', false)" class="absolute top-0 left-1/2 -translate-x-1/2 w-10 h-10 opacity-0 z-10"></button>
                <button onmousedown="inputDir('down', true)" onmouseup="inputDir('down', false)" onmouseleave="inputDir('down', false)" ontouchstart="inputDir('down', true)" ontouchend="inputDir('down', false)" class="absolute bottom-0 left-1/2 -translate-x-1/2 w-10 h-10 opacity-0 z-10"></button>
                <button onmousedown="inputDir('left', true)" onmouseup="inputDir('left', false)" onmouseleave="inputDir('left', false)" ontouchstart="inputDir('left', true)" ontouchend="inputDir('left', false)" class="absolute top-1/2 left-0 -translate-y-1/2 w-10 h-10 opacity-0 z-10"></button>
                <button onmousedown="inputDir('right', true)" onmouseup="inputDir('right', false)" onmouseleave="inputDir('right', false)" ontouchstart="inputDir('right', true)" ontouchend="inputDir('right', false)" class="absolute top-1/2 right-0 -translate-y-1/2 w-10 h-10 opacity-0 z-10"></button>
            </div>

            <div class="flex gap-4 transform rotate-[-15deg]">
                <button onclick="btnB()" class="w-14 h-14 bg-red-500 rounded-full shadow-[0_6px_0_#b91c1c] active:shadow-[0_2px_0_#b91c1c] active:translate-y-1 transition-all flex items-center justify-center relative top-6">
                    <span class="text-white font-black text-xl">B</span>
                </button>
                <button onclick="btnA()" class="w-14 h-14 bg-blue-500 rounded-full shadow-[0_6px_0_#1d4ed8] active:shadow-[0_2px_0_#1d4ed8] active:translate-y-1 transition-all flex items-center justify-center">
                    <span class="text-white font-black text-xl">A</span>
                </button>
            </div>
        </div>

    </main>

<script>
// ════════════════════════════════════
//  MONSTER DEFINITIONS
// ════════════════════════════════════
const M = {
  egg:{name:'たまご',anim:'anim-pulse',draw:()=>`<defs><radialGradient id="ge" cx="38%" cy="30%"><stop offset="0%" stop-color="#FFF"/><stop offset="70%" stop-color="#FFF5E8"/><stop offset="100%" stop-color="#EDE0C4"/></radialGradient></defs><ellipse cx="100" cy="110" rx="46" ry="56" fill="url(#ge)" stroke="#DDD0AA" stroke-width="1.5"/><circle cx="82" cy="88" r="5.5" fill="#CCAAE0" opacity="0.55"/><circle cx="115" cy="98" r="4" fill="#CCAAE0" opacity="0.5"/>`},
  A:{name:'パフモ',anim:'anim-bounce',draw:()=>`<circle cx="100" cy="118" r="44" fill="#FFE5F0" stroke="#FFB8D8" stroke-width="1"/><circle cx="87" cy="111" r="10" fill="#1A0810"/><circle cx="113" cy="111" r="10" fill="#1A0810"/><circle cx="90" cy="108" r="3" fill="white"/><circle cx="116" cy="108" r="3" fill="white"/>`},
  B:{name:'イグニク',anim:'anim-wobble',draw:()=>`<path d="M100 78 Q136 78 147 110 Q150 132 136 150 Q120 164 100 164 Q80 164 64 150 Q50 132 53 110 Q64 78 100 78Z" fill="#00AACC" stroke="#009AB8" stroke-width="1.5"/><ellipse cx="86" cy="107" rx="10" ry="7" fill="#001820"/><ellipse cx="114" cy="107" rx="10" ry="7" fill="#001820"/><ellipse cx="89" cy="105" rx="4" ry="3" fill="white"/><ellipse cx="117" cy="105" rx="4" ry="3" fill="white"/>`},
  C:{name:'ルメッシュ',anim:'anim-float',draw:()=>`<path d="M100 68 Q132 66 144 90 Q158 118 150 144 Q140 165 120 164 Q104 172 86 162 Q62 152 56 130 Q48 106 62 86 Q73 66 100 68Z" fill="#A888EE" opacity="0.93"/><circle cx="87" cy="108" r="14" fill="#180A28"/><circle cx="114" cy="113" r="9" fill="#180A28"/><circle cx="91" cy="103" r="5" fill="#fff"/><circle cx="117" cy="109" r="3" fill="#fff"/>`},
  AA:{name:'フラッフィア',anim:'anim-bounce',draw:()=>`<circle cx="100" cy="118" r="48" fill="#FFE0EE"/><path d="M70 75 Q60 50 74 46 Q82 55 78 72Z" fill="#FFD0E8"/><path d="M130 75 Q140 50 126 46 Q118 55 122 72Z" fill="#FFD0E8"/><circle cx="86" cy="110" r="12" fill="#180A10"/><circle cx="114" cy="110" r="12" fill="#180A10"/><circle cx="89" cy="106" r="4" fill="white"/><circle cx="117" cy="106" r="4" fill="white"/>`},
  AB:{name:'スカルドフワ',anim:'anim-wobble',draw:()=>`<circle cx="100" cy="118" r="46" fill="#FFEACC"/><path d="M105 105 Q112 98 120 105 Q113 112 105 105Z" fill="#FFAA44"/><circle cx="88" cy="111" r="11" fill="#1A0800"/><circle cx="112" cy="111" r="11" fill="#1A0800"/><circle cx="91" cy="108" r="4" fill="white"/><circle cx="115" cy="108" r="4" fill="white"/>`},
  AC:{name:'ミストパフ',anim:'anim-float',draw:()=>`<circle cx="100" cy="115" r="44" fill="rgba(200,220,255,0.75)" stroke="rgba(160,185,255,0.5)"/><circle cx="88" cy="111" r="11" fill="#2244AA"/><circle cx="112" cy="111" r="11" fill="#2244AA"/><circle cx="91" cy="108" r="3" fill="white"/><circle cx="115" cy="108" r="3" fill="white"/>`},
  BA:{name:'カールスケイル',anim:'anim-wobble',draw:()=>`<path d="M100 76 Q136 76 148 110 Q151 134 136 150 Q120 164 100 164 Q80 164 64 150 Q49 134 52 110 Q64 76 100 76Z" fill="#44BBAA"/><ellipse cx="86" cy="106" rx="10" ry="8" fill="#001818"/><ellipse cx="114" cy="106" rx="10" ry="8" fill="#001818"/><ellipse cx="89" cy="104" rx="4" ry="3" fill="white"/><ellipse cx="117" cy="104" rx="4" ry="3" fill="white"/>`},
  BB:{name:'ブレイザー',anim:'anim-dance',draw:()=>`<path d="M100 76 Q136 76 148 110 Q151 132 136 150 Q120 162 100 162 Q80 162 64 150 Q49 132 52 110 Q64 76 100 76Z" fill="#FF5500"/><ellipse cx="85" cy="106" rx="11" ry="8" fill="#220800"/><ellipse cx="115" cy="106" rx="11" ry="8" fill="#220800"/><ellipse cx="88" cy="104" rx="4.5" ry="3" fill="#FF8844"/><ellipse cx="118" cy="104" rx="4.5" ry="3" fill="#FF8844"/>`},
  BC:{name:'ヴァイアスケイル',anim:'anim-wobble',draw:()=>`<path d="M100 76 Q136 76 148 110 Q151 132 136 150 Q120 164 100 164 Q80 164 64 150 Q49 132 52 110 Q64 76 100 76Z" fill="#88CC66"/><ellipse cx="85" cy="106" rx="11" ry="8" fill="#0A1800"/><ellipse cx="115" cy="106" rx="11" ry="8" fill="#0A1800"/><ellipse cx="85" cy="106" rx="3" ry="7" fill="#88FF44"/><ellipse cx="115" cy="106" rx="3" ry="7" fill="#88FF44"/>`},
  CA:{name:'スターウィッシュ',anim:'anim-float',draw:()=>`<path d="M100 68 Q132 66 144 90 Q158 118 150 144 Q140 165 120 164 Q104 172 86 162 Q62 152 56 130 Q48 106 62 86 Q73 66 100 68Z" fill="#AA88EE"/><text x="87" y="62" font-size="22" fill="#FFDD88">★</text><circle cx="88" cy="110" r="13" fill="#180A28"/><circle cx="114" cy="113" r="10" fill="#180A28"/><circle cx="91" cy="106" r="5" fill="#fff"/><circle cx="117" cy="110" r="3.5" fill="#fff"/>`},
  CB:{name:'スペクトレル',anim:'anim-float',draw:()=>`<path d="M100 68 Q134 66 146 92 Q158 120 150 146 Q140 166 120 165 Q104 173 86 163 Q62 153 56 130 Q48 106 62 86 Q74 66 100 68Z" fill="#8899DD"/><circle cx="88" cy="110" r="13" fill="#08001A"/><circle cx="113" cy="113" r="9" fill="#08001A"/><circle cx="91" cy="106" r="5" fill="#fff"/><circle cx="116" cy="110" r="3" fill="#fff"/>`},
  CC:{name:'ドレッドリング',anim:'anim-float',draw:()=>`<path d="M100 65 Q135 63 148 90 Q162 120 152 148 Q142 168 120 167 Q104 175 84 165 Q58 154 52 130 Q44 104 58 83 Q70 63 100 65Z" fill="#2A1055"/><circle cx="88" cy="110" r="14" fill="#08001A"/><circle cx="112" cy="112" r="10" fill="#08001A"/><circle cx="88" cy="110" r="3" fill="#fff"/><circle cx="112" cy="112" r="2" fill="#fff"/>`},
  AAA:{name:'セレスタフィン',anim:'anim-float',draw:()=>`<circle cx="100" cy="118" r="48" fill="#FFF5E0"/><circle cx="86" cy="110" r="12" fill="#180A00"/><circle cx="114" cy="110" r="12" fill="#180A00"/><text x="56" y="90" font-size="14" fill="#FFDD44">★</text><text x="128" y="88" font-size="12" fill="#FFDD44">★</text>`},
  BBB:{name:'インフェルノ',anim:'anim-dance',draw:()=>`<path d="M100 72 Q140 72 152 110 Q155 134 140 154 Q124 170 100 170 Q76 170 60 154 Q45 134 48 110 Q60 72 100 72Z" fill="#CC2200"/><ellipse cx="84" cy="107" rx="12" ry="9" fill="#100000"/><ellipse cx="116" cy="107" rx="12" ry="9" fill="#100000"/>`},
  CCC:{name:'カオスヴォイド',anim:'anim-pulse',draw:()=>`<path d="M100 60 Q140 58 154 88 Q170 122 158 152 Q148 174 126 173 Q110 181 90 171 Q62 160 56 136 Q48 108 62 84 Q74 60 100 60Z" fill="#0A0420"/><circle cx="88" cy="110" r="15" fill="#040010"/><circle cx="112" cy="110" r="12" fill="#040010"/>`},
};
// 補完
const KEYS = ['AAB','AAC','ABA','ABB','ABC','ACA','ACB','ACC','BAA','BAB','BAC','BBA','BBC','BCA','BCB','BCC','CAA','CAB','CAC','CBA','CBB','CBC','CCA','CCB'];
KEYS.forEach(k => { if(!M[k]) M[k] = {name:'モンスタ'+k, anim:'anim-pulse', draw:M.A.draw}; });

const EVO_LEVELS = { stage1: 10, stage2: 25 };
const EVO_TREE = {
  egg: ['A','B','C'], A: ['AA','AB','AC'], B: ['BA','BB','BC'], C: ['CA','CB','CC'],
  AA: ['AAA','AAB','AAC'], AB: ['ABA','ABB','ABC'], AC: ['ACA','ACB','ACC'],
  BA: ['BAA','BAB','BAC'], BB: ['BBA','BBB','BBC'], BC: ['BCA','BCB','BCC'],
  CA: ['CAA','CAB','CAC'], CB: ['CBA','CBB','CBC'], CC: ['CCA','CCB','CCC']
};

function getStats(stage, level) {
    let base = { hp: 20, atk: 5, def: 5, spd: 5 };
    if(stage.length === 1 && stage !== 'egg') base = { hp: 45, atk: 15, def: 15, spd: 15 };
    else if(stage.length === 2) base = { hp: 70, atk: 35, def: 35, spd: 35 };
    else if(stage.length === 3) base = { hp: 110, atk: 65, def: 65, spd: 65 };

    return {
        hp: Math.floor((base.hp * 2 * level) / 100 + level + 10),
        atk: Math.floor((base.atk * 2 * level) / 100 + 5),
        def: Math.floor((base.def * 2 * level) / 100 + 5),
        spd: Math.floor((base.spd * 2 * level) / 100 + 5),
    }
}

// ════════════════════════════════════
//  GAME STATE & SAVE
// ════════════════════════════════════
let gameState = 'title'; // title, map, battle, menu, dialog
let keys = { up: false, down: false, left: false, right: false };

let p = {
    x: 1, y: 1, px: 1, py: 1, moving: false, face: 'down',
    party: [
        { id: generateId(), stage: 'egg', level: 5, exp: 0, currentHp: 20 }
    ],
    items: { ball: 10, potion: 5 },
    seen: ['egg']
};

function generateId() { return Math.random().toString(36).substr(2, 9); }

function saveGame(showMsg = false) {
    localStorage.setItem('mon_rpg_save', JSON.stringify(p));
    if(showMsg) {
        document.getElementById('status-text').innerText = 'SAVED';
        setTimeout(()=>document.getElementById('status-text').innerText='EXPLORING', 2000);
    }
}

function loadGame() {
    const s = localStorage.getItem('mon_rpg_save');
    if(s) {
        try { p = JSON.parse(s); } catch(e){}
    }
    p.party.forEach(m => {
        m.maxHp = getStats(m.stage, m.level).hp;
        if(m.currentHp === undefined) m.currentHp = m.maxHp;
    });
    // 座標の不正チェック（壁の中にいたらリセット）
    if(mapData[p.y] && mapData[p.y][p.x] === 1) {
        p.x = 1; p.y = 1; p.px = 1; p.py = 1;
    }
}

// ════════════════════════════════════
//  MAP SYSTEM
// ════════════════════════════════════
const TS = 32; 
const VIEW_W = 160; const VIEW_H = 160;

// 新しい広大な森のマップ（全体が繋がっている）
const MAP_STR = `
111111111111111111111111111111
140000000112222222100000022221
100000000002222222100000022221
100000000112222222000000022221
111110011111111111001111111111
100000000012222222001000000001
100000000012222222001000000001
100111100000000000001000000001
122222100011110011111000000001
122222100010000000001000000001
122222100010000000001000000001
122222100010011110001000000001
111111100010012210000000000001
100000000000012210001111111111
100000000000011110000000000041
111111111111111111111111111111
`;
const mapData = MAP_STR.trim().split('\n').map(row => row.split('').map(Number));
const mapW = mapData[0].length;
const mapH = mapData.length;

let ctx;
function initMap() {
    const canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    requestAnimationFrame(gameLoop);
}

function gameLoop() {
    if(gameState === 'map') {
        updateMap();
        drawMap();
    }
    requestAnimationFrame(gameLoop);
}

function updateMap() {
    if (p.moving) {
        const speed = 0.15;
        if (p.px < p.x) p.px = Math.min(p.x, p.px + speed);
        else if (p.px > p.x) p.px = Math.max(p.x, p.px - speed);
        if (p.py < p.y) p.py = Math.min(p.y, p.py + speed);
        else if (p.py > p.y) p.py = Math.max(p.y, p.py - speed);

        if (p.px === p.x && p.py === p.y) {
            p.moving = false;
            checkTile();
        }
    } else {
        let nx = p.x, ny = p.y;
        if (keys.up) { ny--; p.face = 'up'; }
        else if (keys.down) { ny++; p.face = 'down'; }
        else if (keys.left) { nx--; p.face = 'left'; }
        else if (keys.right) { nx++; p.face = 'right'; }

        if (nx !== p.x || ny !== p.y) {
            if (nx >= 0 && nx < mapW && ny >= 0 && ny < mapH && mapData[ny][nx] !== 1) {
                p.x = nx; p.y = ny;
                p.moving = true;
            }
        }
    }
}

function checkTile() {
    const tile = mapData[p.y][p.x];
    if (tile === 4) { // Heal
        p.party.forEach(m => m.currentHp = m.maxHp);
        saveGame();
        showDialog('かいふく！', '手持ちの モンス が ぜんかいふく した！', '<div class="text-4xl">✨</div>');
    } else if (tile === 2) { // Bush
        if (Math.random() < 0.15) {
            startBattle();
        }
    }
}

function drawMap() {
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

    const cx = Math.floor(VIEW_W/2 - p.px * TS - TS/2);
    const cy = Math.floor(VIEW_H/2 - p.py * TS - TS/2);

    for(let y=0; y<mapH; y++){
        for(let x=0; x<mapW; x++){
            const px = cx + x * TS;
            const py = cy + y * TS;
            if(px < -TS || px > VIEW_W || py < -TS || py > VIEW_H) continue;

            const t = mapData[y][x];
            ctx.fillStyle = '#4ade80'; 
            ctx.fillRect(px, py, TS, TS);
            
            if(t === 1) { 
                ctx.fillStyle = '#14532d';
                ctx.fillRect(px, py, TS, TS);
                ctx.fillStyle = '#166534';
                ctx.fillRect(px+4, py+4, TS-8, TS-8);
            } else if (t === 2) { 
                ctx.fillStyle = '#22c55e';
                ctx.fillRect(px, py, TS, TS);
                ctx.fillStyle = '#16a34a';
                ctx.fillRect(px+4, py+8, 4, 8);
                ctx.fillRect(px+20, py+12, 4, 8);
            } else if (t === 4) { 
                ctx.fillStyle = '#60a5fa';
                ctx.fillRect(px, py, TS, TS);
                ctx.fillStyle = '#fff';
                ctx.fillRect(px+TS/2-2, py+8, 4, TS-16);
                ctx.fillRect(px+8, py+TS/2-2, TS-16, 4);
            }
        }
    }

    const ppx = cx + p.px * TS;
    const ppy = cy + p.py * TS;
    
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(ppx+TS/2, ppy+TS-4, 8, 4, 0, 0, Math.PI*2); ctx.fill();
    
    ctx.fillStyle = '#ef4444'; 
    ctx.fillRect(ppx+6, ppy+4, TS-12, TS-12);
    ctx.fillStyle = '#fca5a5'; 
    ctx.fillRect(ppx+8, ppy+10, TS-16, TS-16);
    
    ctx.fillStyle = '#000';
    if(p.face === 'down') { ctx.fillRect(ppx+10, ppy+14, 4, 4); ctx.fillRect(ppx+18, ppy+14, 4, 4); }
    else if(p.face === 'left') { ctx.fillRect(ppx+8, ppy+14, 4, 4); }
    else if(p.face === 'right') { ctx.fillRect(ppx+20, ppy+14, 4, 4); }
}

// ════════════════════════════════════
//  BATTLE SYSTEM
// ════════════════════════════════════
let enemy = null;
let activeMonIdx = 0;

function startBattle() {
    changeState('battle');
    document.getElementById('status-text').innerText = 'BATTLE';
    
    const flash = document.createElement('div');
    flash.className = 'enc-flash';
    document.querySelector('.game-screen-wrapper').appendChild(flash);
    setTimeout(()=>flash.remove(), 1000);

    const stages = Object.keys(M);
    const pLv = p.party[activeMonIdx].level;
    let elv = Math.max(1, pLv + Math.floor(Math.random()*5) - 2);
    
    let possibleStages = ['egg','A','B','C'];
    if(elv > EVO_LEVELS.stage1) possibleStages = possibleStages.concat(['AA','AB','AC','BA','BB','BC','CA','CB','CC']);
    if(elv > EVO_LEVELS.stage2) possibleStages = stages;

    const estage = possibleStages[Math.floor(Math.random()*possibleStages.length)];
    const estats = getStats(estage, elv);

    enemy = { stage: estage, level: elv, currentHp: estats.hp, maxHp: estats.hp, stats: estats };
    if(!p.seen.includes(estage)) p.seen.push(estage);

    updateBattleUI();
    setBattleMsg(`あ！ やせいの ${M[enemy.stage].name} が とびだしてきた！`);
}

function updateBattleUI() {
    const myMon = p.party[activeMonIdx];
    const myStats = getStats(myMon.stage, myMon.level);
    myMon.maxHp = myStats.hp;

    document.getElementById('enemy-name').innerText = M[enemy.stage].name;
    document.getElementById('enemy-lvl').innerText = enemy.level;
    const epct = Math.max(0, (enemy.currentHp / enemy.maxHp) * 100);
    const ebar = document.getElementById('enemy-hp-bar');
    ebar.style.width = epct + '%';
    ebar.className = 'hp-bar-fill ' + (epct<20?'low':epct<50?'mid':'');
    document.getElementById('enemy-sprite').innerHTML = `<svg width="100%" height="100%" viewBox="0 0 200 200" class="${M[enemy.stage].anim}">${M[enemy.stage].draw()}</svg>`;

    document.getElementById('player-name').innerText = M[myMon.stage].name;
    document.getElementById('player-lvl').innerText = myMon.level;
    document.getElementById('player-hp-val').innerText = myMon.currentHp;
    document.getElementById('player-hp-max').innerText = myMon.maxHp;
    const ppct = Math.max(0, (myMon.currentHp / myMon.maxHp) * 100);
    const pbar = document.getElementById('player-hp-bar');
    pbar.style.width = ppct + '%';
    pbar.className = 'hp-bar-fill ' + (ppct<20?'low':ppct<50?'mid':'');
    document.getElementById('player-sprite').innerHTML = `<svg width="100%" height="100%" viewBox="0 0 200 200" class="${M[myMon.stage].anim}">${M[myMon.stage].draw()}</svg>`;
}

function setBattleMsg(msg) {
    document.getElementById('battle-msg').innerText = msg;
}

async function battleCmd(cmd) {
    if(gameState !== 'battle') return;
    const btns = document.getElementById('battle-cmds');
    btns.style.pointerEvents = 'none';
    btns.style.opacity = '0.5';

    const myMon = p.party[activeMonIdx];
    const myStats = getStats(myMon.stage, myMon.level);

    if (cmd === 'run') {
        if(Math.random() < 0.7 || myStats.spd > enemy.stats.spd) {
            setBattleMsg('うまく にげきれた！');
            await wait(1000);
            endBattle();
        } else {
            setBattleMsg('にげられなかった！');
            await wait(1000);
            await enemyTurn();
        }
    } else if (cmd === 'attack') {
        setBattleMsg(`${M[myMon.stage].name} の こうげき！`);
        document.getElementById('player-sprite').classList.add('attack-up');
        await wait(300);
        document.getElementById('player-sprite').classList.remove('attack-up');
        
        let dmg = Math.floor(((myMon.level * 2 / 5 + 2) * 40 * (myStats.atk / enemy.stats.def) / 50 + 2) * (0.85 + Math.random()*0.15));
        enemy.currentHp = Math.max(0, enemy.currentHp - dmg);
        
        document.getElementById('enemy-sprite').classList.add('battle-blink');
        updateBattleUI();
        await wait(800);
        document.getElementById('enemy-sprite').classList.remove('battle-blink');

        if(enemy.currentHp <= 0) {
            await winBattle();
        } else {
            await enemyTurn();
        }
    } else if (cmd === 'catch') {
        setBattleMsg('ボール を なげた！');
        await wait(1000);
        const catchRate = ((1 - enemy.currentHp / enemy.maxHp) * 0.5 + 0.1);
        if(Math.random() < catchRate) {
            if(p.party.length < 6) {
                setBattleMsg(`やったー！ ${M[enemy.stage].name} を つかまえた！`);
                p.party.push({ id: generateId(), stage: enemy.stage, level: enemy.level, exp: 0, currentHp: enemy.currentHp });
                await wait(1500);
                endBattle();
            } else {
                setBattleMsg('てもち が いっぱい だ！');
                await wait(1000);
                await enemyTurn();
            }
        } else {
            setBattleMsg('ああっ！ つかまらない！');
            await wait(1000);
            await enemyTurn();
        }
    } else if (cmd === 'party') {
        const nextIdx = p.party.findIndex((m, i) => i !== activeMonIdx && m.currentHp > 0);
        if(nextIdx !== -1) {
            setBattleMsg(`もどれ！ ${M[myMon.stage].name}！`);
            await wait(1000);
            activeMonIdx = nextIdx;
            setBattleMsg(`ゆけっ！ ${M[p.party[activeMonIdx].stage].name}！`);
            updateBattleUI();
            await wait(1000);
            await enemyTurn(); 
        } else {
            setBattleMsg('ほかに たたかえる モンスがいない！');
            await wait(1000);
        }
    }

    if(gameState === 'battle') {
        btns.style.pointerEvents = 'auto';
        btns.style.opacity = '1';
    }
}

async function enemyTurn() {
    const myMon = p.party[activeMonIdx];
    const myStats = getStats(myMon.stage, myMon.level);

    setBattleMsg(`${M[enemy.stage].name} の こうげき！`);
    document.getElementById('enemy-sprite').classList.add('attack-down');
    await wait(300);
    document.getElementById('enemy-sprite').classList.remove('attack-down');

    let dmg = Math.floor(((enemy.level * 2 / 5 + 2) * 40 * (enemy.stats.atk / myStats.def) / 50 + 2) * (0.85 + Math.random()*0.15));
    myMon.currentHp = Math.max(0, myMon.currentHp - dmg);
    
    document.getElementById('player-sprite').classList.add('battle-shake');
    updateBattleUI();
    await wait(800);
    document.getElementById('player-sprite').classList.remove('battle-shake');

    if(myMon.currentHp <= 0) {
        setBattleMsg(`${M[myMon.stage].name} は たおれた！`);
        await wait(1500);
        const nextIdx = p.party.findIndex(m => m.currentHp > 0);
        if(nextIdx !== -1) {
            activeMonIdx = nextIdx;
            setBattleMsg(`ゆけっ！ ${M[p.party[activeMonIdx].stage].name}！`);
            updateBattleUI();
            await wait(1000);
        } else {
            setBattleMsg('めのまえが まっくら になった...');
            await wait(1500);
            // Respawn
            p.x = 1; p.y = 1; p.px = 1; p.py = 1;
            p.party.forEach(m => m.currentHp = getStats(m.stage, m.level).hp);
            endBattle();
        }
    }
}

async function winBattle() {
    const myMon = p.party[activeMonIdx];
    setBattleMsg(`${M[enemy.stage].name} を たおした！`);
    document.getElementById('enemy-sprite').style.opacity = '0';
    await wait(1000);
    
    const expGained = enemy.level * 10;
    setBattleMsg(`${M[myMon.stage].name} は ${expGained} EXP をてにいれた！`);
    myMon.exp += expGained;
    await wait(1500);

    const nextLvExp = Math.pow(myMon.level, 3);
    if(myMon.exp >= nextLvExp) {
        myMon.level++;
        const newStats = getStats(myMon.stage, myMon.level);
        myMon.maxHp = newStats.hp;
        myMon.currentHp = myMon.maxHp; // レベルアップで全回復
        
        showDialog('レベルアップ！', `${M[myMon.stage].name} は Lv ${myMon.level} になった！`, `<svg viewBox="0 0 200 200" width="100%" height="100%">${M[myMon.stage].draw()}</svg>`);
        await waitForState('battle'); 
        
        let evolved = false;
        if(myMon.stage === 'egg' && myMon.level >= EVO_LEVELS.stage1) evolved = true;
        else if(myMon.stage.length === 1 && myMon.level >= EVO_LEVELS.stage2) evolved = true;
        
        if(evolved) {
            const evos = EVO_TREE[myMon.stage] || [];
            if(evos.length > 0) {
                const nextStage = evos[Math.floor(Math.random()*evos.length)];
                showDialog('おや...？', `${M[myMon.stage].name} の ようすが...`, `<svg viewBox="0 0 200 200" width="100%" height="100%" class="anim-pulse" style="filter:brightness(0) sepia(1) hue-rotate(50deg) saturate(5);">${M[myMon.stage].draw()}</svg>`);
                await waitForState('battle');
                
                myMon.stage = nextStage;
                if(!p.seen.includes(nextStage)) p.seen.push(nextStage);
                showDialog('おめでとう！', `${M[myMon.stage].name} に しんか した！`, `<svg viewBox="0 0 200 200" width="100%" height="100%" class="anim-bounce">${M[myMon.stage].draw()}</svg>`);
                await waitForState('battle');
            }
        }
    }
    
    endBattle();
}

function endBattle() {
    document.getElementById('enemy-sprite').style.opacity = '1';
    document.getElementById('battle-cmds').style.pointerEvents = 'auto';
    document.getElementById('battle-cmds').style.opacity = '1';
    changeState('map');
    document.getElementById('status-text').innerText = 'EXPLORING';
    saveGame();
}

function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
function waitForState(state) {
    return new Promise(resolve => {
        const check = setInterval(()=>{
            if(gameState === state) { clearInterval(check); resolve(); }
        }, 100);
    });
}

// ════════════════════════════════════
//  UI CONTROLS
// ════════════════════════════════════
function changeState(state) {
    gameState = state;
    document.getElementById('view-title').classList.toggle('hidden', state !== 'title');
    document.getElementById('gameCanvas').style.display = state === 'map' || state === 'menu' || state === 'dialog' ? 'block' : 'none';
    document.getElementById('view-battle').style.display = state === 'battle' ? 'flex' : 'none';
    document.getElementById('view-menu').classList.toggle('hidden', state !== 'menu');
    document.getElementById('view-dialog').classList.toggle('hidden', state !== 'dialog');
}

function startGame() {
    loadGame();
    initMap();
    changeState('map');
    
    // 戦闘開始時に生存している最初のモンスターをアクティブに
    activeMonIdx = p.party.findIndex(m => m.currentHp > 0);
    if(activeMonIdx === -1) {
        p.party.forEach(m => m.currentHp = getStats(m.stage, m.level).hp);
        activeMonIdx = 0;
    }
}

function inputDir(dir, isDown) { keys[dir] = isDown; }

function btnA() {
    if(gameState === 'title') startGame();
    else if(gameState === 'dialog') closeDialog();
}
function btnB() {
    if(gameState === 'map') openMenu();
    else if(gameState === 'menu') closeMenu();
}

function openMenu() {
    if(gameState !== 'map') return;
    changeState('menu');
    document.getElementById('status-text').innerText = 'MENU';
    
    const list = document.getElementById('party-list');
    list.innerHTML = '';
    p.party.forEach((m, idx) => {
        const pct = Math.max(0, m.currentHp / m.maxHp * 100);
        const isLeader = idx === 0;
        list.innerHTML += `
            <div onclick="swapToFront(${idx})" class="bg-white/10 rounded-xl p-3 flex items-center gap-3 border ${isLeader ? 'border-blue-400' : 'border-white/5'} cursor-pointer active:scale-95 transition-transform">
                <div class="w-12 h-12 bg-white/20 rounded-lg flex items-center justify-center shrink-0">
                    <svg width="40" height="40" viewBox="0 0 200 200">${M[m.stage].draw()}</svg>
                </div>
                <div class="flex-1">
                    <div class="text-sm font-black flex justify-between"><span>${M[m.stage].name}</span><span class="text-zinc-400 text-xs">Lv ${m.level}</span></div>
                    <div class="hp-bar-bg mt-1 h-1.5"><div class="hp-bar-fill ${pct<20?'low':pct<50?'mid':''}" style="width: ${pct}%"></div></div>
                    <div class="text-[10px] text-right mt-0.5">${m.currentHp}/${m.maxHp}</div>
                </div>
                ${isLeader ? '<div class="text-xs font-bold text-blue-400">先頭</div>' : ''}
            </div>
        `;
    });
}

function swapToFront(idx) {
    if(idx === 0) return;
    const temp = p.party[0];
    p.party[0] = p.party[idx];
    p.party[idx] = temp;
    activeMonIdx = 0;
    saveGame();
    openMenu(); // 再描画
}

function closeMenu() {
    if(gameState !== 'menu') return;
    changeState('map');
    document.getElementById('status-text').innerText = 'EXPLORING';
}

let prevState = '';
function showDialog(title, desc, imgHtml) {
    if(gameState !== 'dialog') prevState = gameState;
    changeState('dialog');
    document.getElementById('dialog-title').innerText = title;
    document.getElementById('dialog-desc').innerText = desc;
    document.getElementById('dialog-img').innerHTML = imgHtml;
}
function closeDialog() {
    changeState(prevState);
}

// PC Keys
window.addEventListener('keydown', e => {
    if(e.key === 'ArrowUp') keys.up = true;
    if(e.key === 'ArrowDown') keys.down = true;
    if(e.key === 'ArrowLeft') keys.left = true;
    if(e.key === 'ArrowRight') keys.right = true;
    if(e.key === 'z' || e.key === 'Z') btnA();
    if(e.key === 'x' || e.key === 'X') btnB();
});
window.addEventListener('keyup', e => {
    if(e.key === 'ArrowUp') keys.up = false;
    if(e.key === 'ArrowDown') keys.down = false;
    if(e.key === 'ArrowLeft') keys.left = false;
    if(e.key === 'ArrowRight') keys.right = false;
});

window.onload = () => { lucide.createIcons(); };
</script>
