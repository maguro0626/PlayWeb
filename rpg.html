<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>モンスタークエスト</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;
  font-family:'Hiragino Kaku Gothic Pro','Noto Sans JP',sans-serif}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;image-rendering:pixelated;display:block}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;padding:8px 14px 6px;
  background:linear-gradient(180deg,rgba(0,0,0,0.7) 0%,transparent);pointer-events:none}
#hud-loc{font-size:14px;font-weight:900;color:#fff;text-shadow:0 2px 8px #000}
#hud-money{font-size:11px;color:#fbbf24;font-weight:700;margin-top:1px}
#hud-badges{display:flex;gap:3px;margin-top:4px}
.badge-icon{font-size:18px;filter:drop-shadow(0 0 4px gold)}

/* D-PAD */
#controls{position:fixed;bottom:0;left:0;right:0;z-index:50;
  display:flex;justify-content:space-between;align-items:flex-end;
  padding:8px 18px 20px;pointer-events:none}
#dpad{position:relative;width:120px;height:120px;pointer-events:all}
.dp{position:absolute;width:40px;height:40px;
  background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.3);
  border-radius:10px;backdrop-filter:blur(6px);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  font-size:16px;color:rgba(255,255,255,0.7);transition:background .07s}
.dp.on,.dp:active{background:rgba(255,255,255,0.42)}
#dp-u{top:0;left:40px}#dp-d{bottom:0;left:40px}
#dp-l{top:40px;left:0}#dp-r{top:40px;right:0}
#dp-c{position:absolute;top:40px;left:40px;width:40px;height:40px;
  background:rgba(255,255,255,0.05);border-radius:50%}

/* Action buttons */
#ab-btns{display:flex;gap:14px;align-items:flex-end;pointer-events:all}
.ab{width:54px;height:54px;border-radius:50%;border:none;font-weight:900;font-size:15px;
  color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;
  box-shadow:0 6px 0 rgba(0,0,0,0.55);
  transition:transform .07s,box-shadow .07s;display:flex;align-items:center;justify-content:center}
.ab:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.55)}
#btn-b{background:#c91c1c;margin-bottom:22px}
#btn-a{background:#1d4ed8}

/* Menu button */
#btn-menu{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:50;
  background:rgba(255,255,255,0.13);border:1.5px solid rgba(255,255,255,0.3);
  backdrop-filter:blur(6px);color:#fff;font-size:11px;font-weight:900;
  padding:6px 18px;border-radius:20px;cursor:pointer;-webkit-tap-highlight-color:transparent}
#btn-menu:active{background:rgba(255,255,255,0.3)}

/* OVERLAYS */
.ov{position:fixed;inset:0;z-index:100;display:none;flex-direction:column}
.ov.on{display:flex}

/* TITLE */
#ov-title{background:radial-gradient(ellipse at 40% 30%,#0c1a3a,#12294d 50%,#080e20);
  align-items:center;justify-content:center;text-align:center;padding:24px}
.title-glow{font-size:42px;font-weight:900;letter-spacing:-1px;line-height:1;
  background:linear-gradient(135deg,#60a5fa,#a78bfa,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(96,165,250,0.5));margin-bottom:6px}
.title-sub{font-size:12px;color:#94a3b8;font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:36px}
#ov-title .egg-wrap{width:130px;height:130px;background:rgba(255,255,255,0.06);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  margin:0 auto 36px;box-shadow:0 0 50px rgba(96,165,250,0.25),inset 0 0 30px rgba(0,0,0,0.4)}
.start-btn{padding:16px 48px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:#fff;font-weight:900;font-size:18px;border:none;border-radius:24px;cursor:pointer;
  box-shadow:0 8px 30px rgba(59,130,246,0.5);-webkit-tap-highlight-color:transparent}
.start-btn:active{transform:scale(0.95)}
.title-hint{font-size:10px;color:#475569;margin-top:14px;letter-spacing:2px}

/* STARTER SELECT */
#ov-starter{background:rgba(5,10,25,0.97);align-items:center;justify-content:center;
  z-index:200;padding:20px}
.s-title{color:#f0f4ff;font-size:22px;font-weight:900;text-align:center;margin-bottom:6px}
.s-sub{color:#64748b;font-size:12px;text-align:center;margin-bottom:24px}
.s-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;width:100%;max-width:360px}
.s-card{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.1);
  border-radius:18px;padding:14px 8px;text-align:center;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:all 0.18s}
.s-card:active,.s-card.sel{border-color:#60a5fa;background:rgba(96,165,250,0.15)}
.s-card svg{display:block;margin:0 auto 6px}
.s-cname{color:#e0f2fe;font-size:12px;font-weight:800}
.s-ctype{font-size:10px;color:#64748b;margin-top:2px}
.s-confirm{margin-top:20px;padding:15px 48px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  color:#fff;font-weight:900;font-size:16px;border:none;border-radius:20px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;opacity:0;transition:opacity 0.2s;pointer-events:none}
.s-confirm.on{opacity:1;pointer-events:all}

/* DIALOG */
#dlg{position:fixed;bottom:150px;left:0;right:0;z-index:110;
  background:linear-gradient(0deg,rgba(0,0,0,0.98),rgba(10,15,30,0.96));
  border-top:2px solid rgba(255,255,255,0.1);border-bottom:2px solid rgba(255,255,255,0.1);padding:16px 20px 28px;display:none}
#dlg-name{font-size:11px;font-weight:900;color:#94a3b8;letter-spacing:2px;margin-bottom:5px}
#dlg-txt{font-size:15px;color:#f0f4ff;line-height:1.7;font-weight:600;min-height:52px}
#dlg-cursor{display:inline-block;color:#60a5fa;animation:blink 0.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#dlg-choices{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.dlg-ch{padding:12px 16px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);
  border-radius:12px;color:#e2e8f0;font-size:14px;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;text-align:left}
.dlg-ch:active{background:rgba(96,165,250,0.25);border-color:#60a5fa}
.dlg-ch.sel{background:rgba(96,165,250,0.2);border-color:#60a5fa;color:#fff}

/* BATTLE */
#ov-battle{background:#e0f2fe}
#bfield{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#b-ezone{flex:1;position:relative;
  background:linear-gradient(180deg,#bfdbfe 0%,#dbeafe 60%,#eff6ff 100%);
  display:flex;align-items:flex-start;justify-content:space-between;padding:14px}
#b-pzone{flex:1;position:relative;
  background:linear-gradient(0deg,#bbf7d0 0%,#dcfce7 60%,#f0fff4 100%);
  display:flex;align-items:flex-end;justify-content:space-between;padding:14px}
#b-ui{background:#0f172a;padding:12px 14px 18px;flex-shrink:0}
.bcard{background:white;border-radius:16px;padding:10px 14px;
  box-shadow:0 8px 24px rgba(0,0,0,0.22);min-width:150px}
.bnrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.bname{font-size:13px;font-weight:900;color:#1e293b}
.blv{font-size:11px;color:#64748b;font-weight:700;background:#f1f5f9;
  padding:2px 7px;border-radius:8px}
.bhpt{height:9px;background:#e2e8f0;border-radius:5px;overflow:hidden}
.bhpf{height:100%;border-radius:5px;transition:width 0.5s ease,background-color 0.3s}
.bhpf.h{background:linear-gradient(90deg,#22c55e,#4ade80)}
.bhpf.m{background:linear-gradient(90deg,#ca8a04,#eab308)}
.bhpf.l{background:linear-gradient(90deg,#b91c1c,#ef4444)}
.bhtxt{font-size:10px;color:#64748b;font-weight:700;text-align:right;margin-top:3px}
.bspr{flex:1;display:flex;align-items:center;justify-content:center;margin:0 8px}
#b-ui-inner{display:flex;flex-direction:column;gap:8px}
#bmsg{color:#e2e8f0;font-size:14px;font-weight:700;line-height:1.6;min-height:50px;
  background:rgba(255,255,255,0.05);border-radius:10px;padding:9px 13px}
#bcmds{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bcmd{padding:14px 8px;border-radius:12px;font-size:13px;font-weight:900;cursor:pointer;
  border:none;-webkit-tap-highlight-color:transparent;transition:transform .08s,opacity .1s;
  letter-spacing:0.3px}
.bcmd:active{transform:scale(0.93)}
.bcmd:disabled{opacity:0.35;cursor:default;transform:none}
.cf{background:#fef3c7;color:#92400e}
.cc{background:#ede9fe;color:#4c1d95}
.cb{background:#dcfce7;color:#14532d}
.cr{background:#ffe4e6;color:#9f1239}

/* Move select */
#mpanel{display:none;grid-template-columns:1fr 1fr;gap:8px}
.mcmd{padding:13px 8px;border-radius:12px;font-size:12px;font-weight:900;
  cursor:pointer;border:2px solid transparent;-webkit-tap-highlight-color:transparent;
  color:white;transition:transform .08s}
.mcmd:active{transform:scale(0.93)}

/* Bag */
#bagpanel{display:none;grid-template-columns:1fr 1fr;gap:8px}
.bagbtn{background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.18);
  color:#e2e8f0;border-radius:10px;padding:12px;font-size:12px;font-weight:700;
  cursor:pointer;-webkit-tap-highlight-color:transparent;text-align:left}
.bagbtn:active{background:rgba(255,255,255,0.25)}

/* Switch */
#swpanel{display:none;flex-direction:column;gap:6px;max-height:170px;overflow-y:auto}
.swrow{display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.12);
  border-radius:10px;padding:8px 11px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.swrow:active{background:rgba(255,255,255,0.22)}
.swname{color:#e2e8f0;font-size:12px;font-weight:800}
.swlv{color:#94a3b8;font-size:10px;font-weight:600}

/* Menu overlay */
#ov-menu{background:rgba(5,8,20,0.97);backdrop-filter:blur(12px);z-index:130;padding:18px 18px 24px}
.mu-title{color:#f0f4ff;font-size:14px;font-weight:900;letter-spacing:3px;
  text-align:center;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.1);margin-bottom:14px}
.mu-section{color:#64748b;font-size:10px;font-weight:900;letter-spacing:2px;margin-bottom:8px}
#party-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.prow{display:flex;align-items:center;gap:11px;background:rgba(255,255,255,0.06);
  border:1.5px solid rgba(255,255,255,0.1);border-radius:14px;padding:10px 13px;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
.prow:active{background:rgba(255,255,255,0.18)}
.prow.lead{border-color:#3b82f6;background:rgba(59,130,246,0.12)}
.prow-name{color:#e0f2fe;font-size:13px;font-weight:800}
.prow-lv{color:#94a3b8;font-size:10px;font-weight:700}
.prow-hpbar{height:5px;background:#1e293b;border-radius:3px;overflow:hidden;margin-top:4px;flex:1}
.prow-hpf{height:100%;border-radius:3px}
.mu-close{width:100%;padding:14px;background:rgba(255,255,255,0.07);
  border:1.5px solid rgba(255,255,255,0.15);color:#e2e8f0;font-weight:900;font-size:14px;
  border-radius:14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mu-close:active{background:rgba(255,255,255,0.2)}
.mu-badges-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.mu-badge{font-size:22px;filter:drop-shadow(0 2px 6px rgba(255,200,0,0.5))}
.mu-badge.empty{opacity:0.18;filter:grayscale(1)}

/* EV overlay */
#ov-evo{background:#000;align-items:center;justify-content:center;z-index:150;text-align:center;padding:24px}
#evo-sfx{font-size:72px;animation:evo-spin 0.6s linear infinite}
@keyframes evo-spin{from{transform:scale(1) rotate(0deg)}to{transform:scale(1.3) rotate(360deg)}}
.evo-label{color:#fbbf24;font-size:11px;font-weight:900;letter-spacing:3px;margin-bottom:8px}
.evo-name{color:#fff;font-size:28px;font-weight:900;margin:14px 0 6px}
.evo-desc{color:#94a3b8;font-size:13px;margin-bottom:24px}
.evo-ok{padding:14px 44px;background:rgba(255,255,255,0.14);color:#fff;font-weight:900;
  border:1.5px solid rgba(255,255,255,0.3);border-radius:16px;cursor:pointer;font-size:15px;
  -webkit-tap-highlight-color:transparent}
.evo-ok:active{background:rgba(255,255,255,0.3)}

/* WIN / LOSE */
#ov-win{background:rgba(0,0,0,0.9);align-items:center;justify-content:center;z-index:160;text-align:center;padding:24px}
.win-icon{font-size:64px;margin-bottom:14px}
.win-title{font-size:28px;font-weight:900;color:#fbbf24;margin-bottom:8px}
.win-sub{font-size:14px;color:#94a3b8;margin-bottom:20px}
.win-reward{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);
  border-radius:14px;padding:14px 20px;margin-bottom:20px;text-align:left}
.win-reward div{font-size:13px;color:#e2e8f0;font-weight:700;margin-bottom:4px}
.win-ok{padding:14px 40px;background:linear-gradient(135deg,#fbbf24,#f59e0b);
  color:#000;font-weight:900;font-size:16px;border:none;border-radius:16px;cursor:pointer;
  -webkit-tap-highlight-color:transparent}
.win-ok:active{transform:scale(0.95)}

/* Status bar strip */
#strip{position:fixed;bottom:142px;left:0;right:0;z-index:48;pointer-events:none;
  display:flex;align-items:center;justify-content:center;gap:0}
#strip-inner{background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.1);border-radius:20px;
  padding:5px 16px;display:flex;align-items:center;gap:14px}
.si-label{font-size:9px;font-weight:900;color:#64748b;letter-spacing:1.5px}
.si-val{font-size:12px;font-weight:900;color:#e2e8f0}
.si-div{width:1px;height:20px;background:rgba(255,255,255,0.1)}

/* Encounter flash */
@keyframes encflash{0%,100%{opacity:0}20%,60%{opacity:1;background:white}40%,80%{opacity:0.5;background:black}}
.enc-flash{position:fixed;inset:0;z-index:200;pointer-events:none;animation:encflash 0.8s forwards}

/* Battle animations */
@keyframes floatup{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
@keyframes wobble{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes dance{0%{transform:rotate(-6deg) translateY(0)}25%{transform:rotate(0) translateY(-9px)}50%{transform:rotate(6deg) translateY(0)}75%{transform:rotate(0) translateY(-9px)}100%{transform:rotate(-6deg) translateY(0)}}
.anim-float{animation:floatup 2s ease-in-out infinite}
.anim-pulse{animation:pulse 1.5s ease-in-out infinite}
.anim-wobble{animation:wobble 1s ease-in-out infinite}
.anim-bounce{animation:bounce 1.1s ease-in-out infinite}
.anim-dance{animation:dance 0.75s ease-in-out infinite}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-12px)}75%{transform:translateX(12px)}}
.b-shake{animation:shake 0.35s}
@keyframes atk-u{0%,100%{transform:translateY(0)}50%{transform:translateY(-24px)}}
@keyframes atk-d{0%,100%{transform:translateY(0)}50%{transform:translateY(24px)}}
.atk-up{animation:atk-u 0.32s}
.atk-dn{animation:atk-d 0.32s}
@keyframes dmg-flash{0%,100%{filter:brightness(1)}30%,70%{filter:brightness(3) saturate(0)}}
.dmg-fl{animation:dmg-flash 0.4s}

/* Trainer battle banner */
#trainer-banner{position:fixed;top:0;left:0;right:0;z-index:220;
  background:linear-gradient(90deg,#1e40af,#7c3aed);
  color:#fff;text-align:center;padding:12px;font-size:16px;font-weight:900;
  display:none;transform:translateY(-100%);transition:transform 0.4s}
#trainer-banner.show{display:block;transform:translateY(0)}

/* Scrollable text */
#ov-menu .scroll{max-height:calc(100vh - 260px);overflow-y:auto}

/* Responsive */
@media (min-width:500px){
  #controls{padding-bottom:30px}
  .dp{width:44px;height:44px}
  #dp-u{top:0;left:44px}#dp-d{bottom:0;left:44px}#dp-l{top:44px;left:0}#dp-r{top:44px;right:0}
  #dp-c{top:44px;left:44px;width:44px;height:44px}
  #dpad{width:132px;height:132px}
}

#loading{position:fixed;inset:0;z-index:300;background:#000;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:12px;color:#fff}
.ld-dot{width:10px;height:10px;background:#3b82f6;border-radius:50%;display:inline-block;
  animation:ld 0.9s ease-in-out infinite;margin:0 3px}
.ld-dot:nth-child(2){animation-delay:0.15s}.ld-dot:nth-child(3){animation-delay:0.3s}
@keyframes ld{0%,100%{transform:scale(0.7);opacity:0.5}50%{transform:scale(1.2);opacity:1}}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:32px">🥚</div>
  <div><span class="ld-dot"></span><span class="ld-dot"></span><span class="ld-dot"></span></div>
  <div style="font-size:12px;color:#64748b;letter-spacing:2px">LOADING...</div>
</div>

<canvas id="gc" width="480" height="480"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="hud-loc">スタート地点</div>
  <div id="hud-money">💰 <span id="hud-gold">0</span> G</div>
  <div id="hud-badges"></div>
</div>

<!-- Status strip -->
<div id="strip" style="display:none">
  <div id="strip-inner">
    <div><div class="si-label">PARTY</div><div class="si-val" id="si-party">1/1</div></div>
    <div class="si-div"></div>
    <div><div class="si-label">LEADER</div><div class="si-val" id="si-leader">-</div></div>
    <div class="si-div"></div>
    <div><div class="si-label">Lv</div><div class="si-val" id="si-lv">1</div></div>
    <div class="si-div"></div>
    <div><div class="si-label">HP</div><div class="si-val" id="si-hp">-</div></div>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <div id="dpad">
    <button class="dp" id="dp-u">▲</button>
    <button class="dp" id="dp-d">▼</button>
    <button class="dp" id="dp-l">◀</button>
    <button class="dp" id="dp-r">▶</button>
    <div id="dp-c"></div>
  </div>
<div id="ab-btns">
    <button class="ab" id="btn-b" onmousedown="btnB()" ontouchstart="event.preventDefault(); btnB()">B</button>
    <button class="ab" id="btn-a" onmousedown="btnA()" ontouchstart="event.preventDefault(); btnA()">A</button>
  </div>
</div>
<button id="btn-menu" onclick="openMenu()" style="display:none">☰ メニュー</button>

<!-- TITLE -->
<div class="ov on" id="ov-title">
  <div class="title-glow">モンスター<br>クエスト</div>
  <div class="title-sub">Monster Quest</div>
  <div class="egg-wrap">
    <svg width="110" height="110" viewBox="0 0 200 200">
      <defs><radialGradient id="ge0" cx="38%" cy="30%"><stop offset="0%" stop-color="#FFF"/><stop offset="70%" stop-color="#FFF5E8"/><stop offset="100%" stop-color="#EDE0C4"/></radialGradient><filter id="gef"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
      <ellipse cx="100" cy="110" rx="52" ry="63" fill="rgba(255,240,200,0.3)" filter="url(#gef)"/>
      <ellipse cx="100" cy="110" rx="46" ry="56" fill="url(#ge0)" stroke="#DDD0AA" stroke-width="1.5"/>
      <circle cx="82" cy="88" r="5.5" fill="#CCAAE0" opacity="0.55"/><circle cx="115" cy="98" r="4" fill="#CCAAE0" opacity="0.5"/>
      <circle cx="90" cy="118" r="3.5" fill="#CCAAE0" opacity="0.45"/><circle cx="112" cy="128" r="3" fill="#BBAADD" opacity="0.4"/>
      <ellipse cx="88" cy="90" rx="13" ry="8" fill="rgba(255,255,255,0.5)" transform="rotate(-22,88,90)"/>
    </svg>
  </div>
  <button class="start-btn" onclick="showStarterSelect()">はじめる</button>
  <div class="title-hint">© 2025 MONSTER QUEST</div>
</div>

<!-- STARTER SELECT -->
<div class="ov" id="ov-starter">
  <div class="s-title">さいしょの モンスを えらんでね</div>
  <div class="s-sub">あなたの はじめての なかま になります</div>
  <div class="s-grid" id="s-grid"></div>
  <button class="s-confirm" id="s-confirm" onclick="confirmStarter()">このこに する！</button>
</div>

<!-- DIALOG -->
<div id="dlg">
  <div id="dlg-name">？？？</div>
  <div id="dlg-txt"></div>
  <div id="dlg-choices"></div>
</div>

<!-- BATTLE -->
<div class="ov" id="ov-battle">
  <div id="bfield">
    <div id="b-ezone">
      <div class="bcard" id="e-card">
        <div class="bnrow"><span class="bname" id="e-name">???</span><span class="blv">Lv <span id="e-lv">1</span></span></div>
        <div class="bhpt"><div class="bhpf h" id="e-hpf" style="width:100%"></div></div>
      </div>
      <div class="bspr" id="e-spr"></div>
    </div>
    <div id="b-pzone">
      <div class="bspr" id="p-spr" style="transform:scaleX(-1)"></div>
      <div class="bcard" id="p-card">
        <div class="bnrow"><span class="bname" id="p-name">???</span><span class="blv">Lv <span id="p-lv">1</span></span></div>
        <div class="bhpt"><div class="bhpf h" id="p-hpf" style="width:100%"></div></div>
        <div class="bhtxt"><span id="p-hpv">0</span>/<span id="p-hpm">0</span></div>
      </div>
    </div>
  </div>
  <div id="b-ui">
    <div id="b-ui-inner">
      <div id="bmsg">バトル かいし！</div>
      <div id="bcmds">
        <button class="bcmd cf" onclick="bCmd('fight')">⚔️ たたかう</button>
        <button class="bcmd cc" onclick="bCmd('bag')">🎒 バッグ</button>
        <button class="bcmd cb" onclick="bCmd('switch')">🔄 こうたい</button>
        <button class="bcmd cr" onclick="bCmd('run')">💨 にげる</button>
      </div>
      <div id="mpanel"></div>
      <div id="bagpanel"></div>
      <div id="swpanel"></div>
    </div>
  </div>
</div>

<!-- MENU -->
<div class="ov" id="ov-menu">
  <div class="mu-title">メニュー</div>
  <div class="scroll">
    <div class="mu-section">バッジ</div>
    <div class="mu-badges-row" id="mu-badges"></div>
    <div class="mu-section">パーティ（タップで先頭に変更）</div>
    <div id="party-list"></div>
    <div class="mu-section">アイテム</div>
    <div id="mu-items" style="color:#94a3b8;font-size:13px;font-weight:700;margin-bottom:14px"></div>
    <div class="mu-section">進捗</div>
    <div id="mu-prog" style="color:#94a3b8;font-size:12px;font-weight:700;margin-bottom:18px;line-height:1.8"></div>
  </div>
  <button class="mu-close" onclick="closeMenu()">とじる</button>
</div>

<!-- EVO -->
<div class="ov" id="ov-evo">
  <div class="evo-label">✨ EVOLUTION ✨</div>
  <div id="evo-sfx">💫</div>
  <div id="evo-spr" style="margin:16px auto;width:120px;height:120px"></div>
  <div class="evo-name" id="evo-name"></div>
  <div class="evo-desc" id="evo-desc"></div>
  <button class="evo-ok" onclick="closeEvo()">つぎへ ▶</button>
</div>

<!-- WIN/LOSE -->
<div class="ov" id="ov-win">
  <div class="win-icon" id="win-icon">🏆</div>
  <div class="win-title" id="win-title">しょうり！</div>
  <div class="win-sub" id="win-sub"></div>
  <div class="win-reward" id="win-reward"></div>
  <button class="win-ok" onclick="closeWin()">つぎへ ▶</button>
</div>

<div id="trainer-banner"></div>

const TYPE_COLOR = {normal:'#9ca3af',fire:'#f97316',water:'#3b82f6',ghost:'#7c3aed',poison:'#a855f7'};
const TYPE_BG = {normal:'#374151',fire:'#7c2d12',water:'#1e3a5f',ghost:'#3b0764',poison:'#581c87'};

const MOVES = {
  // Normal
  tackle:{name:'たいあたり',type:'normal',power:40,pp:35,cat:'physical'},
  slam:{name:'たたきつける',type:'normal',power:80,pp:20,cat:'physical'},
  swift:{name:'スウィフト',type:'normal',power:60,pp:20,cat:'special'},
  // Fire
  ember:{name:'ひのこ',type:'fire',power:40,pp:25,cat:'special'},
  flamethrower:{name:'かえんほうしゃ',type:'fire',power:90,pp:15,cat:'special'},
  fireblast:{name:'だいもんじ',type:'fire',power:120,pp:5,cat:'special'},
  // Water
  watergun:{name:'みずでっぽう',type:'water',power:40,pp:25,cat:'special'},
  surf:{name:'なみのり',type:'water',power:90,pp:15,cat:'special'},
  hydropump:{name:'ハイドロポンプ',type:'water',power:110,pp:5,cat:'special'},
  // Ghost
  lick:{name:'したでなめる',type:'ghost',power:30,pp:30,cat:'physical'},
  shadowball:{name:'シャドーボール',type:'ghost',power:80,pp:15,cat:'special'},
  voidstrike:{name:'ヴォイドストライク',type:'ghost',power:100,pp:5,cat:'special'},
  // Poison
  poisonsting:{name:'どくばり',type:'poison',power:15,pp:35,cat:'physical'},
  sludgebomb:{name:'ヘドロばくだん',type:'poison',power:90,pp:10,cat:'special'},
  toxicbite:{name:'どくがみ',type:'poison',power:50,pp:20,cat:'physical'},
};

function getMoves(stage){
  if(stage==='egg') return [MOVES.tackle];
  const m=M[stage];const t=m?m.type:'normal';
  const stage_len=stage.length;
  if(stage_len===1){
    if(t==='fire')return[MOVES.tackle,MOVES.ember];
    if(t==='water')return[MOVES.tackle,MOVES.watergun];
    if(t==='ghost')return[MOVES.tackle,MOVES.lick];
    if(t==='poison')return[MOVES.tackle,MOVES.poisonsting];
    return[MOVES.tackle,MOVES.swift];
  }
  if(stage_len===2){
    if(t==='fire')return[MOVES.tackle,MOVES.ember,MOVES.flamethrower,MOVES.slam];
    if(t==='water')return[MOVES.tackle,MOVES.watergun,MOVES.surf,MOVES.slam];
    if(t==='ghost')return[MOVES.lick,MOVES.shadowball,MOVES.swift,MOVES.tackle];
    if(t==='poison')return[MOVES.poisonsting,MOVES.toxicbite,MOVES.sludgebomb,MOVES.tackle];
    return[MOVES.tackle,MOVES.swift,MOVES.slam,MOVES.tackle];
  }
  // stage3
  if(t==='fire')return[MOVES.flamethrower,MOVES.fireblast,MOVES.slam,MOVES.ember];
  if(t==='water')return[MOVES.surf,MOVES.hydropump,MOVES.slam,MOVES.watergun];
  if(t==='ghost')return[MOVES.shadowball,MOVES.voidstrike,MOVES.lick,MOVES.swift];
  if(t==='poison')return[MOVES.sludgebomb,MOVES.toxicbite,MOVES.poisonsting,MOVES.voidstrike];
  return[MOVES.swift,MOVES.slam,MOVES.tackle,MOVES.tackle];
}

function typeColor(t){return TYPE_COLOR[t]||'#9ca3af';}
function typeBg(t){return TYPE_BG[t]||'#374151';}

function getStats(stage,level){
  let base;
  if(stage==='egg') base={hp:20,atk:6,def:4,spd:4,spc:4};
  else if(stage.length===1) base={hp:45,atk:18,def:14,spd:16,spc:16};
  else if(stage.length===2) base={hp:75,atk:40,def:35,spd:38,spc:38};
  else base={hp:115,atk:75,def:65,spd:70,spc:70};
  // slight variance per monster
  const code=stage.charCodeAt(0)+(stage.charCodeAt(1)||0);
  const fac=0.9+(code%20)/100;
  return {
    hp:Math.floor(((base.hp*2*level)/100+level+10)*fac),
    atk:Math.floor(((base.atk*2*level)/100+5)*fac),
    def:Math.floor(((base.def*2*level)/100+5)*fac),
    spd:Math.floor(((base.spd*2*level)/100+5)*fac),
    spc:Math.floor(((base.spc*2*level)/100+5)*fac),
  };
}

//  MAP RENDERING
// ═══════════════════════════════════════════════
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');

// Responsive tile size
function getTileSize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  const mapW=MAPS[curMap].width,mapH=MAPS[curMap].height;
  const ts=Math.min(Math.floor(vw/mapW*1.4),Math.floor(vh/mapH*1.4),64);
  return Math.max(ts,16);
}

let animFrame=0;
function gameLoop(){
  if(gs==='map')updateMap();
  if(gs==='map'||gs==='dialog')drawMap();
  animFrame++;
  requestAnimationFrame(gameLoop);
}

const MOVE_SPEED=0.14;
function updateMap(){
  if(p.moving){
    const dx=p.x-p.px,dy=p.y-p.py;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<MOVE_SPEED){p.px=p.x;p.py=p.y;p.moving=false;onArrived();}
    else{p.px+=dx/dist*MOVE_SPEED;p.py+=dy/dist*MOVE_SPEED;}
    return;
  }
  let nx=p.x,ny=p.y;
  if(keys.up){ny--;p.face='up';}
  else if(keys.down){ny++;p.face='down';}
  else if(keys.left){nx--;p.face='left';}
  else if(keys.right){nx++;p.face='right';}
  if(nx!==p.x||ny!==p.y){
    const map=MAPS[curMap];
    if(nx>=0&&nx<map.width&&ny>=0&&ny<map.height){
      const tile=getMapTile(curMap,nx,ny);
      if(tile!==1&&tile!==3){p.x=nx;p.y=ny;p.moving=true;p.steps++;}
    }
  }
}

function getMapData(mapId){
  const m=MAPS[mapId];
  if(!m._parsed){
    m._parsed=m.data.trim().split('\n').map(row=>row.trim().split('').map(Number));
  }
  return m._parsed;
}
function getMapTile(mapId,x,y){
  const d=getMapData(mapId);
  if(!d[y])return 1;
  return d[y][x]??1;
}

const TILE_COLORS={
  0:'#7ec850',1:'#2d5a27',2:'#3ea832',3:'#3b82f6',
  4:'#e0e0ff',5:'#f0f0d0',6:'#d4af37',7:'#c8a96e',
  8:'#8b7355',9:'#4a4a6a',10:'#6a0dad',11:'#ffd700'
};
const TILE_ACCENT={
  1:'#1e3d1a',2:'#2d8022',3:'#1d4ed8',7:'#b08050',
  9:'#303050',10:'#4a0080'
};

function drawMap(){
  const vw=canvas.width,vh=canvas.height;
  const TS=getTileSize();
  const map=MAPS[curMap];
  ctx.fillStyle='#222';
  ctx.fillRect(0,0,vw,vh);

  const ox=Math.round(vw/2-p.px*TS-TS/2);
  const oy=Math.round(vh/2-p.py*TS-TS/2);
  const data=getMapData(curMap);

  for(let y=0;y<map.height;y++){
    for(let x=0;x<map.width;x++){
      const sx=ox+x*TS,sy=oy+y*TS;
      if(sx<-TS||sx>vw||sy<-TS||sy>vh)continue;
      const t=data[y][x];
      ctx.fillStyle=TILE_COLORS[t]||'#7ec850';
      ctx.fillRect(sx,sy,TS,TS);
      // Details
      if(t===1){
        ctx.fillStyle=TILE_ACCENT[1];
        ctx.fillRect(sx+2,sy+2,TS-4,TS-4);
        // Tree top
        if(TS>=24){
          ctx.fillStyle='#185228';
          ctx.beginPath();ctx.arc(sx+TS/2,sy+TS*0.35,TS*0.3,0,Math.PI*2);ctx.fill();
          ctx.fillStyle='#1f6b32';
          ctx.beginPath();ctx.arc(sx+TS/2,sy+TS*0.28,TS*0.22,0,Math.PI*2);ctx.fill();
        }
      } else if(t===2){
        // Tall grass
        ctx.fillStyle='#2a9020';
        if(TS>=16){
          for(let i=0;i<4;i++){
            ctx.fillRect(sx+2+i*((TS-4)/4),sy+TS*0.3,2,TS*0.6);
          }
        }
      } else if(t===3){
        // Water shimmer
        const wt=(animFrame+x*3+y*2)%40;
        ctx.fillStyle=wt<20?'#2563eb':'#1d4ed8';
        ctx.fillRect(sx,sy,TS,TS);
        if(TS>=20){
          ctx.fillStyle='rgba(255,255,255,0.15)';
          ctx.fillRect(sx+TS*0.1,sy+TS*0.3,TS*0.3,2);
          ctx.fillRect(sx+TS*0.5,sy+TS*0.6,TS*0.3,2);
        }
      } else if(t===4){
        // Heal spot (pokemon center)
        ctx.fillStyle='#c0c0ff';
        ctx.fillRect(sx,sy,TS,TS);
        if(TS>=24){
          ctx.fillStyle='#fff';
          ctx.fillRect(sx+TS*0.4,sy+TS*0.15,TS*0.2,TS*0.7);
          ctx.fillRect(sx+TS*0.15,sy+TS*0.38,TS*0.7,TS*0.2);
        }
      } else if(t===5){
        // Trainer tile
        ctx.fillStyle='#e0e0c0';ctx.fillRect(sx,sy,TS,TS);
      } else if(t===6){
        // Gym
        ctx.fillStyle='#b8960c';ctx.fillRect(sx,sy,TS,TS);
        if(TS>=20){
          ctx.fillStyle='#ffd700';
          ctx.fillRect(sx+TS*0.2,sy+TS*0.1,TS*0.6,TS*0.8);
          ctx.fillStyle='#b8960c';
          ctx.fillRect(sx+TS*0.35,sy+TS*0.25,TS*0.3,TS*0.55);
        }
      } else if(t===7){
        // Town path
        ctx.fillStyle='#c8a96e';ctx.fillRect(sx,sy,TS,TS);
        ctx.fillStyle='rgba(0,0,0,0.05)';
        if((x+y)%2===0)ctx.fillRect(sx,sy,TS,TS);
      } else if(t===9){
        // Cave
        ctx.fillStyle='#3a3a5a';ctx.fillRect(sx,sy,TS,TS);
        if(TS>=20){ctx.fillStyle='#4a4a7a';ctx.beginPath();ctx.arc(sx+TS/2,sy+TS/2,TS*0.35,0,Math.PI*2);ctx.fill();}
      } else if(t===10){
        // Elite4
        ctx.fillStyle='#5a0090';ctx.fillRect(sx,sy,TS,TS);
        if(TS>=20){ctx.fillStyle='#8800cc';ctx.fillRect(sx+TS*0.2,sy+TS*0.1,TS*0.6,TS*0.8);}
      } else if(t===11){
        // Champion
        ctx.fillStyle='#886600';ctx.fillRect(sx,sy,TS,TS);
        if(TS>=20){
          ctx.fillStyle='#ffdd00';
          ctx.font=`${TS*0.7}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText('★',sx+TS/2,sy+TS/2);
        }
      }
      // Signs
      const map_obj=MAPS[curMap];
      if(t===8&&TS>=20){
        ctx.fillStyle='#6b5230';ctx.fillRect(sx,sy,TS,TS);
        ctx.fillStyle='#8b7a50';ctx.fillRect(sx+TS*0.15,sy+TS*0.1,TS*0.7,TS*0.55);
        ctx.fillStyle='#5a3e20';ctx.fillRect(sx+TS*0.4,sy+TS*0.65,TS*0.2,TS*0.3);
      }
      // Grid line
      ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=0.5;
      ctx.strokeRect(sx,sy,TS,TS);
    }
  }

  // Draw trainers
  const trs=[...(MAPS[curMap].trainers||[]),...(MAPS[curMap].elites||[])];
  if(MAPS[curMap].champion)trs.push(MAPS[curMap].champion);
  for(const tr of trs){
    if(p.defeated[tr.id])continue;
    const sx=ox+tr.x*TS,sy=oy+tr.y*TS;
    if(sx<-TS||sx>vw||sy<-TS||sy>vh)continue;
    ctx.fillStyle='#fbbf24';ctx.fillRect(sx+TS*0.1,sy+TS*0.05,TS*0.8,TS*0.7);
    ctx.fillStyle='#1e293b';ctx.fillRect(sx+TS*0.1,sy+TS*0.55,TS*0.8,TS*0.4);
    ctx.fillStyle='#fde68a';ctx.fillRect(sx+TS*0.3,sy+TS*0.1,TS*0.4,TS*0.4);
    if(TS>=20){
      ctx.fillStyle='#1e293b';
      ctx.fillRect(sx+TS*0.35,sy+TS*0.2,TS*0.1,TS*0.1);
      ctx.fillRect(sx+TS*0.55,sy+TS*0.2,TS*0.1,TS*0.1);
    }
  }
  // Gym
  if(MAPS[curMap].gym){
    const gym=MAPS[curMap].gym;
    if(!p.badges.includes(gym.badgeIdx)){
      // Already drawn as tile 6
    }
  }

  // Player
  const psx=ox+p.px*TS,psy=oy+p.py*TS;
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath();ctx.ellipse(psx+TS/2,psy+TS-TS*0.1,TS*0.28,TS*0.1,0,0,Math.PI*2);ctx.fill();
  // Body
  ctx.fillStyle='#3b82f6';ctx.fillRect(psx+TS*0.2,psy+TS*0.38,TS*0.6,TS*0.5);
  // Head
  ctx.fillStyle='#fde68a';ctx.beginPath();ctx.arc(psx+TS/2,psy+TS*0.3,TS*0.24,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle='#92400e';ctx.fillRect(psx+TS*0.22,psy+TS*0.06,TS*0.56,TS*0.18);
  // Eyes
  ctx.fillStyle='#1e293b';
  if(p.face==='down'||p.face==='up'){
    ctx.fillRect(psx+TS*0.35,psy+TS*0.25,TS*0.1,TS*0.08);
    ctx.fillRect(psx+TS*0.55,psy+TS*0.25,TS*0.1,TS*0.08);
  } else {
    const ex=p.face==='left'?0.32:0.58;
    ctx.fillRect(psx+TS*ex,psy+TS*0.25,TS*0.1,TS*0.08);
  }
  // Walk anim
  if(p.moving&&TS>=20){
    const wa=Math.sin(animFrame*0.4)*3;
    ctx.fillStyle='#2563eb';
    ctx.fillRect(psx+TS*0.2,psy+TS*0.75+wa,TS*0.22,TS*0.2);
    ctx.fillRect(psx+TS*0.58,psy+TS*0.75-wa,TS*0.22,TS*0.2);
  }

  // Party leader small icon top-left of screen
  updateStripUI();
}

// ═══════════════════════════════════════════════
//  ON ARRIVE TILE
// ═══════════════════════════════════════════════
function onArrived(){
  const tile=getMapTile(curMap,p.x,p.y);
  const map=MAPS[curMap];
  // Warps
  const warp=(map.warps||[]).find(w=>w.x===p.x&&w.y===p.y);
  if(warp){
    curMap=warp.map;
    p.x=warp.tx;p.y=warp.ty;p.px=warp.tx;p.py=warp.ty;
    document.getElementById('hud-loc').textContent=MAPS[curMap].name;
    saveGame();
    return;
  }
  // Heal
  if(tile===4){
    p.party.forEach(m=>{m.currentHp=m.maxHp;});
    saveGame();
    showDialog('ポケセン','てもちの モンスが ぜんかいふく した！✨',null,()=>{});
    return;
  }
  // Sign
  const sign=(map.signs||[]).find(s=>s.x===p.x&&s.y===p.y);
  if(sign){showDialog('たてふだ',sign.text,null,()=>{});return;}
  // Trainers
  const tr=(map.trainers||[]).find(t=>t.x===p.x&&t.y===p.y&&!p.defeated[t.id]);
  if(tr){startTrainerBattle(tr);return;}
  // Elites
  if(map.elites){
    const el=map.elites.find(e=>e.x===p.x&&e.y===p.y&&!p.defeated[e.id]);
    if(el){
      // Check prev elite defeated
      const idx=map.elites.indexOf(el);
      if(idx>0&&!p.defeated[map.elites[idx-1].id]){
        showDialog('??','まだ 前の てん王を たおしていない！',null,()=>{});return;
      }
      startTrainerBattle(el);return;
    }
  }
  // Champion
  if(map.champion&&map.champion.x===p.x&&map.champion.y===p.y&&!p.defeated[map.champion.id]){
    if(map.elites&&map.elites.some(e=>!p.defeated[e.id])){
      showDialog('??','まだ 四天王を 全員 たおしていない！',null,()=>{});return;
    }
    startTrainerBattle(map.champion);return;
  }
  // Gym
  if(map.gym&&tile===6&&!p.badges.includes(map.gym.badgeIdx)&&!p.defeated[`gym_${curMap}`]){
    startGymBattle(map.gym);return;
  }
  // Wild encounter
  if(tile===2&&Math.random()<0.12){startWildBattle();}
}

// ═══════════════════════════════════════════════
//  BATTLE SYSTEM
// ═══════════════════════════════════════════════
function startWildBattle(){
  const map=MAPS[curMap];
  const pLv=p.party[activeMonIdx]?.level||1;
  const eLv=Math.max(1,pLv+Math.floor(Math.random()*6)-2);
  const stages=map.grassMons||['A'];
  const stage=stages[Math.floor(Math.random()*stages.length)];
  const stats=getStats(stage,eLv);
  enemy={stage,level:eLv,currentHp:stats.hp,maxHp:stats.hp,stats,isWild:true};
  battleIsTrainer=false;
  currentTrainer=null;
  startBattle();
}

function startTrainerBattle(tr){
  currentTrainer=tr;
  battleIsTrainer=true;
  // Show pre-dialog then battle
  const lines=tr.preDialog||[`${tr.name}が 勝負を しかけてきた！`];
  let idx=0;
  function next(){
    if(idx<lines.length){showDialog(tr.title,lines[idx++],null,next);}
    else{
      document.getElementById('trainer-banner').textContent=`${tr.icon} ${tr.title} ${tr.name} の 挑戦！`;
      document.getElementById('trainer-banner').classList.add('show');
      setTimeout(()=>document.getElementById('trainer-banner').classList.remove('show'),2000);
      const first=tr.party[0];
      const stats=getStats(first.stage,first.level);
      enemy={stage:first.stage,level:first.level,currentHp:stats.hp,maxHp:stats.hp,stats,
             party:tr.party.map((m,i)=>({...m,...(i===0?{currentHp:stats.hp,maxHp:stats.hp}:{})})),
             partyIdx:0,isWild:false,trainer:tr};
      battleIsTrainer=true;
      startBattle();
    }
  }
  next();
}

function startGymBattle(gym){
  currentTrainer=gym;
  battleIsTrainer=true;
  const lines=gym.preDialog||[`${gym.leaderName}が 立ちふさがった！`];
  let idx=0;
  function next(){
    if(idx<lines.length){showDialog(gym.leaderTitle,lines[idx++],null,next);}
    else{
      document.getElementById('trainer-banner').textContent=`⚔️ ジムリーダー ${gym.leaderName} との バトル！`;
      document.getElementById('trainer-banner').classList.add('show');
      setTimeout(()=>document.getElementById('trainer-banner').classList.remove('show'),2000);
      const first=gym.party[0];
      const stats=getStats(first.stage,first.level);
      enemy={stage:first.stage,level:first.level,currentHp:stats.hp,maxHp:stats.hp,stats,
             party:gym.party.map(m=>{const s=getStats(m.stage,m.level);return{...m,currentHp:s.hp,maxHp:s.hp};}),
             partyIdx:0,isWild:false,isGym:true,trainer:gym};
      battleIsTrainer=true;
      startBattle();
    }
  }
  next();
}

function startBattle(){
  // Choose active mon (first alive)
  activeMonIdx=p.party.findIndex(m=>m.currentHp>0);
  if(activeMonIdx<0){activeMonIdx=0;p.party[0].currentHp=1;}
  setGs('battle');
  document.getElementById('bcmds').style.display='grid';
  document.getElementById('mpanel').style.display='none';
  document.getElementById('bagpanel').style.display='none';
  document.getElementById('swpanel').style.display='none';
  showEncFlash();
  setTimeout(()=>{
    updateBattleUI();
    const ename=M[enemy.stage]?.name||enemy.stage;
    if(enemy.isWild){setBmsg(`やせいの ${ename} が とびだしてきた！`);}
    else{setBmsg(`${enemy.trainer?.leaderName||enemy.trainer?.name||'トレーナー'} の ${ename}！\nかかってこい！`);}
  },800);
}

function updateBattleUI(){
  const mon=p.party[activeMonIdx];
  const sts=getStats(mon.stage,mon.level);
  mon.maxHp=sts.hp;
  // Enemy
  document.getElementById('e-name').textContent=M[enemy.stage]?.name||enemy.stage;
  document.getElementById('e-lv').textContent=enemy.level;
  const epct=Math.max(0,enemy.currentHp/enemy.maxHp*100);
  const ef=document.getElementById('e-hpf');
  ef.style.width=epct+'%';
  ef.className='bhpf '+(epct<20?'l':epct<50?'m':'h');
  document.getElementById('e-spr').innerHTML=`<svg width="130" height="130" viewBox="0 0 200 200" class="${M[enemy.stage]?.anim||'anim-pulse'}">${M[enemy.stage]?.draw()||''}</svg>`;
  // Player
  document.getElementById('p-name').textContent=M[mon.stage]?.name||mon.stage;
  document.getElementById('p-lv').textContent=mon.level;
  const ppct=Math.max(0,mon.currentHp/mon.maxHp*100);
  const pf=document.getElementById('p-hpf');
  pf.style.width=ppct+'%';
  pf.className='bhpf '+(ppct<20?'l':ppct<50?'m':'h');
  document.getElementById('p-hpv').textContent=mon.currentHp;
  document.getElementById('p-hpm').textContent=mon.maxHp;
  document.getElementById('p-spr').innerHTML=`<svg width="120" height="120" viewBox="0 0 200 200" class="${M[mon.stage]?.anim||'anim-pulse'}">${M[mon.stage]?.draw()||''}</svg>`;
}

function setBmsg(t){document.getElementById('bmsg').textContent=t;}
let battleBusy=false;

async function bCmd(cmd){
  if(battleBusy)return;
  const cmds=document.getElementById('bcmds');
  const mpan=document.getElementById('mpanel');
  const bpan=document.getElementById('bagpanel');
  const span=document.getElementById('swpanel');
  if(cmd==='fight'){
    cmds.style.display='none';
    mpan.style.display='grid';
    bpan.style.display='none';
    span.style.display='none';
    const moves=getMoves(p.party[activeMonIdx].stage);
    mpan.innerHTML=moves.map((mv,i)=>`
      <button class="mcmd" style="background:${typeBg(mv.type)};border-color:${typeColor(mv.type)}"
        onclick="useMoveIdx(${i})">
        <div style="font-size:11px;color:${typeColor(mv.type)};margin-bottom:2px">${mv.type.toUpperCase()}</div>
        <div>${mv.name}</div>
        <div style="font-size:10px;opacity:0.7;margin-top:2px">威力 ${mv.power}</div>
      </button>`).join('');
  } else if(cmd==='bag'){
    cmds.style.display='none';
    bpan.style.display='grid';
    mpan.style.display='none';
    span.style.display='none';
    bpan.innerHTML=`
      <button class="bagbtn" onclick="useBagItem('ball')">🎯 モンスボール<br><small>残り ${p.items.ball}個</small></button>
      <button class="bagbtn" onclick="useBagItem('potion')">💊 ポーション<br><small>残り ${p.items.potion}個</small></button>
      <button class="bagbtn" onclick="useBagItem('superpotion')">💉 スーパーポーション<br><small>残り ${p.items.superpotion}個</small></button>
      <button class="bagbtn" onclick="useBagItem('revive')">⭐ げんきのかけら<br><small>残り ${p.items.revive}個</small></button>
    `;
  } else if(cmd==='switch'){
    const alive=p.party.filter((_,i)=>i!==activeMonIdx&&p.party[i].currentHp>0);
    if(alive.length===0){setBmsg('こうたい できる モンスが いない！');return;}
    cmds.style.display='none';
    span.style.display='flex';
    mpan.style.display='none';
    bpan.style.display='none';
    span.innerHTML=p.party.map((m,i)=>{
      if(i===activeMonIdx||m.currentHp<=0)return'';
      const pct=m.currentHp/m.maxHp*100;
      return`<div class="swrow" onclick="switchMon(${i})">
        <svg width="36" height="36" viewBox="0 0 200 200">${M[m.stage]?.draw()||''}</svg>
        <div><div class="swname">${M[m.stage]?.name||m.stage}</div><div class="swlv">Lv ${m.level} — HP ${m.currentHp}/${m.maxHp}</div>
        <div class="prow-hpbar" style="width:100px"><div class="prow-hpf" style="width:${pct}%;background:${pct>50?'#22c55e':pct>20?'#eab308':'#ef4444'}"></div></div></div>
      </div>`;
    }).join('');
  } else if(cmd==='run'){
    if(battleIsTrainer){setBmsg('トレーナーバトルは にげられない！');return;}
    battleBusy=true;
    const myspd=getStats(p.party[activeMonIdx].stage,p.party[activeMonIdx].level).spd;
    if(Math.random()<0.6||myspd>enemy.stats.spd){
      setBmsg('うまく にげきれた！');
      await wait(1000);
      endBattle(false);
    } else {
      setBmsg('にげられなかった！');
      await wait(800);
      await enemyTurn();
    }
    battleBusy=false;
    restoreMainBtns();
  }
}

function restoreMainBtns(){
  document.getElementById('bcmds').style.display='grid';
  document.getElementById('mpanel').style.display='none';
  document.getElementById('bagpanel').style.display='none';
  document.getElementById('swpanel').style.display='none';
}

async function useMoveIdx(idx){
  if(battleBusy)return;
  battleBusy=true;
  restoreMainBtns();
  const mon=p.party[activeMonIdx];
  const moves=getMoves(mon.stage);
  const mv=moves[idx]||moves[0];
  const myStats=getStats(mon.stage,mon.level);
  // Player attack
  setBmsg(`${M[mon.stage]?.name} の ${mv.name}！`);
  document.getElementById('p-spr').classList.add('atk-up');
  await wait(300);
  document.getElementById('p-spr').classList.remove('atk-up');
  // Type effectiveness (simple)
  const typeEff=calcTypeEff(mv.type,M[enemy.stage]?.type||'normal');
  let dmg=Math.floor(((mon.level*2/5+2)*mv.power*(myStats.atk/enemy.stats.def)/50+2)*(0.85+Math.random()*0.15)*typeEff);
  dmg=Math.max(1,dmg);
  enemy.currentHp=Math.max(0,enemy.currentHp-dmg);
  document.getElementById('e-spr').classList.add('dmg-fl');
  updateBattleUI();
  await wait(300);
  document.getElementById('e-spr').classList.remove('dmg-fl');
  if(typeEff>1)setBmsg(`こうかは ばつぐんだ！ (${dmg}ダメージ)`);
  else if(typeEff<1)setBmsg(`こうかは いまひとつ… (${dmg}ダメージ)`);
  else setBmsg(`${dmg} ダメージ！`);
  await wait(700);
  if(enemy.currentHp<=0){
    await winBattle();
    battleBusy=false;
    return;
  }
  await enemyTurn();
  battleBusy=false;
  restoreMainBtns();
}

function calcTypeEff(atkType,defType){
  const chart={
    fire:{water:0.5,fire:0.5,normal:1,ghost:1,poison:1},
    water:{fire:2,water:0.5,normal:1,ghost:1,poison:1},
    ghost:{ghost:2,normal:0.5,fire:1,water:1,poison:1},
    poison:{ghost:1,normal:1,fire:1,water:1,poison:0.5},
    normal:{ghost:0.5,fire:1,water:1,poison:1,normal:1},
  };
  return (chart[atkType]&&chart[atkType][defType])||1;
}

async function enemyTurn(){
  const mon=p.party[activeMonIdx];
  const myStats=getStats(mon.stage,mon.level);
  const emoves=getMoves(enemy.stage);
  const emv=emoves[Math.floor(Math.random()*emoves.length)];
  const typeEff=calcTypeEff(emv.type,M[mon.stage]?.type||'normal');
  setBmsg(`${M[enemy.stage]?.name} の ${emv.name}！`);
  document.getElementById('e-spr').classList.add('atk-dn');
  await wait(300);
  document.getElementById('e-spr').classList.remove('atk-dn');
  let dmg=Math.floor(((enemy.level*2/5+2)*emv.power*(enemy.stats.atk/myStats.def)/50+2)*(0.85+Math.random()*0.15)*typeEff);
  dmg=Math.max(1,dmg);
  mon.currentHp=Math.max(0,mon.currentHp-dmg);
  document.getElementById('p-spr').classList.add('b-shake');
  updateBattleUI();
  await wait(350);
  document.getElementById('p-spr').classList.remove('b-shake');
  setBmsg(`${dmg} ダメージ！`);
  await wait(700);
  if(mon.currentHp<=0){
    await monFainted(mon);
  }
}

async function monFainted(mon){
  setBmsg(`${M[mon.stage]?.name} は たおれた！`);
  await wait(1500);
  const nextIdx=p.party.findIndex((m,i)=>i!==activeMonIdx&&m.currentHp>0);
  if(nextIdx>=0){
    activeMonIdx=nextIdx;
    setBmsg(`ゆけっ！ ${M[p.party[activeMonIdx].stage]?.name}！`);
    updateBattleUI();
    await wait(1000);
  } else {
    // All fainted
    setBmsg('めのまえが まっくらに なった…');
    await wait(1500);
    p.party.forEach(m=>{m.currentHp=Math.max(1,Math.floor(m.maxHp*0.3));});
    p.gold=Math.max(0,p.gold-200);
    saveGame();
    endBattle(false);
  }
}

async function useBagItem(item){
  if(battleBusy)return;
  battleBusy=true;
  restoreMainBtns();
  const mon=p.party[activeMonIdx];
  if(item==='ball'){
    if(p.items.ball<=0){setBmsg('モンスボールが ない！');battleBusy=false;return;}
    if(!enemy.isWild){setBmsg('トレーナーの モンスは つかまえられない！');battleBusy=false;restoreMainBtns();return;}
    p.items.ball--;
    setBmsg('モンスボールを なげた！ ●…●…●…');
    await wait(1800);
    const rate=Math.max(0.05,(1-enemy.currentHp/enemy.maxHp)*0.7+0.1);
    if(Math.random()<rate){
      if(p.party.length<6){
        setBmsg(`やったー！ ${M[enemy.stage]?.name} を つかまえた！`);
        const ns=getStats(enemy.stage,enemy.level);
        p.party.push({stage:enemy.stage,level:enemy.level,exp:0,currentHp:enemy.currentHp,maxHp:ns.hp});
        await wait(1500);
        endBattle(true);
      } else {
        setBmsg('てもちが いっぱい！ モンスを はずして！');
        await wait(1500);
        await enemyTurn();
      }
    } else {
      setBmsg('あっ！ はずれた！');
      await wait(1000);
      await enemyTurn();
    }
  } else if(item==='potion'){
    if(p.items.potion<=0){setBmsg('ポーションが ない！');battleBusy=false;restoreMainBtns();return;}
    p.items.potion--;
    const heal=Math.min(20,mon.maxHp-mon.currentHp);
    mon.currentHp+=heal;
    setBmsg(`${M[mon.stage]?.name} の HPが 20 かいふく した！`);
    updateBattleUI();
    await wait(1200);
    await enemyTurn();
  } else if(item==='superpotion'){
    if(p.items.superpotion<=0){setBmsg('スーパーポーションが ない！');battleBusy=false;restoreMainBtns();return;}
    p.items.superpotion--;
    const heal=Math.min(50,mon.maxHp-mon.currentHp);
    mon.currentHp+=heal;
    setBmsg(`${M[mon.stage]?.name} の HPが 50 かいふく した！`);
    updateBattleUI();
    await wait(1200);
    await enemyTurn();
  } else if(item==='revive'){
    const dead=p.party.find(m=>m.currentHp<=0);
    if(!dead||p.items.revive<=0){setBmsg(p.items.revive<=0?'げんきのかけら が ない！':'げんきを うしなった モンスが いない！');battleBusy=false;restoreMainBtns();return;}
    p.items.revive--;
    dead.currentHp=Math.floor(dead.maxHp*0.5);
    setBmsg(`${M[dead.stage]?.name} が よみがえった！`);
    await wait(1200);
    await enemyTurn();
  }
  battleBusy=false;
  restoreMainBtns();
}

async function switchMon(idx){
  if(battleBusy)return;
  battleBusy=true;
  restoreMainBtns();
  setBmsg(`もどれ！ ${M[p.party[activeMonIdx].stage]?.name}！`);
  await wait(800);
  activeMonIdx=idx;
  setBmsg(`ゆけっ！ ${M[p.party[activeMonIdx].stage]?.name}！`);
  updateBattleUI();
  await wait(1000);
  await enemyTurn();
  battleBusy=false;
  restoreMainBtns();
}

async function winBattle(){
  const mon=p.party[activeMonIdx];
  const ename=M[enemy.stage]?.name||enemy.stage;
  setBmsg(`${ename} を たおした！`);
  document.getElementById('e-spr').style.opacity='0';
  await wait(1000);
  // Trainer: next mon?
  if(battleIsTrainer&&enemy.party){
    enemy.partyIdx++;
    if(enemy.partyIdx<enemy.party.length){
      const next=enemy.party[enemy.partyIdx];
      const ns=getStats(next.stage,next.level);
      enemy.stage=next.stage;enemy.level=next.level;
      enemy.currentHp=ns.hp;enemy.maxHp=ns.hp;enemy.stats=ns;
      document.getElementById('e-spr').style.opacity='1';
      setBmsg(`${enemy.trainer?.leaderName||enemy.trainer?.name} の ${M[next.stage]?.name}！`);
      updateBattleUI();
      await wait(1200);
      return; // continue battle
    }
  }
  // Battle won
  const expGain=Math.floor(enemy.level*12*(battleIsTrainer?1.5:1));
  const goldGain=currentTrainer?.reward?.gold||Math.floor(enemy.level*18);
  setBmsg(`${M[mon.stage]?.name} は ${expGain} EXP を てにいれた！`);
  mon.exp=(mon.exp||0)+expGain;
  p.gold+=goldGain;
  await wait(1500);
  // Level up
  let leveled=false;
  const lvExpNeeded=()=>Math.pow(mon.level,3);
  while((mon.exp||0)>=lvExpNeeded()){
    mon.exp-=lvExpNeeded();
    mon.level++;
    leveled=true;
    const ns=getStats(mon.stage,mon.level);
    const hpGain=ns.hp-mon.maxHp;
    mon.maxHp=ns.hp;
    mon.currentHp=Math.min(mon.currentHp+hpGain,mon.maxHp);
    setBmsg(`${M[mon.stage]?.name} は Lv ${mon.level} に なった！`);
    await wait(1000);
    // Evo check
    const depth=mon.stage==='egg'?0:mon.stage.length;
    const evoLv=depth===0?5:depth===1?15:36;
    if(mon.level>=evoLv&&EVO_TREE[mon.stage]){
      const next=EVO_TREE[mon.stage];
      const nextStage=next[Math.floor(Math.random()*next.length)];
      await doEvo(mon,nextStage);
    }
  }
  // Trainer badge / reward
  if(battleIsTrainer&&currentTrainer){
    p.defeated[currentTrainer.id||`gym_${curMap}`]=true;
    if(currentTrainer.reward?.badge!==undefined){
      p.badges.push(currentTrainer.reward.badge);
    }
    if(currentTrainer.reward?.ending){
      saveGame();
      endBattle(true);
      showEnding();
      return;
    }
    const wd=currentTrainer.winDialog||['よく やった！'];
    let wi=0;
    function nextWd(){
      if(wi<wd.length){showDialog(currentTrainer.leaderTitle||currentTrainer.title||'トレーナー',wd[wi++],null,nextWd);}
      else{endBattle(true);}
    }
    nextWd();
    return;
  }
  saveGame();
  endBattle(true);
}

async function doEvo(mon,nextStage){
  setGs('evo');
  document.getElementById('evo-sfx').textContent='💫';
  document.getElementById('evo-name').textContent=`→ ${M[nextStage]?.name}`;
  document.getElementById('evo-desc').textContent=M[nextStage]?.desc||'しんかした！';
  document.getElementById('evo-spr').innerHTML=`<svg width="120" height="120" viewBox="0 0 200 200" class="anim-bounce">${M[nextStage]?.draw()||''}</svg>`;
  await new Promise(r=>{evoCallback=()=>{evoCallback=null;r();};});
  mon.stage=nextStage;
  const ns=getStats(nextStage,mon.level);
  mon.maxHp=ns.hp;mon.currentHp=Math.min(mon.currentHp,mon.maxHp);
  setGs('battle');
  updateBattleUI();
}

function closeEvo(){if(evoCallback)evoCallback();}

function endBattle(won){
  document.getElementById('e-spr').style.opacity='1';
  setGs('map');
  saveGame();
  updateHud();
}

function showEnding(){
  setGs('win');
  document.getElementById('win-icon').textContent='👑';
  document.getElementById('win-title').textContent='チャンピオン！！！';
  document.getElementById('win-sub').textContent='あなたは 新しい チャンピオンに なった！\nモンスターとの 絆が 奇跡を 起こした！';
  document.getElementById('win-reward').innerHTML=`<div>🏆 チャンピオンに なった！</div><div>⭐ ゲームクリア おめでとう！</div>`;
  winCallback=()=>{setGs('map');};
}

function closeWin(){if(winCallback)winCallback();}

function openMenu(){
  if(gs!=='map')return;
  setGs('menu');
  // Badges
  const badgeIcons=['🌱','🔥','⚡','🌋'];
  document.getElementById('mu-badges').innerHTML=badgeIcons.map((b,i)=>`
    <div class="mu-badge ${p.badges.includes(i)?'':'empty'}">${b}</div>`).join('');
  document.getElementById('hud-badges').innerHTML=badgeIcons.filter((_,i)=>p.badges.includes(i)).map(b=>`<span class="badge-icon">${b}</span>`).join('');
  // Party
  const list=document.getElementById('party-list');
  list.innerHTML=p.party.map((m,i)=>{
    const pct=m.currentHp/m.maxHp*100;
    const col=pct>50?'#22c55e':pct>20?'#eab308':'#ef4444';
    return`<div class="prow ${i===0?'lead':''}" onclick="swapLead(${i})">
      <svg width="44" height="44" viewBox="0 0 200 200">${M[m.stage]?.draw()||''}</svg>
      <div style="flex:1">
        <div class="prow-name">${M[m.stage]?.name||m.stage} ${i===0?'<span style="font-size:9px;color:#60a5fa;margin-left:4px">先頭</span>':''}</div>
        <div class="prow-lv">Lv ${m.level} — ${m.stage.length===0||m.stage==='egg'?'たまご':m.stage.length===1?'ステージ1':m.stage.length===2?'ステージ2':'最終形態'}</div>
        <div class="prow-hpbar"><div class="prow-hpf" style="width:${pct}%;background:${col}"></div></div>
        <div style="font-size:10px;color:#64748b;margin-top:2px">${m.currentHp}/${m.maxHp}</div>
      </div>
    </div>`;
  }).join('');
  // Items
  document.getElementById('mu-items').innerHTML=`
    🎯 モンスボール: ${p.items.ball}　💊 ポーション: ${p.items.potion}<br>
    💉 スーパーポーション: ${p.items.superpotion}　⭐ げんきのかけら: ${p.items.revive}`;
  // Progress
  document.getElementById('mu-prog').innerHTML=`
    💰 ゴールド: ${p.gold}G<br>
    🏆 バッジ: ${p.badges.length}/4<br>
    👥 パーティ: ${p.party.length}/6<br>
    🦶 歩数: ${p.steps}`;
}

function swapLead(idx){
  if(idx===0)return;
  const t=p.party[0];p.party[0]=p.party[idx];p.party[idx]=t;
  activeMonIdx=0;
  saveGame();
  openMenu();
}

function closeMenu(){
  if(gs!=='menu')return;
  setGs('map');
}

// ═══════════════════════════════════════════════
function setGs(state){
  gs=state;
  document.getElementById('ov-title').classList.toggle('on',state==='title');
  document.getElementById('ov-starter').classList.toggle('on',state==='starter');
  document.getElementById('ov-battle').classList.toggle('on',state==='battle');
  document.getElementById('ov-menu').classList.toggle('on',state==='menu');
  document.getElementById('ov-evo').classList.toggle('on',state==='evo');
  document.getElementById('ov-win').classList.toggle('on',state==='win');
  const showCanvas=state==='map'||state==='dialog';
  document.getElementById('gc').style.display=showCanvas?'block':'none';
  document.getElementById('controls').style.display=(state==='map'||state==='dialog')?'flex':'none';
  document.getElementById('btn-menu').style.display=state==='map'?'block':'none';
  document.getElementById('strip').style.display=(state==='map'||state==='dialog')?'':'none';
  document.getElementById('hud').style.display=(state==='map'||state==='dialog')?'':'none';
  if(state==='dialog'){
    document.getElementById('dlg').style.display='block';
  } else if(state!=='dialog'){
    // only hide dialog if not in dialog
    if(state!=='dialog')document.getElementById('dlg').style.display='none';
  }
}

function updateHud(){
  document.getElementById('hud-loc').textContent=MAPS[curMap]?.name||'';
  document.getElementById('hud-gold').textContent=p.gold;

  document.getElementById('hud-badges').innerHTML=badgeIcons.filter((_,i)=>p.badges.includes(i)).map(b=>`<span class="badge-icon">${b}</span>`).join('');
}

function updateStripUI(){
  const mon=p.party[activeMonIdx];
  if(!mon)return;
  document.getElementById('si-party').textContent=`${p.party.length}/6`;

function btnA(){
  if(gs==='title'){showStarterSelect();return;}
  if(gs==='dialog'){closeDialogNow();return;}
  if(gs==='evo'){closeEvo();return;}
}
function btnB(){
  if(gs==='map'){openMenu();return;}
  if(gs==='menu'){closeMenu();return;}
  if(gs==='dialog'){closeDialogNow();return;}
  if(gs==='battle'){
    // Back to main cmds
    restoreMainBtns();
  }
}

function setupDpad(){
  const dirs={up:'up',down:'down','dp-l':'left','dp-r':'right'};
  ['dp-u','dp-d','dp-l','dp-r'].forEach((id,i)=>{
    const dir=['up','down','left','right'][i];
    const el=document.getElementById(id);
    const on=()=>{keys[dir]=true;el.classList.add('on');};
    const off=()=>{keys[dir]=false;el.classList.remove('on');};
    el.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();off();},{passive:false});
    el.addEventListener('mousedown',on);
    el.addEventListener('mouseup',off);
    el.addEventListener('mouseleave',off);
  });
}

// Keyboard
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp')keys.up=true;
  if(e.key==='ArrowDown')keys.down=true;
  if(e.key==='ArrowLeft')keys.left=true;
  if(e.key==='ArrowRight')keys.right=true;
  if(e.key==='z'||e.key==='Z'||e.key===' ')btnA();
  if(e.key==='x'||e.key==='X'||e.key==='Escape')btnB();
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowUp')keys.up=false;
  if(e.key==='ArrowDown')keys.down=false;
  if(e.key==='ArrowLeft')keys.left=false;
  if(e.key==='ArrowRight')keys.right=false;
});

// ═══════════════════════════════════════════════
//  STARTER SELECT
// ═══════════════════════════════════════════════
const STARTERS=[
  {stage:'A',label:'ノーマルタイプ',color:'#f9a8d4'},
  {stage:'B',label:'ほのおタイプ',color:'#fb923c'},
  {stage:'C',label:'ゴーストタイプ',color:'#c084fc'},
];

function showStarterSelect(){
  // Check for existing save
  const saved=localStorage.getItem(SAVE_KEY);
  if(saved){
    try{
      const d=JSON.parse(saved);
      if(d.p&&d.p.party&&d.p.party.length>0){
        // Resume
        p=d.p;curMap=d.curMap||'start';activeMonIdx=d.activeMonIdx||0;
        p.party.forEach(m=>{m.maxHp=getStats(m.stage,m.level).hp;if(!m.currentHp)m.currentHp=m.maxHp;});
        startAdventure();
        return;
      }
    }catch(e){}
  }
  // New game
  const grid=document.getElementById('s-grid');
  grid.innerHTML=STARTERS.map((s,i)=>`
    <div class="s-card" id="sc-${i}" onclick="selectStarter(${i})" style="border-color:rgba(${hexToRgb(s.color)},0.3)">
      <svg width="80" height="80" viewBox="0 0 200 200" class="${M[s.stage].anim}">${M[s.stage].draw()}</svg>
      <div class="s-cname">${M[s.stage].name}</div>
      <div class="s-ctype" style="color:${s.color}">${s.label}</div>
    </div>`).join('');
  setGs('starter');
}

function hexToRgb(hex){
  const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r?`${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}`:'255,255,255';
}

function selectStarter(idx){
  starterChoice=idx;
  document.querySelectorAll('.s-card').forEach((el,i)=>{
    el.classList.toggle('sel',i===idx);
  });
  const conf=document.getElementById('s-confirm');
  conf.classList.add('on');
}

function confirmStarter(){
  if(starterChoice===null)return;
  const s=STARTERS[starterChoice];
  const stats=getStats(s.stage,5);
  p.party=[{stage:s.stage,level:5,exp:0,currentHp:stats.hp,maxHp:stats.hp}];
  p.gold=500;p.badges=[];p.defeated={};p.flags={};p.steps=0;
  p.items={ball:15,potion:8,superpotion:3,revive:2};
  curMap='start';p.x=1;p.y=1;p.px=1;p.py=1;
  saveGame();
  startAdventure();
}

function startAdventure(){
  setGs('map');
  updateHud();
  document.getElementById('hud-loc').textContent=MAPS[curMap].name;
  // Opening story dialog for new players
  if(!p.flags.intro_done){
    p.flags.intro_done=true;
    const lines=[
      ['博士','ようこそ！ モンスタークエストの せかいへ！'],
      ['博士','ここは モンスターたちが すむ せかい。'],
      ['博士','きみも つよい トレーナーを めざして\nぼうけんに でかけよう！'],
      ['博士','バッジを あつめて よっつのてん王と\nチャンピオンを たおすのが きみの めあてだ！'],
      ['博士','いい ぼうけんを！'],
    ];
    let i=0;
    function next(){if(i<lines.length){showDialog(lines[i][0],lines[i][1],null,()=>{i++;next();});}else{document.getElementById('dlg').style.display='none';}}
    setTimeout(next,400);
  }
}
