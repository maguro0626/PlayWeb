<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blockzushi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --app-height: 100%; }
        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        }
        .glass-header {
            background-color: rgba(255,255,255,0.7);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        #game-wrapper {
            flex-grow: 1; display: flex;
            align-items: center; justify-content: center;
            padding: 6px; min-height: 0; position: relative;
        }
        #gameCanvas {
            border-radius: 14px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.45),
                        0 0 0 1px rgba(255,255,255,0.06),
                        inset 0 0 40px rgba(0,0,0,0.6);
            touch-action: none;
            display: block;
        }

        /* ━━━ Active glow (from reversi) ━━━ */
        .active-turn {
            border-color: #3b82f6 !important;
            transform: scale(1.04);
            background-color: white !important;
            animation: turn-glow 2s infinite ease-in-out;
        }
        @keyframes turn-glow {
            0%,100% { box-shadow: 0 8px 20px rgba(59,130,246,0.2), 0 0 18px rgba(59,130,246,0.12); }
            50%      { box-shadow: 0 12px 32px rgba(59,130,246,0.38), 0 0 38px rgba(59,130,246,0.24); }
        }

        /* ━━━ Score pop ━━━ */
        .score-pop { animation: score-pop 0.45s cubic-bezier(0.175,0.885,0.32,1.6) both; }
        @keyframes score-pop {
            0%   { transform: scale(1);   color: inherit; }
            50%  { transform: scale(1.55); color: #3b82f6; }
            100% { transform: scale(1);   color: inherit; }
        }

        /* ━━━ Toast ━━━ */
        .toast-pop { animation: toast-anim 2s cubic-bezier(0.175,0.885,0.32,1.2) forwards; }
        @keyframes toast-anim {
            0%   { transform:translate(-50%,-50%) scale(0.5); opacity:0; }
            15%  { transform:translate(-50%,-50%) scale(1.06); opacity:1; }
            25%  { transform:translate(-50%,-50%) scale(1);   opacity:1; }
            80%  { transform:translate(-50%,-50%) scale(1);   opacity:1; }
            100% { transform:translate(-50%,-50%) scale(0.8); opacity:0; }
        }

        /* ━━━ Confetti ━━━ */
        .confetti {
            position: fixed; top: -30px;
            z-index: 100; pointer-events: none;
            animation: confetti-fall linear forwards;
        }
        @keyframes confetti-fall {
            0%   { transform:translateY(0) rotate(0deg) scale(1); opacity:1; }
            85%  { opacity:1; }
            100% { transform:translateY(115vh) rotate(var(--rot,720deg)) scale(0.7); opacity:0; }
        }

        /* ━━━ Victory flash ━━━ */
        .victory-flash {
            position:fixed; inset:0; pointer-events:none; z-index:90;
            animation: v-flash 0.7s ease-out forwards;
        }
        .danger-flash {
            position:fixed; inset:0; pointer-events:none; z-index:90;
            animation: d-flash 0.5s ease-out forwards;
        }
        @keyframes v-flash { 0% { background:rgba(255,255,255,0.5); } 100% { background:rgba(255,255,255,0); } }
        @keyframes d-flash  { 0% { background:rgba(239,68,68,0.35);  } 100% { background:rgba(239,68,68,0); } }

        /* ━━━ Power-up badge ━━━ */
        .pu-badge {
            display:inline-flex; align-items:center; gap:3px;
            padding: 3px 8px; border-radius: 20px;
            font-size: 9px; font-weight: 900; color: white;
            animation: pu-pulse 1.8s infinite ease-in-out;
            position: relative; overflow: hidden;
        }
        .pu-badge::after {
            content:''; position:absolute; inset:0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
            animation: pu-shine 2s infinite;
        }
        @keyframes pu-pulse { 0%,100% { opacity:.88; transform:scale(1); } 50% { opacity:1; transform:scale(1.04); } }
        @keyframes pu-shine { 0% { transform:translateX(-120%); } 100% { transform:translateX(120%); } }

        /* ━━━ Overlay card ━━━ */
        #overlay {
            position:absolute; inset:0; border-radius:14px;
            display:flex; align-items:center; justify-content:center;
            z-index:20; pointer-events:auto;
            backdrop-filter: blur(4px);
        }
        .overlay-card {
            background: rgba(255,255,255,0.93);
            backdrop-filter: blur(24px);
            border-radius: 2rem;
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 24px 64px rgba(0,0,0,0.22);
            padding: 1.8rem 2rem;
            text-align: center;
            min-width: 240px;
            max-width: 300px;
            animation: card-pop 0.35s cubic-bezier(0.175,0.885,0.32,1.3) both;
        }
        @keyframes card-pop {
            0%   { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1);   opacity: 1; }
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- ─── Header (exact reversi style) ─── -->
    <header class="w-full shrink-0 z-50 glass-header border-b border-black/5 h-14 flex items-center justify-between px-4">
        <button onclick="window.location.href='index.html'"
                class="flex items-center gap-2 text-zinc-600 hover:text-zinc-900 transition-colors p-2 rounded-xl hover:bg-black/5">
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-sm font-bold">ホーム</span>
        </button>
        <div id="status-text" class="text-[10px] font-black tracking-widest uppercase text-zinc-400">Ready</div>
        <div class="w-20"></div>
    </header>

    <main class="flex-grow flex flex-col overflow-hidden max-w-2xl mx-auto w-full">

        <!-- ─── Info bar ─── -->
        <div class="grid grid-cols-3 gap-3 px-4 pt-3 shrink-0">
            <div id="ui-stage-card" class="flex flex-col items-center bg-white/80 backdrop-blur-md rounded-2xl p-2.5 border border-black/5 shadow-sm transition-all duration-300">
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-400">Stage</span>
                <span id="ui-stage" class="text-xl font-black text-zinc-900">1</span>
            </div>
            <div class="flex flex-col items-center bg-white/80 backdrop-blur-md rounded-2xl p-2.5 border border-black/5 shadow-sm">
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-400">Score</span>
                <span id="ui-score" class="text-xl font-black text-zinc-900">0</span>
            </div>
            <div id="ui-lives-card" class="flex flex-col items-center bg-white/80 backdrop-blur-md rounded-2xl p-2.5 border border-black/5 shadow-sm">
                <span class="text-[9px] font-black uppercase tracking-widest text-zinc-400">Lives</span>
                <span id="ui-lives" class="text-base font-black">❤️❤️❤️</span>
            </div>
        </div>

        <!-- ─── Power-up bar ─── -->
        <div id="powerup-bar" class="px-4 pt-2 shrink-0 flex gap-1.5 flex-wrap min-h-[28px]"></div>

        <!-- ─── Canvas area ─── -->
        <div id="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div id="overlay" style="display:none;">
                <div class="overlay-card">
                    <div id="ov-icon" class="text-5xl mb-2">🎮</div>
                    <div id="ov-title" class="text-xl font-black text-zinc-900 mb-1">BLOCKZUSHI</div>
                    <div id="ov-sub" class="text-xs text-zinc-500 mb-5 whitespace-pre-line leading-relaxed">ブロックを壊してステージクリア！</div>
                    <button id="ov-btn" onclick="startGame()"
                            class="w-full py-3.5 bg-zinc-900 text-white rounded-2xl font-bold text-sm
                                   flex items-center justify-center gap-2 active:scale-95 transition-all">
                        <i data-lucide="play" class="w-4 h-4"></i>
                        スタート
                    </button>
                </div>
            </div>
        </div>

        <!-- ─── Controls (reversi-style) ─── -->
        <div class="px-4 pb-4 shrink-0">
            <div class="bg-white/80 backdrop-blur-md p-3 rounded-[2rem] border border-black/5 space-y-3 shadow-sm">
                <div class="flex justify-between items-center gap-2">
                    <!-- Difficulty -->
                    <div class="flex p-1 bg-zinc-100 rounded-2xl gap-1">
                        <button onclick="changeDiff('easy')"   id="df-easy"
                                class="px-3 py-2 rounded-xl text-[10px] font-bold text-zinc-500">Easy</button>
                        <button onclick="changeDiff('normal')" id="df-normal"
                                class="px-3 py-2 rounded-xl text-[10px] font-bold bg-white shadow-sm text-black">Normal</button>
                        <button onclick="changeDiff('hard')"   id="df-hard"
                                class="px-3 py-2 rounded-xl text-[10px] font-bold text-zinc-500">Hard</button>
                    </div>
                    <!-- Pause -->
                    <button onclick="togglePause()" id="pause-btn"
                            class="flex items-center gap-1.5 px-3 py-2 bg-zinc-100 rounded-2xl text-[10px] font-bold text-zinc-700 active:scale-95 transition-all">
                        <i data-lucide="pause" class="w-3 h-3"></i>一時停止
                    </button>
                </div>
                <button onclick="resetGame()"
                        class="w-full py-3 bg-zinc-900 text-white rounded-2xl font-bold text-sm
                               flex items-center justify-center gap-2 active:scale-95 transition-all">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                    リセット
                </button>
            </div>
        </div>
    </main>

<script>
// ══════════════════════════════════════════════════════════════
// BLOCKZUSHI — Game Engine
// ══════════════════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

/* ── Difficulty presets ── */
const DIFF = {
    easy:   { lives:5, speedBase:3.8, speedInc:0.04, paddleRatio:0.24, fillMin:0.42, fillMax:0.55, rowsBase:4, rowsInc:0.4 },
    normal: { lives:3, speedBase:4.8, speedInc:0.06, paddleRatio:0.17, fillMin:0.55, fillMax:0.72, rowsBase:5, rowsInc:0.5 },
    hard:   { lives:2, speedBase:6.0, speedInc:0.08, paddleRatio:0.12, fillMin:0.68, fillMax:0.85, rowsBase:6, rowsInc:0.7 },
};

/* ── Power-up catalogue ── */
const PU = [
    { type:'wide',   label:'WIDE',  color:'#3b82f6', desc:'パドル拡大',     dur:15000, w:18 },
    { type:'multi',  label:'MULTI', color:'#f59e0b', desc:'マルチボール',   dur:0,     w:10 },
    { type:'slow',   label:'SLOW',  color:'#22c55e', desc:'スロー',         dur:10000, w:14 },
    { type:'laser',  label:'LASER', color:'#ef4444', desc:'レーザー砲',     dur:12000, w:9  },
    { type:'shield', label:'GUARD', color:'#8b5cf6', desc:'バリア',         dur:12000, w:9  },
    { type:'fire',   label:'FIRE',  color:'#f97316', desc:'貫通ファイア',   dur:9000,  w:9  },
    { type:'magnet', label:'MAG',   color:'#06b6d4', desc:'マグネット',     dur:8000,  w:8  },
    { type:'life',   label:'+LIFE', color:'#ec4899', desc:'残機+1',         dur:0,     w:6  },
    { type:'bomb',   label:'BOMB',  color:'#dc2626', desc:'エリア爆破',     dur:0,     w:6  },
    { type:'tiny',   label:'TINY',  color:'#71717a', desc:'極小高速ボール', dur:8000,  w:7  },
    { type:'speed',  label:'SPEED', color:'#7c3aed', desc:'スピードアップ', dur:6000,  w:7  },
    { type:'ghost',  label:'GHOST', color:'#a78bfa', desc:'ゴーストボール', dur:8000,  w:6  },
];

/* ── Block colour sets [light, mid, dark] ── */
const BCOL = [
    ['#fca5a5','#ef4444','#991b1b'],
    ['#fdba74','#f97316','#9a3412'],
    ['#fde047','#eab308','#854d0e'],
    ['#86efac','#22c55e','#166534'],
    ['#93c5fd','#3b82f6','#1e3a8a'],
    ['#c4b5fd','#a855f7','#581c87'],
    ['#f9a8d4','#ec4899','#9d174d'],
    ['#67e8f9','#06b6d4','#164e63'],
];

/* ── State ── */
let diff      = 'normal';
let gameState = 'title'; // title | playing | paused | stageclear | gameover
let stage = 1, score = 0, livesLeft = 3, blocksDestroyed = 0, stagesCleared = 0;

let paddle = {}, balls = [], blocks = [], items = [], particles = [], lasers = [];
let stars  = [];
let shakeF = 0, shakeAmp = 0;
let activePU = {};         // type → { expiresAt }
let carriedPU = new Set(); // types carried to next stage
let animId = null, frameN = 0;
let lastLaser = 0;
let lifeGuard = false;     // prevent double loseLife in one frame

/* ══════════════ RESIZE ══════════════ */
function resizeCanvas() {
    const wr = document.getElementById('game-wrapper');
    const aw = wr.clientWidth  - 12;
    const ah = wr.clientHeight - 12;
    let cw = Math.min(aw, 500);
    let ch = Math.min(ah, Math.round(cw * 1.42));
    cw = Math.round(Math.min(cw, ch / 1.42));
    canvas.width  = cw;
    canvas.height = ch;
    if (gameState === 'playing' || gameState === 'paused') repositionObjects();
    buildStars();
}

function repositionObjects() {
    paddle.y = canvas.height - 32;
    paddle.x = Math.min(Math.max(paddle.x, paddle.w/2), canvas.width - paddle.w/2);
}

/* ══════════════ STARS (ambient background) ══════════════ */
function buildStars() {
    stars = [];
    for (let i = 0; i < 60; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: 0.5 + Math.random() * 1.2,
            a: Math.random(),
            da: 0.003 + Math.random() * 0.007,
        });
    }
}

/* ══════════════ INIT ══════════════ */
function initPaddle() {
    const d = DIFF[diff];
    paddle = {
        x: canvas.width / 2,
        y: canvas.height - 32,
        w: canvas.width * d.paddleRatio,
        h: 13,
        baseW: canvas.width * d.paddleRatio,
    };
}

function makeBall(onPaddle = true) {
    const d = DIFF[diff];
    const spd = d.speedBase + stage * d.speedInc;
    const ang = -Math.PI/2 + (Math.random() - 0.5) * 0.7;
    return {
        x:     onPaddle ? paddle.x : canvas.width/2,
        y:     onPaddle ? paddle.y - paddle.h/2 - 9 : canvas.height * 0.45,
        vx:    Math.cos(ang) * spd,
        vy:    Math.sin(ang) * spd,
        r:     8,
        trail: [],
        stuck: onPaddle,
        fire:  !!activePU['fire'],
        ghost: !!activePU['ghost'],
        tiny:  !!activePU['tiny'],
    };
}

function initBlocks() {
    blocks = [];
    const d   = DIFF[diff];
    const cols = Math.min(10, 8 + Math.floor(stage / 3));
    const rows = Math.round(d.rowsBase + stage * d.rowsInc);
    const gap  = 4;
    const padX = 8;
    const bw   = (canvas.width - padX*2 - gap*(cols-1)) / cols;
    const bh   = Math.max(12, Math.min(20, canvas.height * 0.038));
    const startY = 44;
    const fill = d.fillMin + Math.random() * (d.fillMax - d.fillMin);

    for (let r = 0; r < rows; r++) {
        const colorSet = BCOL[(r + Math.floor(Math.random()*2)) % BCOL.length];
        for (let c = 0; c < cols; c++) {
            if (Math.random() > fill) continue;
            const maxHp = Math.min(3, 1 + Math.floor(stage/4) + (Math.random()<0.15?1:0));
            blocks.push({
                x: padX + c*(bw+gap),
                y: startY + r*(bh+gap),
                w: bw, h: bh,
                hp: maxHp, maxHp,
                cs: colorSet,
                pu: Math.random() < 0.17 ? randPU() : null,
                flash: 0,
                dead:  false,
                shakeX: 0,
            });
        }
    }
    // Ensure at least 6 blocks
    while (blocks.length < 6) {
        const r=0, c=Math.floor(Math.random()*8);
        const bw2 = (canvas.width - 8*2 - 4*7)/8;
        blocks.push({
            x:8+c*(bw2+4), y:44, w:bw2, h:14,
            hp:1, maxHp:1, cs:BCOL[0], pu:null, flash:0, dead:false, shakeX:0
        });
    }
}

function randPU() {
    const tot = PU.reduce((s,p)=>s+p.w, 0);
    let r = Math.random()*tot;
    for (const p of PU) { r-=p.w; if(r<=0) return p.type; }
    return PU[0].type;
}

/* ══════════════ GAME FLOW ══════════════ */
function startGame() {
    hideOverlay();
    stage=1; score=0; blocksDestroyed=0; stagesCleared=0;
    livesLeft = DIFF[diff].lives;
    activePU={}; carriedPU.clear();
    items=[]; particles=[]; lasers=[]; shakeF=0; lifeGuard=false;
    initPaddle();
    balls=[makeBall(true)];
    initBlocks();
    gameState='playing';
    setStatus(`STAGE 1`);
    updateUI();
    updatePUBar();
    cancelAnim(); loop();
}

function resetGame() {
    cancelAnim();
    gameState='title';
    document.querySelectorAll('.confetti').forEach(e=>e.remove());
    setStatus('READY');
    showOverlay('🎮','BLOCKZUSHI','ブロックを壊してステージクリア！\nパワーアップを取ってステージを進め！','スタート','startGame()');
    drawIdleBg();
}

function stageClear() {
    gameState = 'stageclear';
    stagesCleared++;
    const bonus = 100 * stage;
    score += bonus;
    carriedPU.clear();
    const now = Date.now();
    for (const [t,d] of Object.entries(activePU)) {
        if (d.expiresAt > now) carriedPU.add(t);
    }
    updateUI();
    spawnConfetti(['#3b82f6','#f59e0b','#22c55e','#a855f7','#ec4899','#06b6d4']);
    flashScreen('victory');
    showToast(`STAGE ${stage} CLEAR!\n+${bonus}pts`);
    setTimeout(() => {
        stage++;
        showOverlay('🎉', `STAGE ${stage}`, `ステージ${stage}スタート！\nクリアボーナス +${bonus}pts`, '次のステージへ', 'nextStage()');
    }, 2200);
}

function nextStage() {
    hideOverlay();
    const now = Date.now();
    // Restore carried power-ups (effectively permanent for this stage)
    activePU = {};
    for (const t of carriedPU) activePU[t] = { expiresAt: now + 999999999 };
    items=[]; particles=[]; lasers=[]; shakeF=0; lifeGuard=false;
    initPaddle();
    // Apply carried effects
    if (activePU['wide'])  paddle.w = paddle.baseW * 1.85;
    if (activePU['tiny'])  {}  // applied in makeBall
    balls=[makeBall(true)];
    initBlocks();
    gameState='playing';
    setStatus(`STAGE ${stage}`);
    updateUI(); updatePUBar();
    cancelAnim(); loop();
}

function loseLife() {
    if (lifeGuard) return;
    lifeGuard = true;
    livesLeft--;
    shakeF=35; shakeAmp=10;
    flashScreen('danger');
    updateUI();
    if (livesLeft <= 0) {
        gameOver(); return;
    }
    balls = [makeBall(true)];
    lasers = [];
    delete activePU['shield'];
    updatePUBar();
    showToast(`残り ${livesLeft} 機`);
    setTimeout(()=>{ lifeGuard=false; }, 500);
}

function gameOver() {
    gameState = 'gameover';
    const finalScore = score + stagesCleared*50 + blocksDestroyed*5;
    score = finalScore;
    updateUI();
    setTimeout(()=>{
        showOverlay('💥','GAME OVER',
            `スコア: ${finalScore}\nステージ: ${stagesCleared} クリア\nブロック: ${blocksDestroyed} 破壊`,
            'もう一度', 'startGame()');
    }, 900);
}

function togglePause() {
    if (gameState==='playing') {
        gameState='paused';
        setStatus('PAUSED');
    } else if (gameState==='paused') {
        gameState='playing';
        setStatus(`STAGE ${stage}`);
        cancelAnim(); loop();
    }
}

function changeDiff(d) {
    diff = d;
    ['easy','normal','hard'].forEach(n=>{
        document.getElementById(`df-${n}`).className =
            n===d ? 'px-3 py-2 rounded-xl text-[10px] font-bold bg-white shadow-sm text-black'
                  : 'px-3 py-2 rounded-xl text-[10px] font-bold text-zinc-500';
    });
}

/* ══════════════ POWER-UP APPLICATION ══════════════ */
function applyPU(type) {
    const def = PU.find(p=>p.type===type);
    if (!def) return;
    showToast(def.desc + '！');

    switch(type) {
        case 'wide':
            activePU['wide']={expiresAt:Date.now()+def.dur};
            paddle.w = paddle.baseW * 1.85;
            break;
        case 'multi':
            for (let i=0;i<2;i++) {
                const src = balls[0] || makeBall(false);
                const nb = { ...src, trail:[], stuck:false,
                    vx: (Math.random()<0.5?1:-1) * Math.abs(src.vy) * 0.7 + src.vx * 0.3,
                    vy: -Math.abs(src.vy || 5)
                };
                nb.vx = Math.cos(-Math.PI/2 + (Math.random()-0.5)*2) * Math.hypot(src.vx,src.vy);
                nb.vy = -Math.abs(Math.sin(-Math.PI/2 + (Math.random()-0.5)*2) * Math.hypot(src.vx,src.vy));
                balls.push(nb);
            }
            break;
        case 'slow':
            activePU['slow']={expiresAt:Date.now()+def.dur};
            balls.forEach(b=>{const m=Math.hypot(b.vx,b.vy);const f=0.6;b.vx=b.vx/m*(m*f);b.vy=b.vy/m*(m*f);});
            break;
        case 'laser':
            activePU['laser']={expiresAt:Date.now()+def.dur};
            break;
        case 'shield':
            activePU['shield']={expiresAt:Date.now()+def.dur};
            break;
        case 'fire':
            activePU['fire']={expiresAt:Date.now()+def.dur};
            balls.forEach(b=>b.fire=true);
            break;
        case 'magnet':
            activePU['magnet']={expiresAt:Date.now()+def.dur};
            balls.forEach(b=>b.stuck=true);
            break;
        case 'life':
            livesLeft=Math.min(livesLeft+1,9); updateUI(); break;
        case 'bomb':
            doBomb(); break;
        case 'tiny':
            activePU['tiny']={expiresAt:Date.now()+def.dur};
            balls.forEach(b=>{b.r=4;b.tiny=true;const spd=Math.hypot(b.vx,b.vy)*1.35;const a=Math.atan2(b.vy,b.vx);b.vx=Math.cos(a)*spd;b.vy=Math.sin(a)*spd;});
            break;
        case 'speed':
            activePU['speed']={expiresAt:Date.now()+def.dur};
            balls.forEach(b=>{const spd=Math.hypot(b.vx,b.vy)*1.45;const a=Math.atan2(b.vy,b.vx);b.vx=Math.cos(a)*spd;b.vy=Math.sin(a)*spd;});
            break;
        case 'ghost':
            activePU['ghost']={expiresAt:Date.now()+def.dur};
            balls.forEach(b=>b.ghost=true);
            break;
    }
    updatePUBar();
}

function doBomb() {
    const cx=canvas.width/2, cy=canvas.height/2;
    const br=canvas.width*0.38;
    blocks.forEach(b=>{
        if(b.dead) return;
        const bx=b.x+b.w/2, by=b.y+b.h/2;
        if(Math.hypot(bx-cx,by-cy)<br) destroyBlock(b,true);
    });
    for(let i=0;i<80;i++){
        const a=Math.random()*Math.PI*2, spd=3+Math.random()*9;
        particles.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
            r:3+Math.random()*5,life:1,dec:0.018+Math.random()*0.018,
            col:['#ef4444','#f97316','#fbbf24','#fff7ed','#fff'][Math.floor(Math.random()*5)]});
    }
    shakeF=22; shakeAmp=12;
}

function tickPU() {
    const now = Date.now();
    for (const [t,d] of Object.entries(activePU)) {
        if (d.expiresAt && now > d.expiresAt) {
            expirePU(t);
            delete activePU[t];
        }
    }
}

function expirePU(t) {
    switch(t) {
        case 'wide':  paddle.w = paddle.baseW; break;
        case 'slow':
            balls.forEach(b=>{const spd=Math.hypot(b.vx,b.vy)/0.6; const a=Math.atan2(b.vy,b.vx); b.vx=Math.cos(a)*spd; b.vy=Math.sin(a)*spd;}); break;
        case 'fire':  balls.forEach(b=>b.fire=false); break;
        case 'tiny':  balls.forEach(b=>{b.r=8;b.tiny=false;}); break;
        case 'speed':
            balls.forEach(b=>{const spd=Math.hypot(b.vx,b.vy)/1.45; const a=Math.atan2(b.vy,b.vx); b.vx=Math.cos(a)*spd; b.vy=Math.sin(a)*spd;}); break;
        case 'ghost': balls.forEach(b=>b.ghost=false); break;
        case 'magnet':balls.forEach(b=>b.stuck=false); break;
    }
    updatePUBar();
}

/* ══════════════ BLOCK DESTRUCTION ══════════════ */
function destroyBlock(block, silent=false) {
    if (block.dead) return;
    block.dead = true;
    blocksDestroyed++;
    score += 10 * stage;
    const cx=block.x+block.w/2, cy=block.y+block.h/2;
    // Particles
    for(let i=0;i<14;i++){
        const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*4.5;
        particles.push({x:cx,y:cy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
            r:1.5+Math.random()*3.5,life:1,dec:0.022+Math.random()*0.02,
            col:block.cs[Math.floor(Math.random()*3)]});
    }
    // Drop item
    if (block.pu && !silent) {
        const def=PU.find(p=>p.type===block.pu);
        items.push({
            x:cx, y:cy, w:42, h:19, vy:2.8,
            type:block.pu,
            col:def?.color||'#3b82f6',
            label:def?.label||'?',
            glow:Math.random()*Math.PI*2,
        });
    }
    updateUI();
}

/* ══════════════ COLLISION ══════════════ */
function ballVsBlocks(ball) {
    for (const bl of blocks) {
        if (bl.dead) continue;
        const L=bl.x, R=bl.x+bl.w, T=bl.y, B=bl.y+bl.h;
        const bL=ball.x-ball.r, bR=ball.x+ball.r, bT=ball.y-ball.r, bB=ball.y+ball.r;
        if (bR<L||bL>R||bB<T||bT>B) continue;

        const oL=bR-L, oR=R-bL, oT=bB-T, oB=B-bT;
        const minO=Math.min(oL,oR,oT,oB);

        if (!ball.ghost) {
            if (minO===oL) { ball.vx=-Math.abs(ball.vx); ball.x=L-ball.r; }
            else if(minO===oR){ ball.vx= Math.abs(ball.vx); ball.x=R+ball.r; }
            else if(minO===oT){ ball.vy=-Math.abs(ball.vy); ball.y=T-ball.r; }
            else              { ball.vy= Math.abs(ball.vy); ball.y=B+ball.r; }
        }

        bl.flash=10;
        bl.shakeX=3;
        bl.hp -= ball.fire ? bl.hp : 1;
        if (bl.hp<=0) destroyBlock(bl);
        if (!ball.ghost) break;
    }
}

function ballVsPaddle(ball) {
    const py=paddle.y-paddle.h/2;
    if (ball.vy>0 && ball.y+ball.r>=py && ball.y-ball.r<=paddle.y+paddle.h/2) {
        const pL=paddle.x-paddle.w/2, pR=paddle.x+paddle.w/2;
        if (ball.x>=pL && ball.x<=pR) {
            const rel=(ball.x-paddle.x)/(paddle.w/2);
            const spd=Math.hypot(ball.vx,ball.vy);
            const ang=rel*0.72;
            ball.vx=Math.sin(ang)*spd;
            ball.vy=-Math.abs(Math.cos(ang)*spd);
            ball.y=py-ball.r-0.5;
            if (activePU['magnet']) ball.stuck=true;
            // Paddle spark
            for(let i=0;i<8;i++){
                const a=-Math.PI/2+(Math.random()-0.5)*1.4, s=2+Math.random()*3;
                particles.push({x:ball.x,y:py,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
                    r:1.5+Math.random()*2,life:1,dec:0.055+Math.random()*0.04,
                    col:['#fff','#bfdbfe','#6366f1','#93c5fd'][Math.floor(Math.random()*4)]});
            }
        }
    }
}

/* ══════════════ LASER ══════════════ */
function autoLaser() {
    const now=Date.now();
    if(now-lastLaser<380) return;
    lastLaser=now;
    const py=paddle.y-paddle.h/2;
    lasers.push({x:paddle.x-14,y:py,vy:-20,h:20,w:4,dead:false});
    lasers.push({x:paddle.x+14,y:py,vy:-20,h:20,w:4,dead:false});
}

function updateLasers() {
    for(const l of lasers) l.y+=l.vy;
    for(const l of lasers){
        for(const bl of blocks){
            if(bl.dead||l.dead) continue;
            if(l.x>=bl.x&&l.x<=bl.x+bl.w&&l.y<=bl.y+bl.h&&l.y+l.h>=bl.y){
                bl.flash=6; bl.hp--;
                if(bl.hp<=0) destroyBlock(bl);
                l.dead=true; break;
            }
        }
    }
    lasers=lasers.filter(l=>!l.dead&&l.y>-25);
}

/* ══════════════ MAIN LOOP ══════════════ */
function cancelAnim() {
    if(animId){cancelAnimationFrame(animId);animId=null;}
}
function loop() {
    if(gameState!=='playing') return;
    animId=requestAnimationFrame(loop);
    update(); draw();
}

function update() {
    frameN++;
    tickPU();
    if(activePU['laser']) autoLaser();

    // Stars
    stars.forEach(s=>{s.a=Math.abs(Math.sin(Date.now()*s.da));});

    // Items
    for(const it of items){
        it.y+=it.vy;
        it.glow+=0.12;
        // Collect
        const py=paddle.y-paddle.h/2;
        if(it.x>paddle.x-paddle.w/2-it.w/2&&it.x<paddle.x+paddle.w/2+it.w/2&&
           it.y+it.h>py&&it.y<paddle.y+paddle.h/2+10){
            it.done=true;
            applyPU(it.type);
            for(let i=0;i<18;i++){
                const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
                particles.push({x:it.x,y:it.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
                    r:2+Math.random()*3,life:1,dec:0.04+Math.random()*0.03,col:it.col});
            }
        }
    }
    items=items.filter(i=>!i.done&&i.y<canvas.height+30);

    // Particles
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=p.dec;});
    particles=particles.filter(p=>p.life>0&&particles.length>0);

    // Lasers
    updateLasers();

    // Blocks flash/shake
    blocks.forEach(bl=>{
        if(bl.flash>0)bl.flash--;
        if(bl.shakeX>0.3){bl.shakeX*=0.7;}else{bl.shakeX=0;}
    });

    // Balls
    const deadBallIdxs=[];
    for(let bi=0;bi<balls.length;bi++){
        const b=balls[bi];
        if(b.stuck){
            b.x=Math.min(Math.max(paddle.x,paddle.w/2+b.r),canvas.width-paddle.w/2-b.r);
            b.y=paddle.y-paddle.h/2-b.r-1;
            b.trail=[];
            continue;
        }
        // Trail
        b.trail.push({x:b.x,y:b.y});
        if(b.trail.length>14) b.trail.shift();

        b.x+=b.vx; b.y+=b.vy;
        // Walls
        if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx);}
        if(b.x+b.r>canvas.width){b.x=canvas.width-b.r;b.vx=-Math.abs(b.vx);}
        if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy);}
        // Bottom
        if(b.y-b.r>canvas.height){
            if(activePU['shield']){
                b.vy=-Math.abs(b.vy)*1.02;
                b.y=canvas.height-b.r-2;
                shakeF=8;shakeAmp=4;
            } else {
                deadBallIdxs.push(bi);
            }
            continue;
        }
        ballVsPaddle(b);
        ballVsBlocks(b);
        // Speed cap
        const spd=Math.hypot(b.vx,b.vy);
        const maxSpd=18;
        if(spd>maxSpd){b.vx=b.vx/spd*maxSpd;b.vy=b.vy/spd*maxSpd;}
    }
    // Remove dead balls (reverse order)
    for(let i=deadBallIdxs.length-1;i>=0;i--) balls.splice(deadBallIdxs[i],1);
    if(balls.length===0) loseLife();

    // Shake decay
    if(shakeF>0) shakeF--;

    // Stage clear check
    if(gameState==='playing' && blocks.filter(b=>!b.dead).length===0){
        gameState='stageclear';
        stageClear();
    }

    // PU bar every 45 frames
    if(frameN%45===0) updatePUBar();
}

/* ══════════════ DRAW ══════════════ */
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let sx=0,sy=0;
    if(shakeF>0){sx=(Math.random()-0.5)*shakeAmp;sy=(Math.random()-0.5)*shakeAmp;}
    ctx.save();
    ctx.translate(sx,sy);
    drawBg();
    drawBlocks();
    drawParticles();
    drawItems();
    drawLasers();
    balls.forEach(drawBall);
    drawPaddle();
    drawShield();
    ctx.restore();
}

function drawBg() {
    const g=ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0,'#080818');
    g.addColorStop(1,'#0e0e28');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,canvas.width,canvas.height);
    // Grid lines
    ctx.strokeStyle='rgba(255,255,255,0.025)';
    ctx.lineWidth=1;
    for(let x=0;x<canvas.width;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    for(let y=0;y<canvas.height;y+=28){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
    // Stars
    stars.forEach(s=>{
        ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${s.a*0.6})`;ctx.fill();
    });
}

function drawBlocks() {
    for(const bl of blocks){
        if(bl.dead) continue;
        ctx.save();
        const bx=bl.x + (bl.shakeX*(Math.random()-0.5)*2);
        if(bl.flash>0){ctx.shadowColor='#fff';ctx.shadowBlur=18;}
        // Color by HP ratio
        const ratio=bl.hp/bl.maxHp;
        const ci=Math.floor((1-ratio)*2);
        const base=bl.cs[Math.min(ci,2)];
        // Gradient fill
        const g=ctx.createLinearGradient(bx,bl.y,bx,bl.y+bl.h);
        g.addColorStop(0,lighten(base,40));
        g.addColorStop(1,base);
        ctx.fillStyle=g;
        rr(ctx,bx,bl.y,bl.w,bl.h,4);
        ctx.fill();
        // Shine
        ctx.fillStyle='rgba(255,255,255,0.22)';
        rr(ctx,bx+2,bl.y+1,bl.w-4,bl.h*0.45,2);
        ctx.fill();
        // Bottom shadow
        ctx.fillStyle='rgba(0,0,0,0.25)';
        rr(ctx,bx+2,bl.y+bl.h-3,bl.w-4,3,2);
        ctx.fill();
        // HP pips
        if(bl.maxHp>1){
            for(let i=0;i<bl.maxHp;i++){
                ctx.beginPath();
                ctx.arc(bx+bl.w/2+(i-(bl.maxHp-1)/2)*7,bl.y+bl.h/2,2.2,0,Math.PI*2);
                ctx.fillStyle=i<bl.hp?'rgba(255,255,255,0.9)':'rgba(0,0,0,0.45)';
                ctx.fill();
            }
        }
        // PU star
        if(bl.pu){
            const pdef=PU.find(p=>p.type===bl.pu);
            ctx.globalAlpha=0.65+Math.sin(Date.now()*0.004)*0.25;
            ctx.fillStyle=pdef?.color||'#fff';
            ctx.font=`bold ${Math.min(10,bl.h*0.6)}px sans-serif`;
            ctx.textAlign='center';ctx.textBaseline='middle';
            ctx.shadowBlur=0;
            ctx.fillText('★',bx+bl.w/2,bl.y+bl.h/2+0.5);
            ctx.globalAlpha=1;
        }
        ctx.restore();
    }
}

function drawBall(b) {
    // Trail
    b.trail.forEach((pt,i)=>{
        const f=i/b.trail.length;
        const r=b.r*f*0.75;
        ctx.beginPath();ctx.arc(pt.x,pt.y,r,0,Math.PI*2);
        if(b.fire) ctx.fillStyle=`rgba(249,115,22,${f*0.45})`;
        else if(b.ghost) ctx.fillStyle=`rgba(167,139,250,${f*0.4})`;
        else ctx.fillStyle=`rgba(200,210,255,${f*0.38})`;
        ctx.fill();
    });
    ctx.save();
    if(b.fire){ctx.shadowColor='#f97316';ctx.shadowBlur=22;}
    else if(b.ghost){ctx.shadowColor='#a78bfa';ctx.shadowBlur=18;}
    else{ctx.shadowColor='rgba(180,200,255,0.9)';ctx.shadowBlur=16;}
    ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
    if(b.fire){
        const g=ctx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,0,b.x,b.y,b.r);
        g.addColorStop(0,'#fffbeb');g.addColorStop(0.5,'#f97316');g.addColorStop(1,'#7c2d12');
        ctx.fillStyle=g;
    } else if(b.ghost){
        const g=ctx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,0,b.x,b.y,b.r);
        g.addColorStop(0,'#ede9fe');g.addColorStop(1,'rgba(139,92,246,0.4)');
        ctx.fillStyle=g;
    } else {
        const g=ctx.createRadialGradient(b.x-b.r*.32,b.y-b.r*.32,0,b.x,b.y,b.r);
        g.addColorStop(0,'#ffffff');g.addColorStop(0.5,'#c7d2fe');g.addColorStop(1,'#4f46e5');
        ctx.fillStyle=g;
    }
    ctx.fill();
    // Specular
    ctx.beginPath();ctx.arc(b.x-b.r*.28,b.y-b.r*.28,b.r*.32,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.75)';ctx.fill();
    ctx.restore();
}

function drawPaddle() {
    ctx.save();
    ctx.shadowColor='#6366f1';ctx.shadowBlur=24;
    const px=paddle.x-paddle.w/2, py=paddle.y-paddle.h/2;
    const g=ctx.createLinearGradient(px,py,px,py+paddle.h);
    g.addColorStop(0,'#e0e7ff');g.addColorStop(0.4,'#6366f1');g.addColorStop(1,'#312e81');
    ctx.fillStyle=g;
    rr(ctx,px,py,paddle.w,paddle.h,paddle.h/2);ctx.fill();
    // Shine
    ctx.fillStyle='rgba(255,255,255,0.3)';
    rr(ctx,px+4,py+1,paddle.w-8,paddle.h*0.44,paddle.h/4);ctx.fill();
    // Laser dots
    if(activePU['laser']){
        ctx.shadowColor='#ef4444';ctx.shadowBlur=12;
        ctx.fillStyle='#ef4444';
        ctx.beginPath();ctx.arc(paddle.x-16,py+paddle.h/2,3.5,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(paddle.x+16,py+paddle.h/2,3.5,0,Math.PI*2);ctx.fill();
    }
    // Magnet aura
    if(activePU['magnet']){
        ctx.strokeStyle='rgba(6,182,212,0.5)';ctx.lineWidth=2;ctx.shadowColor='#06b6d4';ctx.shadowBlur=10;
        rr(ctx,px-3,py-3,paddle.w+6,paddle.h+6,paddle.h/2+3);ctx.stroke();
    }
    ctx.restore();
}

function drawParticles() {
    particles.forEach(p=>{
        ctx.save();
        ctx.globalAlpha=p.life*0.92;
        ctx.shadowColor=p.col;ctx.shadowBlur=5;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
        ctx.fillStyle=p.col;ctx.fill();
        ctx.restore();
    });
}

function drawItems() {
    items.forEach(it=>{
        ctx.save();
        const gv=0.55+Math.sin(it.glow)*0.3;
        ctx.shadowColor=it.col;ctx.shadowBlur=14+gv*10;
        rr(ctx,it.x-it.w/2,it.y-it.h/2,it.w,it.h,it.h/2);
        ctx.fillStyle=it.col;ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=1;ctx.stroke();
        ctx.fillStyle='#fff';
        ctx.font=`900 9px sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.shadowBlur=0;
        ctx.fillText(it.label,it.x,it.y+0.5);
        ctx.restore();
    });
}

function drawLasers() {
    lasers.forEach(l=>{
        ctx.save();
        ctx.shadowColor='#ef4444';ctx.shadowBlur=12;
        const g=ctx.createLinearGradient(l.x,l.y,l.x,l.y+l.h);
        g.addColorStop(0,'#fca5a5');g.addColorStop(1,'#ef4444');
        ctx.fillStyle=g;
        rr(ctx,l.x-l.w/2,l.y,l.w,l.h,l.w/2);ctx.fill();
        ctx.restore();
    });
}

function drawShield() {
    if(!activePU['shield']) return;
    const rem=(activePU['shield'].expiresAt-Date.now())/12000;
    const a=0.25+rem*0.25;
    const g=ctx.createLinearGradient(0,canvas.height-8,0,canvas.height);
    g.addColorStop(0,`rgba(139,92,246,${a})`);
    g.addColorStop(1,`rgba(139,92,246,0)`);
    ctx.fillStyle=g;
    ctx.fillRect(0,canvas.height-8,canvas.width,8);
    ctx.strokeStyle=`rgba(167,139,250,${0.55+rem*0.3})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,canvas.height-7);ctx.lineTo(canvas.width,canvas.height-7);ctx.stroke();
}

function drawIdleBg() {
    ctx.fillStyle='#080818';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='rgba(255,255,255,0.025)';ctx.lineWidth=1;
    for(let x=0;x<canvas.width;x+=28){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    for(let y=0;y<canvas.height;y+=28){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
}

/* ══════════════ UTILITIES ══════════════ */
function rr(ctx,x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
}

function lighten(hex,a){
    let r=parseInt(hex.slice(1,3),16)+a, g=parseInt(hex.slice(3,5),16)+a, b=parseInt(hex.slice(5,7),16)+a;
    r=Math.min(255,r);g=Math.min(255,g);b=Math.min(255,b);
    return `rgb(${r},${g},${b})`;
}

/* ══════════════ UI ══════════════ */
function setStatus(t) {
    document.getElementById('status-text').innerText=t;
}

function updateUI() {
    document.getElementById('ui-stage').innerText=stage;
    const sc=document.getElementById('ui-score');
    sc.innerText=score;
    sc.classList.remove('score-pop');void sc.offsetWidth;sc.classList.add('score-pop');
    const lv=document.getElementById('ui-lives');
    lv.innerText='❤️'.repeat(Math.max(0,livesLeft))||(livesLeft<=0?'💔':'');
    // Lives card danger glow
    const lc=document.getElementById('ui-lives-card');
    lc.className=livesLeft<=1
        ? 'flex flex-col items-center rounded-2xl p-2.5 border-2 border-red-400 shadow-sm bg-red-50 transition-all duration-300 active-turn'
        : 'flex flex-col items-center bg-white/80 backdrop-blur-md rounded-2xl p-2.5 border border-black/5 shadow-sm transition-all duration-300';
}

function updatePUBar() {
    const bar=document.getElementById('powerup-bar');
    bar.innerHTML='';
    const now=Date.now();
    for(const [t,d] of Object.entries(activePU)){
        const def=PU.find(p=>p.type===t);
        if(!def) continue;
        const rem=d.expiresAt&&d.expiresAt<999999999?Math.max(0,Math.ceil((d.expiresAt-now)/1000)):null;
        const badge=document.createElement('span');
        badge.className='pu-badge';
        badge.style.backgroundColor=def.color;
        badge.style.boxShadow=`0 0 10px ${def.color}70`;
        badge.textContent=def.label+(rem!==null?` ${rem}s`:'');
        bar.appendChild(badge);
    }
}

function showToast(msg) {
    const t=document.createElement('div');
    t.className='toast-pop fixed top-1/2 left-1/2 bg-black/90 text-white px-7 py-3.5 rounded-3xl font-black z-50 text-sm text-center whitespace-pre pointer-events-none';
    t.style.transform='translate(-50%,-50%)';
    t.innerText=msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2300);
}

function flashScreen(type) {
    const f=document.createElement('div');
    f.className=type==='victory'?'victory-flash':'danger-flash';
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),700);
}

function spawnConfetti(colors) {
    for(let i=0;i<90;i++){
        const el=document.createElement('div');
        el.className='confetti';
        el.style.left=(Math.random()*105)+'vw';
        el.style.top=(-10-Math.random()*50)+'px';
        el.style.backgroundColor=colors[Math.floor(Math.random()*colors.length)];
        el.style.animationDuration=(2+Math.random()*2.8)+'s';
        el.style.animationDelay=(Math.random()*0.9)+'s';
        el.style.setProperty('--rot',(Math.random()*1440-720)+'deg');
        const sh=Math.floor(Math.random()*3);
        if(sh===0){const d=6+Math.random()*9;el.style.width=d+'px';el.style.height=d+'px';el.style.borderRadius='50%';}
        else if(sh===1){const d=6+Math.random()*8;el.style.width=d+'px';el.style.height=d+'px';el.style.borderRadius='2px';}
        else{el.style.width=(4+Math.random()*5)+'px';el.style.height=(10+Math.random()*10)+'px';el.style.borderRadius='2px';}
        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5500);
    }
}

function showOverlay(icon,title,sub,btn,action) {
    const ov=document.getElementById('overlay');
    document.getElementById('ov-icon').innerText=icon;
    document.getElementById('ov-title').innerText=title;
    document.getElementById('ov-sub').innerText=sub;
    document.getElementById('ov-btn').innerHTML=`<i data-lucide="play" class="w-4 h-4"></i> ${btn}`;
    document.getElementById('ov-btn').onclick=new Function(action);
    ov.style.display='flex';
    lucide.createIcons();
}

function hideOverlay() {
    document.getElementById('overlay').style.display='none';
}

/* ══════════════ INPUT ══════════════ */
canvas.addEventListener('mousemove',e=>{
    if(gameState!=='playing') return;
    const r=canvas.getBoundingClientRect();
    const tx=(e.clientX-r.left)*(canvas.width/r.width);
    paddle.x=Math.min(Math.max(tx,paddle.w/2),canvas.width-paddle.w/2);
});

canvas.addEventListener('click',()=>{
    if(gameState==='playing') balls.forEach(b=>{if(b.stuck)b.stuck=false;});
});

canvas.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(gameState!=='playing') return;
    const r=canvas.getBoundingClientRect();
    const tx=(e.touches[0].clientX-r.left)*(canvas.width/r.width);
    paddle.x=Math.min(Math.max(tx,paddle.w/2),canvas.width-paddle.w/2);
},{passive:false});

canvas.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(gameState==='playing') balls.forEach(b=>{if(b.stuck)b.stuck=false;});
},{passive:false});

/* ══════════════ BOOT ══════════════ */
window.addEventListener('resize',()=>{
    resizeCanvas();
    if(gameState!=='playing'&&gameState!=='paused') drawIdleBg();
});

window.onload=()=>{
    lucide.createIcons();
    resizeCanvas();
    buildStars();
    drawIdleBg();
    showOverlay('🎮','BLOCKZUSHI','ブロックを壊してステージクリア！\nパワーアップを取ってどこまでも進め！','スタート','startGame()');
};
</script>
