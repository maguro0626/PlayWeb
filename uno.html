<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNO Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --app-height: 100%; }
        html, body {
            height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            touch-action: manipulation;
        }
        .glass-header {
            background-color: rgba(255,255,255,0.7);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        /* ━━━ ボード（Reversiのテイストを踏襲） ━━━ */
        #game-board {
            display: flex; flex-direction: column;
            background: linear-gradient(135deg, #081e09 0%, #133314 60%, #1a4a1c 100%);
            border: 6px solid #0a0a0a;
            border-radius: 20px;
            box-shadow:
                0 40px 80px rgba(0,0,0,0.5),
                inset 0 0 30px rgba(0,0,0,0.9),
                0 0 60px rgba(0,80,0,0.2);
            position: relative;
            overflow: hidden;
        }

        /* ━━━ カードデザイン ━━━ */
        .uno-card {
            width: 70px; height: 104px;
            border-radius: 8px;
            background-color: white;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3), inset 0 0 4px rgba(0,0,0,0.2);
            position: relative;
            display: flex; justify-content: center; align-items: center;
            user-select: none;
            flex-shrink: 0;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s, filter 0.2s;
            transform-style: preserve-3d;
        }
        .uno-card.back {
            background: radial-gradient(circle, #222 0%, #000 100%);
            border-color: #111;
        }
        .uno-card.back::after {
            content: 'UNO'; color: #ef4444; font-weight: 900; font-size: 1.5rem;
            text-shadow: 2px 2px 0 #fff; transform: rotate(-20deg);
        }
        .card-inner {
            width: 100%; height: 100%; border-radius: 4px;
            position: relative; display: flex; justify-content: center; align-items: center;
            background-color: var(--card-color, #ccc);
            overflow: hidden;
        }
        .card-inner::after {
            content: ''; position: absolute;
            width: 85%; height: 95%; background-color: white;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            transform: rotate(-25deg);
        }
        .card-value {
            position: absolute; z-index: 2; font-size: 2.2rem; font-weight: 900;
            color: var(--card-color); text-shadow: 1.5px 1.5px 0px white, -1.5px -1.5px 0px white;
        }
        .card-corner {
            position: absolute; z-index: 2; font-size: 0.8rem; font-weight: 900; color: white;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
        }
        .card-corner.top-left { top: 2px; left: 4px; }
        .card-corner.bottom-right { bottom: 2px; right: 4px; transform: rotate(180deg); }

        /* 手札の重なり */
        .hand-card { margin-left: -35px; }
        .hand-card:first-child { margin-left: 0; }
        .hand-card.playable:hover {
            transform: translateY(-16px) scale(1.05); z-index: 10 !important; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .hand-card.unplayable { filter: brightness(0.6); }

        /* 場札のアニメーション */
        .card-impact { animation: card-drop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.25) both; }
        @keyframes card-drop {
            0% { transform: scale(1.8) translateY(-50px) rotate(10deg); opacity: 0; }
            100% { transform: scale(1) translateY(0) rotate(var(--rot, 0deg)); opacity: 1; }
        }

        /* ━━━ アクティブターン ━━━ */
        .active-turn {
            border-color: #3b82f6 !important; transform: scale(1.05); background-color: white !important;
            animation: turn-glow 2s infinite ease-in-out;
        }
        @keyframes turn-glow {
            0%,100% { box-shadow: 0 8px 20px rgba(59,130,246,0.2), 0 0 18px rgba(59,130,246,0.12); }
            50%      { box-shadow: 0 12px 32px rgba(59,130,246,0.38), 0 0 38px rgba(59,130,246,0.24); }
        }

        /* ━━━ トースト ━━━ */
        .toast-pop { animation: toast-anim 2s cubic-bezier(0.175,0.885,0.32,1.2) forwards; z-index: 1000; }
        @keyframes toast-anim {
            0%   { transform:translate(-50%,-50%) scale(0.5); opacity:0; }
            10%  { transform:translate(-50%,-50%) scale(1.05); opacity:1; }
            20%  { transform:translate(-50%,-50%) scale(1);    opacity:1; }
            80%  { transform:translate(-50%,-50%) scale(1);    opacity:1; }
            100% { transform:translate(-50%,-50%) scale(0.8);  opacity:0; }
        }

        /* ━━━ カットイン演出 ━━━ */
        .cutin-overlay {
            position: fixed; inset: 0; z-index: 200; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .cutin-bg {
            position: absolute; inset: -50%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 15deg, rgba(255,255,255,0.15) 15deg 30deg);
            animation: rotate-bg 4s linear infinite; opacity: 0;
        }
        .cutin-bg-dark {
            position: absolute; inset: 0; background: rgba(0,0,0,0);
            animation: darken-bg 2.5s ease forwards;
        }
        @keyframes rotate-bg { 100% { transform: rotate(360deg); } }
        @keyframes darken-bg {
            0%, 100% { background: rgba(0,0,0,0); backdrop-filter: none; }
            10%, 85% { background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
        }
        .cutin-text {
            font-size: 6vw; font-weight: 900; color: white;
            text-shadow: 6px 6px 0px #ef4444, -2px -2px 0px #000;
            white-space: nowrap; transform: scale(0) skew(-15deg); opacity: 0;
        }
        .cutin-anim-success { animation: cutin-boom 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .cutin-anim-fail { animation: cutin-fail 3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes cutin-boom {
            0% { transform: scale(0) skew(-15deg) rotate(-10deg); opacity: 0; }
            10% { transform: scale(1.2) skew(-15deg) rotate(-2deg); opacity: 1; }
            20% { transform: scale(1) skew(-15deg) rotate(-5deg); opacity: 1; }
            80% { transform: scale(1) skew(-15deg) rotate(-5deg); opacity: 1; }
            100% { transform: scale(1.5) translate(100vw, -100vh); opacity: 0; }
        }
        @keyframes cutin-fail {
            0% { transform: scale(0) skew(-15deg) rotate(-10deg); opacity: 0; }
            10% { transform: scale(1.2) skew(-15deg) rotate(-2deg); opacity: 1; }
            20% { transform: scale(1) skew(-15deg) rotate(-5deg); opacity: 1; }
            40% { transform: scale(1) skew(-15deg) rotate(-5deg); opacity: 1; }
            50% { transform: scale(1) skew(0deg) rotate(0deg); opacity: 1; content: "…。"; color: #aaa; text-shadow: 2px 2px #000; }
            85% { transform: scale(1) skew(0deg) rotate(0deg); opacity: 1; color: #aaa; text-shadow: 2px 2px #000; }
            100% { transform: translateY(100vh); opacity: 0; }
        }

        /* ━━━ 指摘モード ━━━ */
        body.targeting-mode .targeting-overlay { display: block; }
        .targeting-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; display: none; }
        body.targeting-mode .npc-card {
            position: relative; z-index: 41; cursor: pointer;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.8);
            animation: pulse-glow-target 1s infinite;
        }
        @keyframes pulse-glow-target {
            0%,100% { transform: scale(1); box-shadow: 0 0 10px rgba(239, 68, 68, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(239, 68, 68, 1); }
        }

        /* ━━━ コンフェティ ━━━ */
        .confetti {
            position: fixed; top: -30px; z-index: 100; pointer-events: none;
            animation: confetti-fall linear forwards;
        }
        @keyframes confetti-fall {
            0%   { transform: translateY(0) rotate(0deg) scale(1); opacity:1; }
            85%  { opacity:1; }
            100% { transform: translateY(115vh) rotate(var(--rot,720deg)) scale(0.7); opacity:0; }
        }

        /* 吹き出し */
        .bubble {
            position: absolute; background: white; color: #ef4444; font-weight: 900; font-size: 1.2rem;
            padding: 4px 12px; border-radius: 20px; border: 3px solid #ef4444;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 50;
            animation: bubble-pop 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            pointer-events: none;
        }
        @keyframes bubble-pop {
            0% { transform: scale(0) translateY(20px); opacity: 0; }
            15% { transform: scale(1.2) translateY(0); opacity: 1; }
            30% { transform: scale(1) translateY(0); opacity: 1; }
            80% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(0.8) translateY(-20px); opacity: 0; }
        }

        /* 方向インジケーター */
        .dir-indicator { transition: transform 0.5s ease; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="w-full shrink-0 z-50 glass-header border-b border-black/5 h-14 flex items-center justify-between px-4">
        <button onclick="window.location.href='index.html'" class="flex items-center gap-2 text-zinc-600 hover:text-zinc-900 transition-colors p-2 rounded-xl hover:bg-black/5">
            <i data-lucide="home" class="w-5 h-5"></i>
            <span class="text-sm font-bold">ホーム</span>
        </button>
        <div id="status-text" class="text-[10px] font-black tracking-widest uppercase text-zinc-400">Ready</div>
        <div class="w-20"></div>
    </header>

    <main class="flex-grow flex flex-col overflow-hidden max-w-4xl mx-auto w-full p-4 relative">
        <div class="targeting-overlay"></div>
        <div id="target-msg" class="fixed top-1/4 left-1/2 -translate-x-1/2 z-50 text-white font-black text-2xl hidden" style="text-shadow: 0 2px 10px #000;">誰を指摘する？</div>

        <!-- ボード領域 -->
        <div id="game-board" class="flex-grow flex flex-col p-4 mb-4">
            
            <!-- NPC Area -->
            <div id="npcs-container" class="flex flex-wrap justify-center gap-4 shrink-0 min-h-[80px]">
                <!-- NPCs injected here -->
            </div>

            <!-- Center Area (Pile & Deck) -->
            <div class="flex-grow flex items-center justify-center relative">
                <!-- Color & Direction -->
                <div class="absolute left-4 top-1/2 -translate-y-1/2 flex flex-col items-center gap-4">
                    <div id="current-color-bg" class="w-16 h-16 rounded-full shadow-lg border-4 border-white transition-colors duration-300 flex justify-center items-center bg-zinc-300">
                        <i id="dir-icon" data-lucide="rotate-cw" class="w-8 h-8 text-white dir-indicator opacity-80"></i>
                    </div>
                </div>

                <div class="flex gap-8 items-center">
                    <!-- Deck -->
                    <div id="deck" class="relative cursor-pointer hover:scale-105 active:scale-95 transition-transform" onclick="playerDraw()">
                        <div class="uno-card back absolute" style="left: -4px; top: 4px;"></div>
                        <div class="uno-card back absolute" style="left: -2px; top: 2px;"></div>
                        <div class="uno-card back relative z-10"></div>
                    </div>
                    <!-- Pile -->
                    <div id="pile" class="relative w-[70px] h-[104px]">
                        <!-- Played cards injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 下部コントローラーと手札 -->
        <div class="shrink-0 space-y-4 relative z-10">
            <!-- アクションボタン -->
            <div class="flex justify-between items-end px-2">
                <div class="flex gap-2">
                    <button id="btn-uno" onclick="sayUnoPlayer()" class="w-16 h-16 bg-red-500 text-white font-black rounded-full shadow-[0_4px_14px_rgba(239,68,68,0.5)] border-2 border-white hover:bg-red-600 active:scale-90 transition-all flex flex-col items-center justify-center relative">
                        <span class="text-xl">UNO!</span>
                    </button>
                    <button id="btn-doubt" onclick="startDoubt()" class="h-16 px-4 bg-purple-500 text-white font-black rounded-2xl shadow-[0_4px_14px_rgba(168,85,247,0.5)] border-2 border-white hover:bg-purple-600 active:scale-90 transition-all flex flex-col items-center justify-center">
                        <span class="text-xs">言ってない</span>
                        <span class="text-xs">ですやん</span>
                    </button>
                </div>
                <!-- 設定 -->
                <div class="bg-white/90 backdrop-blur p-2 rounded-2xl shadow-sm border border-black/5 flex flex-col gap-2">
                    <div class="flex bg-zinc-100 rounded-xl p-1 gap-1">
                        <button onclick="changeSize(3)" id="sz-3" class="px-3 py-1 rounded-lg text-[10px] font-bold text-zinc-500">3人</button>
                        <button onclick="changeSize(4)" id="sz-4" class="px-3 py-1 rounded-lg text-[10px] font-bold bg-white shadow-sm text-black">4人</button>
                        <button onclick="changeSize(5)" id="sz-5" class="px-3 py-1 rounded-lg text-[10px] font-bold text-zinc-500">5人</button>
                        <button onclick="changeSize(6)" id="sz-6" class="px-3 py-1 rounded-lg text-[10px] font-bold text-zinc-500">6人</button>
                    </div>
                    <div class="flex bg-zinc-100 rounded-xl p-1 gap-1">
                        <button onclick="changeDiff(1)" id="df-1" class="px-4 py-1 rounded-lg text-[10px] font-bold bg-white shadow-sm text-black">Easy</button>
                        <button onclick="changeDiff(2)" id="df-2" class="px-4 py-1 rounded-lg text-[10px] font-bold text-zinc-500">Hard</button>
                    </div>
                    <button onclick="resetGame()" class="w-full py-1 bg-zinc-900 text-white rounded-lg font-bold text-[10px] active:scale-95 transition-all">リセット</button>
                </div>
            </div>

            <!-- プレイヤー手札 -->
            <div class="bg-white/80 backdrop-blur-md p-4 rounded-[2rem] border border-black/5 shadow-sm min-h-[140px] flex items-center justify-center overflow-x-auto">
                <div id="player-hand" class="flex items-center px-4" style="padding-left: 35px;">
                    <!-- Hand cards injected here -->
                </div>
            </div>
        </div>

    </main>

    <!-- 色選択モーダル -->
    <div id="color-picker" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white/90 p-8 rounded-[2rem] shadow-2xl space-y-6 transform scale-0 transition-transform duration-300" id="color-picker-inner">
            <h3 class="text-center font-black text-xl text-zinc-800">色を選んでください</h3>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="selectWildColor('red')" class="w-20 h-20 rounded-2xl bg-[#ff5555] shadow-lg border-4 border-white active:scale-95 transition-transform"></button>
                <button onclick="selectWildColor('blue')" class="w-20 h-20 rounded-2xl bg-[#5555ff] shadow-lg border-4 border-white active:scale-95 transition-transform"></button>
                <button onclick="selectWildColor('green')" class="w-20 h-20 rounded-2xl bg-[#55aa55] shadow-lg border-4 border-white active:scale-95 transition-transform"></button>
                <button onclick="selectWildColor('yellow')" class="w-20 h-20 rounded-2xl bg-[#ffaa00] shadow-lg border-4 border-white active:scale-95 transition-transform"></button>
            </div>
        </div>
    </div>

    <!-- カットイン用コンテナ -->
    <div id="cutin-container"></div>

    <script>
        const COLORS = {
            'red': '#ff5555', 'blue': '#5555ff', 'green': '#55aa55', 'yellow': '#ffaa00', 'wild': '#333'
        };
        const COLOR_NAMES = ['red', 'blue', 'green', 'yellow'];
        
        let numPlayers = 4;
        let difficulty = 1; // 1: Easy, 2: Hard
        
        let deck = [];
        let pile = [];
        let currentColor = '';
        let currentType = '';
        
        let players = [];
        let currentPlayerIndex = 0;
        let direction = 1;
        
        let gameActive = false;
        let actionLock = false; // アニメーション中などの操作ロック
        let isTargeting = false;
        let resolveWildColor = null; // Wild色選択のPromise解決用

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        /* ─── 初期化 ─── */
        function initDeck() {
            deck = [];
            COLOR_NAMES.forEach(c => {
                deck.push({ color: c, type: '0', id: Math.random().toString(36).substr(2, 9) });
                for(let i=1; i<=9; i++) {
                    deck.push({ color: c, type: i.toString(), id: Math.random().toString(36).substr(2, 9) });
                    deck.push({ color: c, type: i.toString(), id: Math.random().toString(36).substr(2, 9) });
                }
                ['skip', 'reverse', 'draw2'].forEach(t => {
                    deck.push({ color: c, type: t, id: Math.random().toString(36).substr(2, 9) });
                    deck.push({ color: c, type: t, id: Math.random().toString(36).substr(2, 9) });
                });
            });
            for(let i=0; i<4; i++) {
                deck.push({ color: 'wild', type: 'wild', id: Math.random().toString(36).substr(2, 9) });
                deck.push({ color: 'wild', type: 'wild4', id: Math.random().toString(36).substr(2, 9) });
            }
            shuffleDeck();
        }

        function shuffleDeck() {
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
        }

        function resetGame() {
            lucide.createIcons();
            document.querySelectorAll('.confetti,.toast-pop').forEach(e => e.remove());
            clearAllTimers();
            
            initDeck();
            players = [];
            for (let i = 0; i < numPlayers; i++) {
                players.push({
                    name: i === 0 ? 'Player' : `NPC ${i}`,
                    isPlayer: i === 0,
                    hand: [],
                    unoSaid: false,
                    unoTimerId: null
                });
            }
            
            // Deal 7 cards
            for(let i=0; i<7; i++) {
                players.forEach(p => p.hand.push(deck.pop()));
            }
            
            pile = [];
            let firstCard;
            do {
                firstCard = deck.pop();
                if(firstCard.color === 'wild') deck.unshift(firstCard); // ワイルド以外を最初にする
            } while(firstCard.color === 'wild');
            
            pile.push(firstCard);
            currentColor = firstCard.color;
            currentType = firstCard.type;
            
            currentPlayerIndex = 0;
            direction = 1;
            gameActive = true;
            actionLock = false;
            isTargeting = false;
            document.body.classList.remove('targeting-mode');
            document.getElementById('target-msg').classList.add('hidden');

            updateUI();
            checkPlayableHands();
        }

        /* ─── 設定変更 ─── */
        function changeSize(s) {
            if (!gameActive || actionLock) return;
            numPlayers = s;
            [3,4,5,6].forEach(n => {
                document.getElementById(`sz-${n}`).className =
                    n === s ? 'px-3 py-1 rounded-lg text-[10px] font-bold bg-white shadow-sm text-black'
                            : 'px-3 py-1 rounded-lg text-[10px] font-bold text-zinc-500';
            });
            resetGame();
        }

        function changeDiff(d) {
            difficulty = d;
            [1,2].forEach(n => {
                document.getElementById(`df-${n}`).className =
                    n === d ? 'px-4 py-1 rounded-lg text-[10px] font-bold bg-white shadow-sm text-black'
                            : 'px-4 py-1 rounded-lg text-[10px] font-bold text-zinc-500';
            });
        }

        /* ─── 描画ヘルパー ─── */
        function getCardColorHex(color) {
            if(color === 'wild') return 'linear-gradient(135deg, #ff5555 25%, #5555ff 25% 50%, #ffaa00 50% 75%, #55aa55 75%)';
            return COLORS[color] || '#ccc';
        }
        function getCardText(type) {
            if(type === 'skip') return '⊘';
            if(type === 'reverse') return '⇄';
            if(type === 'draw2') return '+2';
            if(type === 'wild') return 'W';
            if(type === 'wild4') return '+4';
            return type;
        }

        function createCardDOM(card, isPlayable = false, onClick = null) {
            const el = document.createElement('div');
            el.className = `uno-card hand-card ${isPlayable ? 'playable' : 'unplayable'}`;
            el.dataset.id = card.id;
            
            const inner = document.createElement('div');
            inner.className = 'card-inner';
            if(card.color === 'wild') {
                inner.style.background = getCardColorHex(card.color);
            } else {
                inner.style.setProperty('--card-color', getCardColorHex(card.color));
            }

            const text = getCardText(card.type);
            const val = document.createElement('div');
            val.className = 'card-value';
            val.innerText = text;
            if(card.color === 'wild') { val.style.color = '#333'; val.style.textShadow = '1.5px 1.5px 0px white'; }

            const tl = document.createElement('div'); tl.className = 'card-corner top-left'; tl.innerText = text;
            const br = document.createElement('div'); br.className = 'card-corner bottom-right'; br.innerText = text;

            inner.appendChild(val); inner.appendChild(tl); inner.appendChild(br);
            el.appendChild(inner);

            if(isPlayable && onClick) el.onclick = onClick;
            return el;
        }

        /* ─── UI更新 ─── */
        function updateUI() {
            // NPC
            const npcsCont = document.getElementById('npcs-container');
            npcsCont.innerHTML = '';
            for(let i=1; i<numPlayers; i++) {
                const p = players[i];
                const isActive = (i === currentPlayerIndex);
                const el = document.createElement('div');
                el.className = `npc-card flex items-center gap-3 bg-white/80 backdrop-blur p-2 pr-4 rounded-[2rem] border-2 transition-all duration-300 ${isActive ? 'active-turn' : 'border-transparent opacity-60'}`;
                el.onclick = () => { if(isTargeting) selectDoubtTarget(i); };
                
                el.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center border-2 border-white shadow-md relative">
                        <i data-lucide="bot" class="w-5 h-5 text-white"></i>
                        ${p.hand.length === 1 ? `<span class="absolute -top-1 -right-1 flex h-4 w-4"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span><span class="relative inline-flex rounded-full h-4 w-4 bg-red-500 border border-white"></span></span>` : ''}
                    </div>
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black uppercase tracking-wider text-zinc-500">${p.name}</span>
                        <span class="text-sm font-black">${p.hand.length} <span class="text-[10px] font-normal text-zinc-400">Cards</span></span>
                    </div>
                `;
                npcsCont.appendChild(el);
            }
            lucide.createIcons();

            // Player Hand
            const pHand = document.getElementById('player-hand');
            pHand.innerHTML = '';
            players[0].hand.forEach((card, idx) => {
                const isPlayable = currentPlayerIndex === 0 && !actionLock && isValidPlay(card);
                const cardEl = createCardDOM(card, isPlayable, () => playerPlayCard(idx));
                pHand.appendChild(cardEl);
            });

            // Pile
            const pileCont = document.getElementById('pile');
            pileCont.innerHTML = '';
            if(pile.length > 0) {
                const topCard = pile[pile.length - 1];
                const el = createCardDOM(topCard, false);
                el.classList.remove('hand-card', 'unplayable');
                el.style.position = 'absolute';
                // 最後に置かれたカードに少し傾きをつける
                el.style.transform = `rotate(${Math.sin(pile.length) * 15}deg)`;
                pileCont.appendChild(el);
            }

            // Indicator
            const indBg = document.getElementById('current-color-bg');
            indBg.style.backgroundColor = COLORS[currentColor] || '#333';
            
            const dirIcon = document.getElementById('dir-icon');
            dirIcon.style.transform = `rotate(${direction === 1 ? 0 : -180}deg) scaleX(${direction === 1 ? 1 : -1})`;

            // Status
            const statusEl = document.getElementById('status-text');
            if(gameActive) {
                statusEl.innerText = currentPlayerIndex === 0 ? 'Your Turn' : `${players[currentPlayerIndex].name} Thinking...`;
            }
        }

        function checkPlayableHands() {
            // 見た目の更新のため
            if(currentPlayerIndex === 0 && !actionLock) updateUI();
        }

        /* ─── ゲームロジック ─── */
        function isValidPlay(card) {
            return card.color === 'wild' || card.color === currentColor || card.type === currentType;
        }

        function recyclePile() {
            if(pile.length <= 1) return;
            const top = pile.pop();
            deck = pile;
            pile = [top];
            shuffleDeck();
            showToast("デッキをシャッフルしました", 1000);
        }

        async function drawCards(playerIdx, count) {
            for(let i=0; i<count; i++) {
                if(deck.length === 0) recyclePile();
                if(deck.length > 0) {
                    players[playerIdx].hand.push(deck.pop());
                }
            }
            players[playerIdx].unoSaid = false; // 引いたらリセット
            updateUI();
            await sleep(300);
        }

        function getNextPlayer(steps = 1) {
            let next = (currentPlayerIndex + (direction * steps)) % numPlayers;
            if (next < 0) next += numPlayers;
            return next;
        }

        async function processCardEffect(card) {
            if(card.type === 'skip') {
                showToast("SKIP!", 1000);
                currentPlayerIndex = getNextPlayer();
            } else if(card.type === 'reverse') {
                showToast("REVERSE!", 1000);
                direction *= -1;
                updateUI();
            } else if(card.type === 'draw2') {
                showToast("DRAW 2!", 1000);
                let next = getNextPlayer();
                await drawCards(next, 2);
                currentPlayerIndex = next; // スキップ
            } else if(card.type === 'wild4') {
                showToast("WILD DRAW 4!", 1000);
                let next = getNextPlayer();
                await drawCards(next, 4);
                currentPlayerIndex = next; // スキップ
            }
        }

        /* ─── ターン進行 ─── */
        async function nextTurn() {
            if(!gameActive) return;
            
            // 勝敗判定
            const winnerIdx = players.findIndex(p => p.hand.length === 0);
            if(winnerIdx !== -1) {
                endGame(winnerIdx);
                return;
            }

            currentPlayerIndex = getNextPlayer();
            updateUI();

            if(currentPlayerIndex !== 0) {
                actionLock = true;
                await playNPCTurn();
            } else {
                actionLock = false;
                checkPlayableHands();
            }
        }

        /* ─── プレイヤーアクション ─── */
        async function playerDraw() {
            if(currentPlayerIndex !== 0 || actionLock || !gameActive || isTargeting) return;
            actionLock = true;
            await drawCards(0, 1);
            
            // 引いたカードが出せる場合（本来は選択できるが、今回は自動スキップで進行を早める）
            await sleep(500);
            nextTurn();
        }

        async function playerPlayCard(handIdx) {
            if(currentPlayerIndex !== 0 || actionLock || !gameActive || isTargeting) return;
            const card = players[0].hand[handIdx];
            if(!isValidPlay(card)) return;

            actionLock = true;
            players[0].hand.splice(handIdx, 1);
            
            let chosenColor = card.color;
            if(card.color === 'wild') {
                chosenColor = await openColorPicker();
            }

            await executePlay(card, chosenColor, 0);
        }

        function openColorPicker() {
            return new Promise(resolve => {
                resolveWildColor = resolve;
                const picker = document.getElementById('color-picker');
                const inner = document.getElementById('color-picker-inner');
                picker.classList.remove('hidden');
                setTimeout(() => inner.classList.remove('scale-0'), 10);
            });
        }
        function selectWildColor(color) {
            if(resolveWildColor) {
                const picker = document.getElementById('color-picker');
                const inner = document.getElementById('color-picker-inner');
                inner.classList.add('scale-0');
                setTimeout(() => {
                    picker.classList.add('hidden');
                    resolveWildColor(color);
                    resolveWildColor = null;
                }, 300);
            }
        }

        /* ─── NPCアクション ─── */
        async function playNPCTurn() {
            const delay = difficulty === 1 ? 1500 + Math.random()*1000 : 800 + Math.random()*700;
            await sleep(delay);
            if(!gameActive) return;

            const hand = players[currentPlayerIndex].hand;
            const validCards = hand.filter(isValidPlay);

            if (validCards.length > 0) {
                const card = validCards[Math.floor(Math.random() * validCards.length)];
                const idx = hand.indexOf(card);
                hand.splice(idx, 1);

                let chosenColor = card.color;
                if (card.color === 'wild') {
                    // 最も多い色を選ぶ
                    const counts = {red:0, blue:0, green:0, yellow:0};
                    hand.forEach(c => { if(c.color !== 'wild') counts[c.color]++; });
                    chosenColor = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
                    if(counts[chosenColor] === 0) chosenColor = COLOR_NAMES[Math.floor(Math.random()*4)];
                }

                await executePlay(card, chosenColor, currentPlayerIndex);
            } else {
                showToast(`${players[currentPlayerIndex].name} Drawn`, 1000);
                await drawCards(currentPlayerIndex, 1);
                nextTurn();
            }
        }

        /* ─── プレイ実行共通 ─── */
        async function executePlay(card, chosenColor, playerIdx) {
            pile.push(card);
            currentColor = chosenColor;
            currentType = card.type;
            
            // アニメーション用の一時更新
            updateUI();
            const topEl = document.getElementById('pile').lastChild;
            if(topEl) {
                topEl.style.setProperty('--rot', `${Math.sin(pile.length) * 15}deg`);
                topEl.classList.add('card-impact');
            }

            // UNO宣言タイマー等のセット
            checkUnoSituation(playerIdx);

            await sleep(600);
            await processCardEffect(card);
            
            nextTurn();
        }

        /* ─── UNOシステム関連 ─── */
        function checkUnoSituation(playerIdx) {
            const p = players[playerIdx];
            if (p.hand.length === 1 && !p.unoSaid) {
                if (playerIdx === 0) {
                    // Player -> NPCからの指摘タイマー
                    const prob = difficulty === 1 ? 0.3 : 0.9;
                    const delay = difficulty === 1 ? 2500 + Math.random()*1500 : 1000 + Math.random()*500;
                    if (Math.random() < prob) {
                        p.unoTimerId = setTimeout(() => {
                            if(!gameActive || p.unoSaid || p.hand.length !== 1) return;
                            npcAccusePlayer();
                        }, delay);
                    }
                } else {
                    // NPC -> 自身のUNO宣言タイマー
                    const prob = difficulty === 1 ? 0.6 : 0.95;
                    const delay = difficulty === 1 ? 1500 + Math.random()*2000 : 300 + Math.random()*700;
                    if (Math.random() < prob) {
                        p.unoTimerId = setTimeout(() => {
                            if(!gameActive || p.unoSaid || p.hand.length !== 1) return;
                            p.unoSaid = true;
                            showBubble(playerIdx, "UNO!");
                        }, delay);
                    }
                }
            }
        }

        function clearAllTimers() {
            players.forEach(p => {
                if(p.unoTimerId) clearTimeout(p.unoTimerId);
            });
        }

        /* プレイヤーがUNOボタンを押した */
        function sayUnoPlayer() {
            if(!gameActive) return;
            const p = players[0];
            
            if (p.hand.length === 1 && !p.unoSaid) {
                // 成功
                p.unoSaid = true;
                if(p.unoTimerId) clearTimeout(p.unoTimerId);
                showBubble(0, "UNO!");
            } else {
                // ペナルティ
                showToast("意味のないUNO! 1枚ペナルティ", 2000);
                drawCards(0, 1);
            }
        }

        /* NPCがプレイヤーを指摘する */
        async function npcAccusePlayer() {
            actionLock = true;
            const accuserName = players[Math.floor(Math.random() * (numPlayers - 1)) + 1].name;
            await playCutin(false, `${accuserName}「言ってないですやん！」`);
            
            if (players[0].hand.length === 1 && !players[0].unoSaid) {
                showToast("指摘された！ 1枚ペナルティ", 2500);
                await drawCards(0, 1);
            }
            actionLock = false;
        }

        /* プレイヤーが指摘ボタンを押した */
        function startDoubt() {
            if(!gameActive || isTargeting || actionLock) return; // アニメーション中は一旦弾く
            isTargeting = true;
            document.body.classList.add('targeting-mode');
            document.getElementById('target-msg').classList.remove('hidden');
        }

        /* ターゲット選択時 */
        async function selectDoubtTarget(targetIdx) {
            isTargeting = false;
            document.body.classList.remove('targeting-mode');
            document.getElementById('target-msg').classList.add('hidden');
            
            // 判定進行のためロック
            const prevLock = actionLock;
            actionLock = true;

            const target = players[targetIdx];
            const isCorrect = (target.hand.length === 1 && !target.unoSaid);

            if (isCorrect) {
                await playCutin(true, "UNO言ってないですやん！");
                if(target.unoTimerId) clearTimeout(target.unoTimerId);
                showBubble(targetIdx, "しまった！");
                await sleep(500);
                showToast(`${target.name}に1枚ペナルティ！`, 2000);
                await drawCards(targetIdx, 1);
            } else {
                await playCutin(false, "UNO言ってないですやん！");
                showToast("間違い！ 自分が1枚ペナルティ", 2500);
                await drawCards(0, 1);
            }

            actionLock = prevLock;
        }

        /* ─── 演出系 ─── */
        async function playCutin(isSuccess, textMsg) {
            const container = document.getElementById('cutin-container');
            container.innerHTML = `
                <div class="cutin-overlay">
                    <div class="cutin-bg-dark"></div>
                    <div class="cutin-bg"></div>
                    <div class="cutin-text ${isSuccess ? 'cutin-anim-success' : 'cutin-anim-fail'}">${textMsg}</div>
                </div>
            `;
            await sleep(isSuccess ? 2500 : 3000);
            container.innerHTML = '';
        }

        function showBubble(playerIdx, text) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = text;
            
            if (playerIdx === 0) {
                // Player
                bubble.style.bottom = '160px';
                bubble.style.left = '50%';
                bubble.style.transform = 'translateX(-50%)';
                document.body.appendChild(bubble);
            } else {
                // NPC
                const npcCards = document.querySelectorAll('.npc-card');
                if(npcCards[playerIdx - 1]) {
                    const rect = npcCards[playerIdx - 1].getBoundingClientRect();
                    bubble.style.top = `${rect.bottom + 10}px`;
                    bubble.style.left = `${rect.left + rect.width/2}px`;
                    bubble.style.transform = 'translateX(-50%)';
                    document.body.appendChild(bubble);
                }
            }
            setTimeout(() => bubble.remove(), 1600);
        }

        function showToast(m, duration=1800) {
            const t = document.createElement('div');
            t.className = 'toast-pop fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black/90 text-white px-8 py-4 rounded-3xl font-black';
            t.innerText = m;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), duration);
        }

        function spawnConfetti() {
            const colors = ['#3b82f6','#ef4444','#22c55e','#f59e0b','#a855f7','#ec4899','#fff'];
            for (let i = 0; i < 100; i++) {
                const el = document.createElement('div');
                el.className = 'confetti';
                el.style.left = (Math.random() * 100) + 'vw';
                el.style.top  = (-10 - Math.random() * 50) + 'px';
                el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                el.style.animationDuration = (2 + Math.random() * 3) + 's';
                el.style.animationDelay   = (Math.random() * 0.5) + 's';
                el.style.setProperty('--rot', (Math.random() * 1440 - 720) + 'deg');
                
                const d = 6 + Math.random() * 8;
                el.style.width = d+'px'; el.style.height = (Math.random()>0.5 ? d : d*2)+'px';
                el.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
                
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 5500);
            }
        }

        function endGame(winnerIdx) {
            gameActive = false;
            const statusEl = document.getElementById('status-text');
            
            if (winnerIdx === 0) {
                statusEl.innerText = 'YOU WIN!';
                spawnConfetti();
                showToast("🎉 勝利！ 🎉", 5000);
            } else {
                statusEl.innerText = `${players[winnerIdx].name} WIN`;
                showToast("GAME OVER", 5000);
            }
            updateUI();
        }

        // 初期起動
        window.onload = resetGame;
    </script>
</body>
</html>
